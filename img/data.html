<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /img/</title>
    <style>
        /* --- Pendekatan Mobile-First & Tema Dinamis --- */
        :root {
            --bg: #ffffff;
            --text: #000000;
            --hr-color: #000000;
            --row-even: #f9f9f9;
            --row-hover: #f0f0f0;
            --link-color: #0000ee;
            --muted: #555555;
            --border-thumb: #cccccc;
            --btn-bg: #f0f0f0;
            --btn-border: #aaaaaa;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --text: #e0e0e0;
                --hr-color: #444444;
                --row-even: #1e1e1e;
                --row-hover: #2a2a2a;
                --link-color: #66b2ff;
                --muted: #aaaaaa;
                --border-thumb: #444444;
                --btn-bg: #2a2a2a;
                --btn-border: #555555;
            }
        }

        /* Mengunci basis dasar font peramban */
        html { font-size: 100%; } /* 1rem = 16px */

        body { font-family: monospace; background: var(--bg); color: var(--text); padding: 0.9375rem; margin: 0; font-size: 1rem; }
        
        /* Flexbox Container untuk menyejajarkan Judul dan Logo */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%; /* Mengisi full screen */
            margin-top: 0.625rem;
            margin-bottom: 0.3125rem;
        }

        /* Header Interaktif ke Root */
        h1 { font-size: 1.5rem; margin: 0; }
        h1 a { color: var(--text); text-decoration: none; }
        h1 a:hover { text-decoration: underline; text-decoration-style: dashed; }
        
        /* Gaya & Ukuran Logo Brand Layar Kosong */
        .brand-logo {
            width: 2rem;
            height: 2rem;
            display: block;
            object-fit: contain;
        }

        hr { border: 0; border-top: 0.0625rem solid var(--hr-color); margin: 0.625rem 0; }
        
        /* Pembungkus Tabel Responsif di Mobile */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        /* Table Layout Fixed agar % width dipatuhi */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left; 
            table-layout: fixed; 
        }
        
        /* Ukuran Header Tabel Standar */
        th { padding: 0.5rem 0.625rem; border-bottom: 0.0625rem solid var(--hr-color); cursor: pointer; user-select: none; font-size: 1.1rem; }
        th:hover { background: var(--row-hover); }
        
        /* 🔥 PENDONGKRAK FONT LIST BARIS (Td) */
        td { 
            padding: 0.75rem 0.625rem; 
            white-space: nowrap; 
            vertical-align: middle; 
            font-size: 1.25rem; 
        }

        /* FIX: Truncation standar (Titik Tiga di Akhir) tanpa Flexbox */
        td.name-cell {
            overflow: hidden;
            text-overflow: ellipsis; /* Memotong teks berlebih dengan ... */
            max-width: 0;   /* Wajib untuk kliping di dalam fixed table */
        }

        a.name-link {
            color: var(--link-color);
            text-decoration: none;
        }
        
        a.name-link:hover { text-decoration: underline; }
        
        /* Warna Selang-Seling & Efek Hover Gambar */
        tbody tr:nth-child(even) { background: var(--row-even); }
        tbody tr:hover { background: var(--row-hover); }
        
        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        /* Ukuran Thumbnail Tetap */
        .preview-thumb { 
            width: 3.125rem; 
            height: 2.5rem;  
            object-fit: cover; 
            border: 0.0625rem solid var(--border-thumb); 
            cursor: pointer; 
            vertical-align: middle; 
            display: inline-block; 
            border-radius: 0.1875rem;
        }
        
        .loading { font-style: italic; color: var(--muted); padding: 0.625rem 0; font-size: 1.1rem; }
        
        .btn-download { 
            background: var(--btn-bg); 
            border: 0.0625rem solid var(--btn-border); 
            color: var(--text); 
            padding: 0.1875rem 0.5rem; 
            font-size: 1.1rem; 
            cursor: pointer; 
            text-decoration: none; 
            border-radius: 0.1875rem; 
        }
        .btn-download:hover { background: var(--row-hover); border-color: var(--text); }
        
        /* Informasi Tambahan kaki halaman */
        address { font-size: 0.95rem; }

        /* Lightbox (Tetap Hitam Pekat untuk Kontras Gambar) */
        #lightbox { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column; user-select: none; }
        #lightbox-img { max-width: 90%; max-height: 65%; border: 0.1875rem solid #fff; box-shadow: 0 0 1.25rem rgba(0,0,0,0.5); background: #222; }
        #lightbox-caption { color: #fff; margin-top: 0.9375rem; font-size: 1.2rem; text-align: center; max-width: 90%; font-family: monospace; line-height: 1.5; }
        .path-info { color: #00ffcc; font-size: 1rem; display: block; margin-top: 0.3125rem; }
        #lightbox-close { position: absolute; top: 0.9375rem; right: 1.25rem; color: #fff; font-size: 2.5rem; font-weight: bold; cursor: pointer; }
        
        .btn-lightbox-download {
            display: inline-block;
            margin-top: 0.75rem;
            background: #00ffcc;
            color: #000;
            border: 0.0625rem solid #00cc99;
            padding: 0.375rem 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            text-decoration: none;
            border-radius: 0.1875rem;
            box-shadow: 0 0.125rem 0.3125rem rgba(0,0,0,0.3);
        }
        .btn-lightbox-download:hover { background: #00ffea; box-shadow: 0 0.125rem 0.5rem rgba(0,255,204,0.5); }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; border: 0.0625rem solid rgba(255,255,255,0.3); font-size: 1.5rem; font-weight: bold; padding: 0.75rem 1rem; cursor: pointer; border-radius: 0.3125rem; }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        #nav-left { left: 0.625rem; }
        #nav-right { right: 0.625rem; }

        @media (min-width: 48rem) { /* 768px */
            body { padding: 1.25rem; }
            h1 { font-size: 1.75rem; }
            .brand-logo { width: 2.5rem; height: 2.5rem; }
            #nav-left { left: 1.25rem; }
            #nav-right { right: 1.25rem; }
            .nav-btn { font-size: 1.875rem; padding: 0.9375rem 1.25rem; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1><a href="#" onclick="changeDir('root'); return false;" id="index-title">Index of /img/</a></h1>
        <a href="/" aria-label="Beranda Layar Kosong"><img src="/favicon.svg" alt="Layar Kosong Logo" class="brand-logo"></a>
    </div>
    <hr>

    <div id="loading-text" class="loading">Loading directory contents...</div>

    <div class="table-responsive">
        <table id="dir-table" style="display: none;">
            <thead>
                <tr>
                    <th width="2%" onclick="sortTable('type')"> # <span id="sort-type"></span></th>
                    <th width="59%" onclick="sortTable('name')">Nama<span id="sort-name"></span></th>
                    <th width="4%" class="text-center" onclick="sortTable('items')">Jumlah<span id="sort-items"></span></th>
                    <th width="6%" class="text-right" onclick="sortTable('size')">Ukuran<span id="sort-size"></span></th>
                    <th width="8%" class="text-center" onclick="sortTable('dimension')">Dimensi<span id="sort-dimension"></span></th>
                    <th width="3%" class="text-center" onclick="sortTable('format')">Jenis<span id="sort-format"></span></th>
                    <th width="5%" onclick="sortTable('date')">Tanggal<span id="sort-date"></span></th>
                    <th width="13%" class="text-right">Tampilan</th>
                </tr>
            </thead>
            <tbody id="dir-list">
            </tbody>
        </table>
    </div>

    <hr>
    <address>Apache/2.4.31 server @ LayarKosong (Engineered via Bun + TS + Sharp & Cloudflare KV/Edge)</address>

    <div id="lightbox" onclick="closeLightbox()">
        <span id="lightbox-close" onclick="closeLightbox()">&times;</span>
        <button id="nav-left" class="nav-btn" onclick="prevImage(event)">&lt;</button>
        <button id="nav-right" class="nav-btn" onclick="nextImage(event)">&gt;</button>
        <img id="lightbox-img" src="" alt="Preview">
        <div id="lightbox-caption"></div>
    </div>

    <script>
        let masterData = {};
        let currentPath = "root";
        let currentImages = [];
        let currentImageIndex = -1;

        let currentSortKey = 'name';
        let currentSortAsc = true; 

        function formatSize(bytes) {
            if (!bytes || bytes === '-') return '-';
            const k = 1024;
            const sizes = ['B', 'K', 'M', 'G'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return i === 0 ? bytes + 'B' : (bytes / Math.pow(k, i)).toFixed(1) + sizes[i];
        }

        async function init() {
            const loadingText = document.getElementById('loading-text');
            const dirTable = document.getElementById('dir-table');
            try {
                const res = await fetch('galeri-data.json?t=' + Date.now());
                if (!res.ok) throw new Error(`Status: ${res.status}`);
                
                masterData = await res.json();
                loadingText.style.display = 'none';
                dirTable.style.display = 'table';
                
                renderPath(currentPath);
            } catch (err) {
                loadingText.innerHTML = `<div style="color:red; padding:10px; border:1px solid red; background:#fff0f0;"><strong>⚠️ Gagal Memuat Integrasi Galeri:</strong><br><small>${err.message}</small></div>`;
            }
        }

        function sortTable(key) {
            if (currentSortKey === key) {
                currentSortAsc = !currentSortAsc;
            } else {
                currentSortKey = key;
                currentSortAsc = true;
            }
            updateSortIndicators();
            renderPath(currentPath);
        }

        function updateSortIndicators() {
            const columns = ['type', 'name', 'items', 'size', 'dimension', 'format', 'date'];
            columns.forEach(col => {
                const indicator = document.getElementById(`sort-${col}`);
                if (indicator) indicator.innerText = col === currentSortKey ? (currentSortAsc ? ' ▲' : ' ▼') : '';
            });
        }

        /* Fungsi ini memotong ekstensi dari string nama file */
        function formatDisplayName(name) {
            if (name.endsWith('/')) return name;

            const lastDot = name.lastIndexOf('.');
            if (lastDot > 0 && lastDot < name.length - 1) {
                return name.substring(0, lastDot);
            }
            
            return name;
        }

        function renderPath(pathKey) {
            const dirList = document.getElementById('dir-list');
            const indexTitle = document.getElementById('index-title');
            
            dirList.innerHTML = '';
            indexTitle.innerText = `Index of /img/${pathKey === 'root' ? '' : pathKey + '/'}`;
            
            currentImages = [];
            let items = [...(masterData[pathKey] || [])];

            items.sort((a, b) => {
                if (a.type === 'dir' && b.type !== 'dir') return -1;
                if (a.type !== 'dir' && b.type === 'dir') return 1;

                let valA, valB;
                if (currentSortKey === 'dimension') {
                    valA = a.width ? a.width * a.height : 0;
                    valB = b.width ? b.width * b.height : 0;
                } else if (currentSortKey === 'size') {
                    valA = a.type === 'dir' ? 0 : Number(a.size || 0);
                    valB = b.type === 'dir' ? 0 : Number(b.size || 0);
                } else if (currentSortKey === 'items') {
                    valA = a.type === 'dir' ? Number(a.totalFiles || 0) : -1;
                    valB = b.type === 'dir' ? Number(b.totalFiles || 0) : -1;
                } else {
                    valA = String(a[currentSortKey] || '').toLowerCase();
                    valB = String(b[currentSortKey] || '').toLowerCase();
                }

                if (valA < valB) return currentSortAsc ? -1 : 1;
                if (valA > valB) return currentSortAsc ? 1 : -1;
                return 0;
            });

            if (pathKey !== 'root') {
                const parts = pathKey.split('/');
                parts.pop();
                const parentKey = parts.length === 0 ? 'root' : parts.join('/');
                dirList.appendChild(createRow('⏏️', 'Naik ke Atas', '-', '-', '-', '-', '-', '-', `changeDir('${parentKey}')`));
            }

            items.forEach(item => {
                if (item.type === 'dir') {
                    const countStr = item.totalFiles !== undefined ? `${item.totalFiles}` : '-';
                    dirList.appendChild(createRow('📂', item.name + '/', countStr, '-', '-', '-', '-', `<small style="color:var(--muted)">Direktori</small>`, `changeDir('${item.path}')`));
                } else {
                    const localPath = item.path; 
                    const localThumbPath = item.thumbPath ? item.thumbPath : localPath;
                    const dimStr = item.width ? `${item.width}x${item.height}` : 'N/A';
                    const fmtStr = item.format ? item.format.toUpperCase() : 'UNKNOWN';
                    
                    currentImages.push({ 
                        name: item.name, 
                        url: localPath, 
                        size: formatSize(item.size),
                        dimension: dimStr + ' px',
                        format: fmtStr,
                        date: item.date
                    });
                    const imgIndex = currentImages.length - 1;

                    const actionHtml = `
                        <img src="${localThumbPath}" class="preview-thumb" onclick="openLightbox(${imgIndex}); event.stopPropagation();" title="Preview">
                        <a href="${localPath}" download="${item.name}" class="btn-download" style="margin-left: 0.625rem;" onclick="event.stopPropagation();">Get</a>
                    `;

                    dirList.appendChild(createRow(
                        '🪟', 
                        item.name, 
                        '-',
                        formatSize(item.size), 
                        dimStr, 
                        fmtStr, 
                        item.date, 
                        actionHtml, 
                        `openLightbox(${imgIndex})`
                    ));
                }
            });
        }

        function createRow(icon, name, itemsCount, size, dimension, format, date, actionHtml, onclickAttr = '') {
            const row = document.createElement('tr');
            
            // Format namanya jadi tanpa ekstensi
            const displayName = formatDisplayName(name);

            // FIX: Atribut title="${name}" dihapus agar tidak muncul tooltip saat di-hover
            const linkHtml = onclickAttr
                ? `<a href="#" class="name-link" onclick="${onclickAttr}; return false;">${displayName}</a>`
                : displayName;
            
            row.innerHTML = `
                <td>${icon}</td>
                <td class="name-cell">${linkHtml}</td>
                <td class="text-center" style="color: var(--muted); font-size: 0.95em;">${itemsCount}</td>
                <td class="text-right">${size}</td>
                <td class="text-center">${dimension}</td>
                <td class="text-center">${format}</td>
                <td>${date}</td>
                <td class="text-right">${actionHtml}</td>
            `;
            return row;
        }

        function changeDir(pathKey) {
            currentPath = pathKey;
            renderPath(currentPath);
        }

        function openLightbox(index) {
            if (index < 0 || index >= currentImages.length) return;
            currentImageIndex = index;
            const img = currentImages[currentImageIndex];

            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCaption = document.getElementById('lightbox-caption');

            lightboxImg.src = img.url;
            
            lightboxCaption.innerHTML = `
                <strong>[ ${currentImageIndex + 1} / ${currentImages.length} ]</strong> - ${img.name}<br>
                <span class="path-info">
                    Format: <strong>${img.format}</strong> | Dimensi: <strong>${img.dimension}</strong> | Bobot: <strong>${img.size}</strong> | Dirilis: <strong>${img.date}</strong>
                </span>
                <a href="${img.url}" download="${img.name}" class="btn-lightbox-download" onclick="event.stopPropagation();">
                    💾 Download Image
                </a>
            `;
            
            lightbox.style.display = 'flex';
            document.getElementById('nav-left').style.display = currentImages.length > 1 ? 'block' : 'none';
            document.getElementById('nav-right').style.display = currentImages.length > 1 ? 'block' : 'none';
        }

        function closeLightbox() { 
            document.getElementById('lightbox').style.display = 'none'; 
            document.getElementById('lightbox-img').src = ''; 
        }
        
        function nextImage(e) { if(e) e.stopPropagation(); let idx = currentImageIndex + 1; if(idx >= currentImages.length) idx = 0; openLightbox(idx); }
        function prevImage(e) { if(e) e.stopPropagation(); let idx = currentImageIndex - 1; if(idx < 0) idx = currentImages.length - 1; openLightbox(idx); }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowRight') nextImage();
                if (e.key === 'ArrowLeft') prevImage();
            }
        });

        init();
    </script>
</body>
</html>
