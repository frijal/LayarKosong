<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /img/</title>
    <style>
        body { font-family: monospace; background: #fff; color: #000; padding: 20px; }
        h1 { font-size: 1.5em; margin-bottom: 5px; }
        hr { border: 0; border-top: 1px solid #000; margin: 10px 0; }
        table { width: 100%; max-width: 1200px; border-collapse: collapse; text-align: left; }
        th, td { padding: 6px 10px; white-space: nowrap; vertical-align: middle; }
        th { border-bottom: 1px solid #000; cursor: pointer; user-select: none; }
        th:hover { background: #f0f0f0; }
        a { color: #0000ee; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .preview-thumb { 
            width: 50px; 
            height: 40px; 
            object-fit: cover; 
            border: 1px solid #ccc; 
            cursor: pointer; 
            vertical-align: middle; 
            display: inline-block; 
            border-radius: 3px;
        }
        
        .loading { font-style: italic; color: #555; }
        .btn-download { background: #f0f0f0; border: 1px solid #aaa; color: #000; padding: 2px 6px; font-size: 0.9em; cursor: pointer; text-decoration: none; border-radius: 3px; }
        .btn-download:hover { background: #e0e0e0; text-decoration: none; border-color: #555; }
        
        #lightbox { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column; user-select: none; }
        #lightbox-img { max-width: 85%; max-height: 70%; border: 3px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #222; }
        #lightbox-caption { color: #fff; margin-top: 15px; font-size: 1.1em; text-align: center; max-width: 90%; font-family: monospace; line-height: 1.5; }
        .path-info { color: #00ffcc; font-size: 0.9em; display: block; margin-top: 5px; }
        #lightbox-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; }
        
        .btn-lightbox-download {
            display: inline-block;
            margin-top: 12px;
            background: #00ffcc;
            color: #000;
            border: 1px solid #00cc99;
            padding: 5px 14px;
            font-size: 0.95em;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            text-decoration: none;
            border-radius: 3px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: 0.1s;
        }
        .btn-lightbox-download:hover { background: #00ffea; box-shadow: 0 2px 8px rgba(0,255,204,0.5); text-decoration: none; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); font-size: 30px; font-weight: bold; padding: 15px 20px; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        .nav-btn:hover { background: rgba(255,255,255,0.3); }
        #nav-left { left: 20px; }
        #nav-right { right: 20px; }
    </style>
</head>
<body>

    <h1 id="index-title">Index of /img/</h1>
    <hr>

    <div id="loading-text" class="loading">Loading directory contents...</div>

    <table id="dir-table" style="display: none;">
        <thead>
            <tr>
                <th width="5%" onclick="sortTable('type')">Icon<span id="sort-type"></span></th>
                <th width="40%" onclick="sortTable('name')">Name<span id="sort-name">▲</span></th>
                <th width="10%" class="text-right" onclick="sortTable('size')">Size<span id="sort-size"></span></th>
                <th width="15%" class="text-center" onclick="sortTable('dimension')">Dimension<span id="sort-dimension"></span></th>
                <th width="8%" class="text-center" onclick="sortTable('format')">Format<span id="sort-format"></span></th>
                <th width="12%" onclick="sortTable('date')">Date Modified<span id="sort-date"></span></th>
                <th width="10%" class="text-right">Preview</th>
            </tr>
        </thead>
        <tbody id="dir-list">
        </tbody>
    </table>

    <hr>
    <address>Apache/2.4.41 Server at LayarKosong (Engineered via Bun + TS + Sharp & Cloudflare KV/Edge)</address>

    <div id="lightbox" onclick="closeLightbox()">
        <span id="lightbox-close" onclick="closeLightbox()">&times;</span>
        <button id="nav-left" class="nav-btn" onclick="prevImage(event)">&lt;</button>
        <button id="nav-right" class="nav-btn" onclick="nextImage(event)">&gt;</button>
        <img id="lightbox-img" src="" alt="Preview">
        <div id="lightbox-caption"></div>
    </div>

    <script>
        let masterData = {};
        let currentPath = "root";
        let currentImages = [];
        let currentImageIndex = -1;

        let currentSortKey = 'name';
        let currentSortAsc = true; 

        function formatSize(bytes) {
            if (!bytes || bytes === '-') return '-';
            const k = 1024;
            const sizes = ['B', 'K', 'M', 'G'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return i === 0 ? bytes + 'B' : (bytes / Math.pow(k, i)).toFixed(1) + sizes[i];
        }

        async function init() {
            const loadingText = document.getElementById('loading-text');
            const dirTable = document.getElementById('dir-table');
            try {
                const res = await fetch('galeri-data.json?t=' + Date.now());
                if (!res.ok) throw new Error(`Status: ${res.status}`);
                
                masterData = await res.json();
                loadingText.style.display = 'none';
                dirTable.style.display = 'table';
                
                renderPath(currentPath);
            } catch (err) {
                loadingText.innerHTML = `<div style="color:red; padding:10px; border:1px solid red; background:#fff0f0;"><strong>⚠️ Gagal Memuat Integrasi Galeri:</strong><br><small>${err.message}</small></div>`;
            }
        }

        function sortTable(key) {
            if (currentSortKey === key) {
                currentSortAsc = !currentSortAsc;
            } else {
                currentSortKey = key;
                currentSortAsc = true;
            }
            updateSortIndicators();
            renderPath(currentPath);
        }

        function updateSortIndicators() {
            const columns = ['type', 'name', 'size', 'dimension', 'format', 'date'];
            columns.forEach(col => {
                const indicator = document.getElementById(`sort-${col}`);
                if (indicator) indicator.innerText = col === currentSortKey ? (currentSortAsc ? ' ▲' : ' ▼') : '';
            });
        }

        function renderPath(pathKey) {
            const dirList = document.getElementById('dir-list');
            const indexTitle = document.getElementById('index-title');
            
            dirList.innerHTML = '';
            indexTitle.innerText = `Index of /img/${pathKey === 'root' ? '' : pathKey + '/'}`;
            
            currentImages = [];
            let items = [...(masterData[pathKey] || [])];

            items.sort((a, b) => {
                if (a.type === 'dir' && b.type !== 'dir') return -1;
                if (a.type !== 'dir' && b.type === 'dir') return 1;

                let valA, valB;
                if (currentSortKey === 'dimension') {
                    valA = a.width ? a.width * a.height : 0;
                    valB = b.width ? b.width * b.height : 0;
                } else if (currentSortKey === 'size') {
                    valA = a.type === 'dir' ? 0 : Number(a.size || 0);
                    valB = b.type === 'dir' ? 0 : Number(b.size || 0);
                } else {
                    valA = String(a[currentSortKey] || '').toLowerCase();
                    valB = String(b[currentSortKey] || '').toLowerCase();
                }

                if (valA < valB) return currentSortAsc ? -1 : 1;
                if (valA > valB) return currentSortAsc ? 1 : -1;
                return 0;
            });

            // FIX: Navigasi naik ke tingkat folder sebelumnya
            if (pathKey !== 'root') {
                const parts = pathKey.split('/');
                parts.pop();
                const parentKey = parts.length === 0 ? 'root' : parts.join('/');
                dirList.appendChild(createRow('📁', 'Parent Directory', '-', '-', '-', '-', '-', `changeDir('${parentKey}')`));
            }

            items.forEach(item => {
                if (item.type === 'dir') {
                    dirList.appendChild(createRow('📁', item.name + '/', '-', '-', '-', '-', `<small style="color:#666">Directory</small>`, `changeDir('${item.path}')`));
                } else {
                    const localPath = item.path; 
                    const localThumbPath = item.thumbPath ? item.thumbPath : localPath;
                    const dimStr = item.width ? `${item.width}x${item.height}` : 'N/A';
                    const fmtStr = item.format ? item.format.toUpperCase() : 'UNKNOWN';
                    
                    currentImages.push({ 
                        name: item.name, 
                        url: localPath, 
                        size: formatSize(item.size),
                        dimension: dimStr + ' px',
                        format: fmtStr,
                        date: item.date
                    });
                    const imgIndex = currentImages.length - 1;

                    const actionHtml = `
                        <img src="${localThumbPath}" class="preview-thumb" onclick="openLightbox(${imgIndex}); event.stopPropagation();" title="Preview">
                        <a href="${localPath}" download="${item.name}" class="btn-download" style="margin-left: 10px;" onclick="event.stopPropagation();">Get</a>
                    `;

                    dirList.appendChild(createRow(
                        '🖼️', 
                        item.name, 
                        formatSize(item.size), 
                        dimStr, 
                        fmtStr, 
                        item.date, 
                        actionHtml, 
                        `openLightbox(${imgIndex})`
                    ));
                }
            });
        }

        function createRow(icon, name, size, dimension, format, date, actionHtml, onclickAttr = '') {
            const row = document.createElement('tr');
            const linkHtml = onclickAttr ? `<a href="#" onclick="${onclickAttr}; return false;">${name}</a>` : name;
            
            row.innerHTML = `
                <td>${icon}</td>
                <td>${linkHtml}</td>
                <td class="text-right">${size}</td>
                <td class="text-center">${dimension}</td>
                <td class="text-center">${format}</td>
                <td>${date}</td>
                <td class="text-right">${actionHtml}</td>
            `;
            return row;
        }

        function changeDir(pathKey) {
            currentPath = pathKey;
            renderPath(currentPath);
        }

        function openLightbox(index) {
            if (index < 0 || index >= currentImages.length) return;
            currentImageIndex = index;
            const img = currentImages[currentImageIndex];

            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCaption = document.getElementById('lightbox-caption');

            lightboxImg.src = img.url;
            
            lightboxCaption.innerHTML = `
                <strong>[ ${currentImageIndex + 1} / ${currentImages.length} ]</strong> - ${img.name}<br>
                <span class="path-info">
                    Format: <strong>${img.format}</strong> | Dimensi: <strong>${img.dimension}</strong> | Bobot: <strong>${img.size}</strong> | Dirilis: <strong>${img.date}</strong>
                </span>
                <a href="${img.url}" download="${img.name}" class="btn-lightbox-download" onclick="event.stopPropagation();">
                    💾 Download Image
                </a>
            `;
            
            lightbox.style.display = 'flex';
            document.getElementById('nav-left').style.display = currentImages.length > 1 ? 'block' : 'none';
            document.getElementById('nav-right').style.display = currentImages.length > 1 ? 'block' : 'none';
        }

        function closeLightbox() { 
            document.getElementById('lightbox').style.display = 'none'; 
            document.getElementById('lightbox-img').src = ''; 
        }
        
        function nextImage(e) { if(e) e.stopPropagation(); let idx = currentImageIndex + 1; if(idx >= currentImages.length) idx = 0; openLightbox(idx); }
        function prevImage(e) { if(e) e.stopPropagation(); let idx = currentImageIndex - 1; if(idx < 0) idx = currentImages.length - 1; openLightbox(idx); }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowRight') nextImage();
                if (e.key === 'ArrowLeft') prevImage();
            }
        });

        init();
    </script>
</body>
</html>
