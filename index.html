/*
=========================================================
  Theme Full Width Optimized CSS
  Mobile First + Auto Dark Mode
  Optimized from provided HTML structure & WCAG Compliant
=========================================================
*/

:root {
  --bg-color: #ffffff;
  --text-color: #333333;
  --text-muted: #555555;

  --border-color: #e0e0e0;
  --card-bg: #f9f9f9;
  --hover-color: #eef2ff;

  --primary-color: #4f46e5;
  --btn-text: #ffffff;

  --footer-bg: #1a1a1a;
  --footer-text: #ffffff;

  --shadow: 0 2px 4px rgba(0, 0, 0, .1);
  --transition: .3s ease;

  --facebook: #1877f2;
  --github: #ffffff;
  --linkedin: #0a66c2;
  --telegram: #229ed9;
  --threads: #ffffff;
  --twitter: #1da1f2;
  --youtube: #ff0000;
  --mastodon: #6364ff;
  --discord: #5865f2;
}

@media (prefers-color-scheme: dark) {
  html:not(.light) {
    --bg-color: #121212;
    --text-color: #f5f5f5;
    --text-muted: #a3a3a3;

    --border-color: #333333;
    --card-bg: #1e1e1e;
    --hover-color: #2a2a2a;

    --primary-color: #818cf8;
    --btn-text: #121212;

    --shadow: 0 2px 4px rgba(255,255,255,.05);
  }
}

html.dark {
  --bg-color: #121212;
  --text-color: #f5f5f5;
  --text-muted: #a3a3a3;

  --border-color: #333333;
  --card-bg: #1e1e1e;
  --hover-color: #2a2a2a;

  --primary-color: #818cf8;
  --btn-text: #121212;

  --shadow: 0 2px 4px rgba(255,255,255,.05);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-color);
  color: var(--text-color);
  line-height: 1.6;
  transition: background-color var(--transition), color var(--transition);
}

a {
  color: inherit;
  text-decoration: none;
}

/* =========================================
   Top Bar
   ========================================= */

.top-bar {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  padding: .75rem 1rem;
  background: var(--bg-color);
  box-shadow: var(--shadow);
  position: relative;
  z-index: 1000;
}

.brand {
  display: flex;
  align-items: center;
  gap: .625rem;
  font-size: 1.5rem;
  font-weight: 700;
}

.logo-icon {
  width: 24px;
  height: 24px;
  object-fit: contain;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.1));
}

.nav-buttons {
  display: flex;
  gap: .625rem;
  overflow-x: auto;
  scrollbar-width: none;
}

.nav-buttons::-webkit-scrollbar {
  display: none;
}

.controls {
  display: flex;
  align-items: center;
  gap: .625rem;
  flex-wrap: wrap;
}

.search-container {
  position: relative;
  flex: 1;
  min-width: 180px;
}

.search-input,
select {
  width: 100%;
  padding: .5rem .75rem;
  border: 1px solid var(--border-color);
  border-radius: .5rem;
  background: var(--card-bg);
  color: var(--text-color);
}

.search-input {
  padding-right: 2.2rem;
  border-radius: 999px;
}

.clear-btn {
  position: absolute;
  right: .75rem;
  top: 50%;
  transform: translateY(-50%);
  border: 0;
  background: transparent;
  cursor: pointer;
  color: var(--text-color);
}

.search-input:placeholder-shown + .clear-btn {
  display: none;
}

.theme-toggle {
  width: 2.25rem;
  height: 2.25rem;
  border-radius: 50%;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-color);
  cursor: pointer;
}

/* =========================================
   Main Layout & Sidebar
   ========================================= */

.container {
  width: 100%;
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}

.main-col {
  flex: 1 1 auto;
  min-width: 0;
}

.sidebar {
  flex: 0 0 auto;
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: .75rem;
  padding: 1.25rem;
}

.sidebar h2 {
  font-size: 1.3rem;
  margin-bottom: 1rem;
  padding-bottom: .5rem;
  border-bottom: 2px solid var(--primary-color);
}

/* =========================================
   Hero Slider
   ========================================= */

#hero {
  width: 100%;
  height: 400px;
  overflow: hidden;
  border-radius: .75rem;
  margin-bottom: 2rem;
}

#heroSliderWrapper {
  display: flex;
  height: 100%;
  transition: transform .5s ease;
}

.hero-slide {
  min-width: 100%;
  display: flex;
  align-items: flex-end;
  background-size: cover;
  background-position: center;
  position: relative;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(transparent, rgba(0,0,0,.8));
}

.hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 2.5rem 1.25rem 1.25rem;
  color: #fff;
}

/* =========================================
   Article Grid & Cards
   ========================================= */

.articles-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.25rem;
}

.card {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: .5rem;
  transition: transform var(--transition), box-shadow var(--transition);
  content-visibility: auto;
  contain-intrinsic-size: 300px;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.card-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-body {
  padding: 1rem;
}

.card-title {
  font-size: 1.1rem;
  margin-bottom: .5rem;
}

.card-excerpt,
.article-date {
  color: var(--text-muted);
}

#loadMore {
  width: 100%;
  padding: .9rem;
  margin-top: 1.25rem;
  border: 1px solid var(--border-color);
  border-radius: .5rem;
  background: var(--card-bg);
  color: var(--text-color);
  cursor: pointer;
}

#loadMore:hover {
  background: var(--hover-color);
}

/* =========================================
   Category Pills
   ========================================= */

#categoryPills {
  display: flex;
  flex-wrap: wrap;
  gap: .625rem;
}

.pill {
  padding: .5rem 1rem;
  border: 1px solid var(--border-color);
  border-radius: 999px;
  cursor: pointer;
}

.pill.active,
.pill:hover {
  background: var(--primary-color);
  color: var(--btn-text);
  border-color: var(--primary-color);
}

/* =========================================
   Footer (Mobile First)
   ========================================= */

footer {
  margin-top: 2.5rem;
  padding: 2.5rem 1.25rem;
  background: var(--footer-bg);
  color: var(--footer-text);
}

.footer-content {
  display: flex;
  flex-direction: column;
  text-align: center; /* Teks tengah untuk mobile */
  gap: 1.5rem;
}

.footer-section p {
  font-weight: 700;
  color: var(--footer-text); /* FIX: Sebelumnya var(--text-main) */
}

/* Penyatuan tata letak elemen footer */
.social-links,
.footer-links {
  display: flex;
  flex-wrap: wrap;
  justify-content: center; /* Rata tengah di mobile */
  gap: .9rem;
}

.social-links a,
.footer-links a {
  transition: .3s ease;
  color: var(--text-muted);
}

.social-links i {
  font-size: 1.5rem;
}

.social-links a:hover,
.footer-links a:hover {
  color: var(--primary-color);
  transform: translateY(-2px);
}

/* Inject warna brand sosmed */
.social-links .fa-facebook { color: var(--facebook); }
.social-links .fa-github { color: var(--github); }
.social-links .fa-square-linkedin { color: var(--linkedin); }
.social-links .fa-telegram { color: var(--telegram); }
.social-links .fa-threads { color: var(--threads); }
.social-links .fa-youtube { color: var(--youtube); }
.social-links .fa-mastodon { color: var(--mastodon); }
.social-links .fa-twitter { color: var(--twitter); }
.social-links .fa-discord { color: var(--discord); }

.footer-copyright {
  font-size: .75rem;
  color: var(--text-muted);
}

/* =========================================
   Desktop Breakpoint (Min 768px)
   ========================================= */

@media (min-width: 768px) {
  /* Layout Top Bar */
  .top-bar {
    position: sticky;
    top: 0;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
  .controls {
    flex-wrap: nowrap;
    width: auto;
  }
  .search-container {
    flex: 0 1 240px;
  }

  /* Layout Main Body */
  .container {
    flex-direction: row;
  }
  .sidebar {
    flex: 0 0 320px;
    position: sticky;
    top: 80px; /* Biar sidebar turun dikit gak nabrak top bar */
  }
  .articles-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  /* Layout Footer */
  .footer-content {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    text-align: left;
  }
  .social-links,
  .footer-links {
    justify-content: flex-start;
  }
  .footer-copyright {
    text-align: right; /* Copyright mepet kanan di desktop */
  }
}
</style>

  <!-- 2. Script Theme Toggle (Dark/Light Mode) -->
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const htmlEl = document.documentElement;
    const icon = themeToggle.querySelector('i');

    // Cek localStorage atau system preference
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      htmlEl.classList.add('dark');
      icon.classList.replace('fa-moon', 'fa-sun');
    }

    // Eksekusi ketika tombol diklik
    themeToggle.addEventListener('click', () => {
      htmlEl.classList.toggle('dark');

      if (htmlEl.classList.contains('dark')) {
        localStorage.theme = 'dark';
        icon.classList.replace('fa-moon', 'fa-sun');
      } else {
        htmlEl.classList.remove('dark');
        htmlEl.classList.add('light'); // Paksa mode terang, nimpa prefers-color-scheme bawaan browser
        localStorage.theme = 'light';
        icon.classList.replace('fa-sun', 'fa-moon');
      }
    });
  </script>
