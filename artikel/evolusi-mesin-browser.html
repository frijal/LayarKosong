<body><h1>Evolusi Mesin Browser: Garis Keturunan HTML Rendering Engine</h1>
  <div class="title">🧬 Evolusi Mesin Browser (Interactive Lineage)</div>
  <div id="tooltip" class="tooltip"></div>
  <svg id="diagram" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
    <!-- Definisi panah animasi -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="var(--arrow)"></polygon>
      </marker>
    </defs>
    <!-- Header node -->
    <rect x="250" y="20" width="400" height="50" rx="10" fill="none" stroke="var(--line)" stroke-width="2"></rect>
    <text x="450" y="50" text-anchor="middle" font-size="16" font-weight="bold">
      HTML Rendering Engines Lineage
    </text>
    <!-- Garis penghubung + panah -->
    <line x1="250" y1="120" x2="450" y2="220" class="arrow"></line>
    <line x1="450" y1="220" x2="650" y2="320" class="arrow"></line>
    <line x1="650" y1="320" x2="650" y2="440" class="arrow"></line>
    <!-- Node: KHTML -->
    <g class="node" data-title="1998 — KHTML" data-info="Dibuat untuk Konqueror, browser milik proyek KDE (lingkungan desktop di Linux). Ini adalah mesin rendering HTML pertama dalam rantai ini.">
      <circle cx="250" cy="120" r="45" fill="var(--khtml)"></circle>
      <image href="https://dalam.web.id/img/raw.githubusercontent.com/a2e68245f7d3e50b.svg" x="220" y="90" width="60" height="60"></image>
      <text x="250" y="180" text-anchor="middle" fill="var(--text)" class="label">KHTML</text>
      <text x="250" y="200" text-anchor="middle" font-size="12">1998 · KDE</text>
    </g>
    <!-- Node: WebKit -->
    <g class="node" data-title="2001 — WebKit" data-info="Apple melakukan fork dari KHTML untuk membangun WebKit, yang kemudian digunakan pada Safari. WebKit menjadi dasar utama bagi banyak browser, termasuk versi awal Google Chrome.">
      <circle cx="450" cy="220" r="45" fill="var(--webkit)"></circle>
      <image href="https://dalam.web.id/img/raw.githubusercontent.com/810b796ad46223fb.svg" x="420" y="190" width="60" height="60"></image>
      <text x="450" y="280" text-anchor="middle" fill="var(--text)" class="label">WebKit</text>
      <text x="450" y="300" text-anchor="middle" font-size="12">2001 · Apple</text>
    </g>
    <!-- Node: Chromium -->
    <g class="node" data-title="2008 — Chromium" data-info="Google merilis proyek open-source Chromium, yang awalnya juga menggunakan WebKit sebagai mesin rendernya. Chromium menjadi basis bagi Google Chrome, Microsoft Edge (versi baru), dan browser lainnya.">
      <circle cx="650" cy="320" r="45" fill="var(--chromium)"></circle>
      <image href="https://dalam.web.id/img/raw.githubusercontent.com/f57f4bcb601d38a.svg" x="620" y="290" width="60" height="60"></image>
      <text x="650" y="380" text-anchor="middle" fill="var(--text)" class="label">Chromium</text>
      <text x="650" y="400" text-anchor="middle" font-size="12">2008 · Google</text>
    </g>
    <!-- Node: Blink -->
    <g class="node" data-title="2013 — Blink" data-info="Google mem-fork WebKit dan menciptakan Blink, yang kini digunakan oleh Chromium, Chrome, Edge, Opera, Brave, dan lain-lain.">
      <circle cx="650" cy="440" r="45" fill="var(--blink)"></circle>
      <image href="https://dalam.web.id/img/raw.githubusercontent.com/cf60eb791747000c.svg" x="620" y="410" width="60" height="60"></image>
      <text x="650" y="500" text-anchor="middle" fill="var(--text)" class="label">Blink</text>
      <text x="650" y="520" text-anchor="middle" font-size="12">2013 · Google</text>
    </g>
  </svg>

  <script>
    const tooltip = document.getElementById("tooltip");
    const nodes = document.querySelectorAll(".node");
    nodes.forEach(node => {
      node.addEventListener("mousemove", e => {
        const title = node.dataset.title;
        const info = node.dataset.info;
        tooltip.innerHTML = `<strong>${title}</strong><br>${info}`;
        tooltip.style.opacity = 1;
        tooltip.style.left = (e.pageX + 15) + "px";
        tooltip.style.top = (e.pageY - 20) + "px";
      });
      node.addEventListener("mouseleave", () => {
        tooltip.style.opacity = 0;
      });
    });
  </script>
