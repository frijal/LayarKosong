    <style>
      :root {
        --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        --bg-color: #121212;
        --surface-color: #1e1e1e;
        --primary-text-color: #e0e0e0;
        --secondary-text-color: #b3b3b3;
        --accent-color: #03dac6;
        --border-color: #2c2c2c;
        --shadow-color: rgba(3, 218, 198, 0.1);
        --error-bg: #4e1a1a;
        --error-text: #ffc4c4;
        --error-border: #a83c3c;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg-color: #f4f4f9;
          --surface-color: #ffffff;
          --primary-text-color: #212121;
          --secondary-text-color: #666666;
          --accent-color: #009688;
          --border-color: #e0e0e0;
          --shadow-color: rgba(0, 150, 136, 0.15);
          --error-bg: #ffebee;
          --error-text: #c62828;
          --error-border: #ef9a9a;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background-color: var(--bg-color);
        color: var(--primary-text-color);
        line-height: 1.7;
        transition: background-color 0.3s, color 0.3s;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      h1 {
        text-align: center;
        color: var(--accent-color);
        margin-bottom: 2.5rem;
        font-size: 2.5rem;
      }
      #feed-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1.5rem;
      }
      .feed-item {
        background-color: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s;
      }
      .feed-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px var(--shadow-color);
      }
      .feed-item-thumbnail {
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: #333;
        overflow: hidden;
      }
      .feed-item-thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 1;
      }
      .feed-item-content {
        padding: 1.5rem;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }
      .feed-item-content h2 {
        margin-bottom: 0.5rem;
        font-size: 1.25rem;
      }
      .feed-item-content h2 a {
        color: var(--primary-text-color);
        text-decoration: none;
        transition: color 0.3s;
      }
      .feed-item-content h2 a:hover {
        color: var(--accent-color);
      }
      .feed-meta {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem 1rem;
        font-size: 0.8rem;
        color: var(--secondary-text-color);
        margin-bottom: 1rem;
      }
      .feed-meta-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .feed-meta-item i {
        color: var(--accent-color);
      }
      .feed-item-content p {
        color: var(--secondary-text-color);
        font-size: 0.9rem;
      }
      .social-share {
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
        display: flex;
        gap: 0.8rem;
        align-items: center;
      }
      .social-share span {
        font-size: 0.8rem;
        color: var(--secondary-text-color);
      }
      .social-share a {
        font-size: 1.2rem;
        color: var(--secondary-text-color);
        transition: color 0.3s ease, transform 0.3s ease;
      }
      .social-share a:hover {
        transform: scale(1.2);
        color: var(--accent-color);
      }
      .error-message {
        background-color: var(--error-bg);
        color: var(--error-text);
        border: 1px solid var(--error-border);
        padding: 1rem;
        border-radius: 8px;
        text-align: center;
      }
      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }
        .feed-item-content h2 {
          font-size: 1.25rem;
        }
      }
