    <style>
      :root {
        --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

        /* Tema Gelap (Default & Preferensi Sistem) */
        --bg-color: #121212;
        --surface-color: #1e1e1e;
        --primary-text-color: #f8f9fa;
        --secondary-text-color: #adb5bd;
        --accent-color: #F6821F; /* Brand Orange */
        --accent-hover: #E06B0F;
        --border-color: #2c2c2c;
        --shadow-color: rgba(0, 0, 0, 0.4);
        --badge-bg: #2b2b2b;
      }

      @media (prefers-color-scheme: light) {
        :root {
          /* Tema Terang */
          --bg-color: #f4f4f9;
          --surface-color: #ffffff;
          --primary-text-color: #212529;
          --secondary-text-color: #6c757d;
          --accent-color: #F6821F; /* Brand Orange */
          --accent-hover: #E06B0F;
          --border-color: #e9ecef;
          --shadow-color: rgba(0, 0, 0, 0.08);
          --badge-bg: #f1f3f5;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg-color);
        color: var(--primary-text-color);
        line-height: 1.6;
        transition: background-color 0.3s, color 0.3s;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 3rem 1.5rem;
      }

      h1 {
        text-align: center;
        color: var(--primary-text-color);
        margin-bottom: 3rem;
        font-size: 2.25rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      /* Grid Layout */
      #feed-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 2rem;
      }

      /* Card Styling */
      .feed-item {
        background-color: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .feed-item:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 24px var(--shadow-color);
      }

      .feed-item-thumbnail {
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: var(--border-color);
        overflow: hidden;
      }

      .feed-item-thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }

      .feed-item:hover .feed-item-thumbnail img {
        transform: scale(1.05);
      }

      .feed-item-content {
        padding: 1.5rem;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      /* Pil/Badge Kategori & Tanggal */
      .feed-meta {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .feed-meta-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background-color: var(--badge-bg);
        color: var(--secondary-text-color);
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .feed-meta-item i {
        color: var(--accent-color);
      }

      .feed-item-content h2 {
        margin-bottom: 0.75rem;
        font-size: 1.2rem;
        line-height: 1.4;
        font-weight: 700;
      }

      .feed-item-content h2 a {
        color: var(--primary-text-color);
        text-decoration: none;
        transition: color 0.2s;
      }

      .feed-item-content h2 a:hover {
        color: var(--accent-color);
      }

      .feed-item-content p {
        color: var(--secondary-text-color);
        font-size: 0.9rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
        flex-grow: 1;
      }

      /* Bagian Social Share */
      .social-share {
        padding-top: 1.25rem;
        border-top: 1px solid var(--border-color);
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .social-share span {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--secondary-text-color);
        margin-right: auto; /* Mendorong ikon ke kanan */
      }

      .social-share a {
        font-size: 1.1rem;
        color: var(--secondary-text-color);
        text-decoration: none;
        transition: color 0.2s ease, transform 0.2s ease;
      }

      .social-share a:hover {
        transform: translateY(-2px);
        color: var(--accent-color);
      }

      @media (max-width: 768px) {
        .container {
          padding: 2rem 1rem;
        }
        h1 {
          font-size: 1.75rem;
        }
        #feed-container {
          grid-template-columns: 1fr;
          gap: 1.5rem;
        }
      }
