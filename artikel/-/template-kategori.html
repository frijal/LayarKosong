    <style>
      :root {
        --bg-color: #121212;
        --bg-color-translucent: rgba(18, 18, 18, 0.85);
        --surface-color: #1e1e1e;
        --primary-text-color: #e0e0e0;
        --secondary-text-color: #b3b3b3;
        --accent-color: #3da9fc;
        --border-color: #2c2c2c;
        --shadow-color: rgba(61, 169, 252, 0.1);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg-color: #f4f4f9;
          --bg-color-translucent: rgba(244, 244, 249, 0.85);
          --surface-color: #ffffff;
          --primary-text-color: #212121;
          --secondary-text-color: #666666;
          --accent-color: #007bff;
          --border-color: #e0e0e0;
          --shadow-color: rgba(0, 123, 255, 0.15);
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--bg-color);
        color: var(--primary-text-color);
        line-height: 1.7;
        padding-top: 8rem;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .new-header {
        background-color: var(--surface-color);
        border-bottom: 1px solid var(--border-color);
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        z-index: 50;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .new-header-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
      }
      .header-bottom-row {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 1rem;
        min-width: 0;
      }
      .new-header h1 {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--accent-color);
        font-size: 1.25rem;
        margin: 0;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .new-header .rss-link {
        color: var(--accent-color);
        text-decoration: none;
        font-size: 1.2rem;
        vertical-align: middle;
        transition: color 0.2s ease;
        flex-shrink: 0;
      }
      .new-header .rss-link:hover {
        color: orange;
      }
      .header-logo-container {
        display: none;
        align-items: center;
      }
      .header-logo {
        height: 1.5rem;
        width: auto;
      }
      .header-search {
        position: relative;
        width: 100%;
        max-width: 350px;
        min-width: 0;
      }
      .search-input {
        font-family: 'Poppins', sans-serif;
        width: 100%;
        padding: 0.5rem 1rem 0.5rem 2.5rem;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 0.9rem;
        background-color: var(--surface-color);
        color: var(--primary-text-color);
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .search-input:focus {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 2px var(--accent-color);
      }
      .search-icon {
        position: absolute;
        top: 50%;
        left: 0.75rem;
        transform: translateY(-50%);
        color: var(--secondary-text-color);
        font-size: 1rem;
        pointer-events: none;
      }
      @media (min-width: 640px) {
        .header-logo-container {
          display: flex;
          margin-bottom: 0.5rem;
        }
        .new-header h1 {
          font-size: 1.75rem;
        }
      }
      #article-grid {
        display: grid;
        gap: 1.5rem;
        grid-template-columns: 1fr;
      }
      @media (min-width: 600px) {
        #article-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 1024px) {
        #article-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }
      .article-card {
        background-color: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        box-shadow: 0 4px 15px var(--shadow-color);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        text-decoration: none;
      }
      .article-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px var(--shadow-color);
      }
      .card-thumbnail {
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: #333;
        overflow: hidden;
      }
      .card-thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .card-content {
        padding: 1.5rem;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }
      .card-content h2 {
        color: var(--primary-text-color);
        margin-bottom: 0.5rem;
        font-size: 1.25rem;
      }
      .card-content p {
        color: var(--secondary-text-color);
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .card-meta {
        margin-top: auto;
        font-size: 0.8rem;
        color: var(--secondary-text-color);
      }
      #loading, .message {
        text-align: center;
        margin-top: 3rem;
        font-size: 1.1rem;
        color: var(--secondary-text-color);
      }
      /* CSS Noscript - Jaga-jaga jika JS mati */
      .noscript-msg {
        background: #ff6b6b;
        color: white;
        text-align: center;
        padding: 1rem;
        font-weight: bold;
        position: fixed;
        bottom: 0;
        width: 100%;
        z-index: 100;
      }
    </style>
  </head>
