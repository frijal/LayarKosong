    <style>
      :root {
        --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

        /* Tema Gelap (Default) */
        --bg-color: #121212;
        --surface-color: #1e1e1e;
        --header-bg: rgba(30, 30, 30, 0.85); /* Transparan untuk efek blur */
        --primary-text-color: #f8f9fa;
        --secondary-text-color: #adb5bd;
        --accent-color: #F6821F; /* Brand Orange */
        --accent-hover: #E06B0F;
        --border-color: #2c2c2c;
        --shadow-color: rgba(0, 0, 0, 0.4);
        --badge-bg: #2b2b2b;
      }

      @media (prefers-color-scheme: light) {
        :root {
          /* Tema Terang */
          --bg-color: #f4f4f9;
          --surface-color: #ffffff;
          --header-bg: rgba(255, 255, 255, 0.85);
          --primary-text-color: #212529;
          --secondary-text-color: #6c757d;
          --accent-color: #F6821F; /* Brand Orange */
          --accent-hover: #E06B0F;
          --border-color: #e9ecef;
          --shadow-color: rgba(0, 0, 0, 0.08);
          --badge-bg: #f1f3f5;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg-color);
        color: var(--primary-text-color);
        line-height: 1.7;
        padding-top: 7rem; /* Ruang untuk header fixed */
        transition: background-color 0.3s, color 0.3s;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }

      /* Header Modern & Glassmorphism */
      .new-header {
        background-color: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-color);
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        z-index: 50;
        box-shadow: 0 4px 20px var(--shadow-color);
        transition: background-color 0.3s, border-color 0.3s;
      }

      .new-header-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0.8rem 1.5rem;
        display: flex;
        align-items: center;
        flex-direction: column;
        justify-content: center;
      }

      .header-bottom-row {
        display: flex;
        justify-content: space-between; /* Memberi jarak antara judul dan kotak pencarian */
        align-items: center;
        width: 100%;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 1rem;
        min-width: 0;
      }

      .new-header h1 {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--primary-text-color);
        font-size: 1.4rem;
        margin: 0;
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .new-header .rss-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--accent-color);
        text-decoration: none;
        font-size: 1.2rem;
        transition: transform 0.2s ease, color 0.2s ease;
      }

      .new-header .rss-link:hover {
        transform: scale(1.15);
        color: var(--accent-hover);
      }

      /* Logo Banner Kecil di Atas */
      .header-logo-container {
        display: none;
        align-items: center;
        opacity: 0.8;
      }

      .header-logo {
        height: 1.5rem;
        width: auto;
      }

      /* Search Box */
      .header-search {
        position: relative;
        width: 100%;
        max-width: 380px;
        min-width: 0;
        margin-left: auto; /* Mendorong ke kanan di mode desktop */
      }

      .search-input {
        font-family: var(--font-sans);
        width: 100%;
        padding: 0.6rem 1rem 0.6rem 2.5rem;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-size: 0.95rem;
        background-color: var(--surface-color);
        color: var(--primary-text-color);
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(246, 130, 31, 0.2);
      }

      .search-icon {
        position: absolute;
        top: 50%;
        left: 0.8rem;
        transform: translateY(-50%);
        color: var(--secondary-text-color);
        font-size: 1rem;
        pointer-events: none;
      }

      /* Grid Artikel */
      #article-grid {
        display: grid;
        gap: 1.5rem;
        grid-template-columns: 1fr;
      }

      @media (min-width: 600px) {
        #article-grid { grid-template-columns: repeat(2, 1fr); }
      }

      @media (min-width: 1024px) {
        #article-grid { grid-template-columns: repeat(4, 1fr); }
        .header-logo-container {
          display: flex;
          margin-bottom: 0.8rem;
        }
        .new-header h1 {
          font-size: 1.75rem;
        }
      }

      /* Styling Card Hasil Generate build.ts */
      .article-card {
        background-color: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        box-shadow: 0 4px 15px var(--shadow-color);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        text-decoration: none;
      }

      .article-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 25px var(--shadow-color);
      }

      .card-thumbnail {
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: var(--border-color);
        overflow: hidden;
      }

      .card-thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }

      .article-card:hover .card-thumbnail img {
        transform: scale(1.05);
      }

      .card-content {
        padding: 1.5rem;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      .card-content h2 {
        color: var(--primary-text-color);
        margin-bottom: 0.75rem;
        font-size: 1.2rem;
        line-height: 1.4;
        font-weight: 700;
        transition: color 0.2s ease;
      }

      .article-card:hover .card-content h2 {
        color: var(--accent-color);
      }

      .card-content p {
        color: var(--secondary-text-color);
        font-size: 0.9rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
        flex-grow: 1;
      }

      /* Ubah Tanggal Menjadi Badge/Pil */
      .card-meta {
        align-self: flex-start;
        display: inline-block;
        background-color: var(--badge-bg);
        color: var(--secondary-text-color);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .message {
        text-align: center;
        margin-top: 3rem;
        font-size: 1.1rem;
        color: var(--secondary-text-color);
      }

      .noscript-msg {
        background: #e63946;
        color: white;
        text-align: center;
        padding: 0.8rem;
        font-weight: 600;
        font-size: 0.9rem;
        width: 100%;
        border-radius: 8px;
        margin-bottom: 1rem;
      }

      @media (max-width: 600px) {
        body { padding-top: 8rem; }
        .header-bottom-row { justify-content: center; }
        .header-search { margin-left: 0; }
      }
    </style>
  </head>
