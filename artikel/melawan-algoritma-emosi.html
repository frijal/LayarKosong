<style>
  /* ===== CSS Variables: Mobile First ===== */
  :root {
    color-scheme: light;

    --bg-body: #f8fafc;
    --bg-card: #ffffff;
    --bg-soft: #fff4ed;
    --bg-soft-hover: #ffe4d5;

    --text-primary: #172033;
    --text-secondary: #334155;
    --text-muted: #475569;
    --heading-color: #0f172a;

    --accent: #c2410c;
    --accent-hover: #9a3412;
    --accent-text: #ffffff;

    --border-color: #cbd5e1;

    --quote-bg: #fff4ed;
    --quote-border: #c2410c;

    --warning-bg: #fff7ed;
    --warning-text: #7c2d12;

    --footer-text: #475569;

    --shadow-card: 0 0.75rem 2rem rgba(15, 23, 42, 0.08);
    --shadow-image: 0 0.5rem 1.5rem rgba(15, 23, 42, 0.12);

    --radius-sm: 0.45rem;
    --radius-md: 0.75rem;
    --radius-lg: 1rem;
    --radius-xl: 1.25rem;

    --max-width: 64rem;

    --screen-padding: 1rem;
    --nested-padding: 0rem;

    --space-2xs: 0.25rem;
    --space-xs: 0.35rem;
    --space-sm: 0.5rem;
    --space-md: 0.75rem;
    --space-lg: 1rem;
    --space-xl: 1.25rem;
    --space-2xl: 1.5rem;
    --space-3xl: 2rem;
    --space-4xl: 2.5rem;
    --space-5xl: 3rem;

    --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
    --font-arabic: "Noto Naskh Arabic", "Amiri", serif;
  }

  @media (min-width: 64rem) {
    :root {
      --screen-padding: 2.5rem;
      --nested-padding: 1.5rem;
    }
  }

  /* ===== Dark Mode ===== */
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;

      --bg-body: #0f172a;
      --bg-card: #172033;
      --bg-soft: #2a221b;
      --bg-soft-hover: #3a2c20;

      --text-primary: #f8fafc;
      --text-secondary: #d1d5db;
      --text-muted: #cbd5e1;
      --heading-color: #ffffff;

      --accent: #fb923c;
      --accent-hover: #fdba74;
      --accent-text: #1f1307;

      --border-color: #475569;

      --quote-bg: #2a221b;
      --quote-border: #fb923c;

      --warning-bg: #2b2117;
      --warning-text: #fde68a;

      --footer-text: #cbd5e1;

      --shadow-card: 0 1rem 2.5rem rgba(0, 0, 0, 0.38);
      --shadow-image: 0 0.75rem 2rem rgba(0, 0, 0, 0.45);
    }
  }

  /* ===== Reset & Base ===== */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  * {
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
    text-size-adjust: 100%;
  }

  body {
    min-height: 100vh;
    background: var(--bg-body);
    color: var(--text-primary);
    font-family: var(--font-main);
    font-size: 1rem;
    line-height: 1.75;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  @media (min-width: 64rem) {
    body {
      font-size: 1.125rem;
    }
  }

  /* ===== Container ===== */
  .container {
    width: min(100%, var(--max-width));
    margin: 0 auto;
    padding-inline: var(--screen-padding);
    padding-block: var(--space-2xl) var(--space-5xl);
  }

  .content-wrapper,
  article,
  .article-body,
  .nested-card {
    background: var(--bg-card);
    border: 0.0625rem solid var(--border-color);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card);
    padding-block: var(--space-3xl);
    padding-inline: var(--nested-padding);
  }

  /* ===== Typography ===== */
  h1,
  h2,
  h3,
  h4 {
    color: var(--heading-color);
    line-height: 1.25;
    letter-spacing: -0.015em;
  }

  h1 {
    color: var(--accent);
    font-size: 1.85rem;
    font-weight: 850;
    text-align: center;
    margin-block-end: var(--space-lg);
  }

  h2 {
    font-size: 1.4rem;
    font-weight: 800;
    border-block-end: 0.1875rem solid var(--accent);
    padding-block-end: var(--space-sm);
    margin-block: var(--space-4xl) var(--space-lg);
  }

  h3 {
    color: var(--accent);
    font-size: 1.2rem;
    font-weight: 750;
    margin-block: var(--space-2xl) var(--space-md);
  }

  h4 {
    font-size: 1.05rem;
    font-weight: 750;
    margin-block: var(--space-xl) var(--space-sm);
  }

  @media (min-width: 64rem) {
    h1 {
      font-size: 2.35rem;
    }

    h2 {
      font-size: 1.65rem;
    }

    h3 {
      font-size: 1.35rem;
    }
  }

  p {
    color: var(--text-secondary);
    margin-block-end: var(--space-lg);
  }

  strong,
  b {
    color: var(--heading-color);
    font-weight: 800;
  }

  .arabic,
  [lang="ar"] {
    font-family: var(--font-arabic);
    font-size: 1.35em;
    line-height: 2;
  }

  /* ===== Links & Focus ===== */
  a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.18em;
  }

  a:hover,
  a:focus-visible {
    color: var(--accent-hover);
  }

  a:focus-visible,
  button:focus-visible,
  .button:focus-visible,
  .btn:focus-visible,
  summary:focus-visible {
    outline: 0.18rem solid var(--accent);
    outline-offset: 0.2rem;
    border-radius: var(--radius-sm);
  }

  /* ===== Buttons ===== */
  button,
  .button,
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    background: var(--accent);
    color: var(--accent-text);
    border: 0.0625rem solid transparent;
    border-radius: var(--radius-md);
    padding-block: var(--space-sm);
    padding-inline: var(--space-lg);
    font: inherit;
    font-weight: 800;
    line-height: 1.4;
    text-decoration: none;
    cursor: pointer;
  }

  button:hover,
  .button:hover,
  .btn:hover {
    background: var(--accent-hover);
    color: var(--accent-text);
    text-decoration: none;
  }

  /* ===== Quote Box ===== */
  .quote-box {
    background: var(--quote-bg);
    border-inline-start: 0.3125rem solid var(--quote-border);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    color: var(--heading-color);
    font-style: italic;
    padding-block: var(--space-lg);
    padding-inline: var(--space-xl);
    margin-block: var(--space-2xl);
  }

  .quote-box p {
    color: inherit;
    margin-block-end: 0;
    text-align: start;
  }

  /* ===== Highlight Box ===== */
  .highlight-box {
    background: var(--warning-bg);
    color: var(--warning-text);
    border: 0.0625rem solid var(--accent);
    border-inline-start: 0.3125rem solid var(--accent);
    border-radius: var(--radius-md);
    padding-block: var(--space-lg);
    padding-inline: var(--space-xl);
    margin-block: var(--space-2xl);
    font-size: 1.05rem;
    font-weight: 550;
  }

  .highlight-box p:last-child {
    margin-block-end: 0;
  }

  /* ===== Images ===== */
  img {
    display: block;
    max-width: 100%;
    height: auto;
  }

  .image-container {
    margin-block: var(--space-3xl);
    text-align: center;
  }

  .image-container img {
    width: 100%;
    max-width: 100%;
    height: auto;
    object-fit: cover;
    background: var(--bg-soft);
    border: 0.0625rem solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-image);
    margin-inline: auto;
  }

  figure {
    margin-block: var(--space-3xl);
  }

  figcaption,
  .caption {
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.6;
    text-align: center;
    margin-block-start: var(--space-sm);
  }

  /* ===== Lists ===== */
  ul,
  ol {
    color: var(--text-secondary);
    margin-block: var(--space-md) var(--space-xl);
    padding-inline-start: 1.5rem;
  }

  li {
    margin-block-end: var(--space-sm);
  }

  li::marker {
    color: var(--accent);
  }

  .list-emoji {
    list-style: none;
    padding-inline-start: 0;
  }

  .list-emoji li {
    margin-block-end: var(--space-md);
  }

  /* ===== Table Wrap ===== */
  .table-wrap {
    max-width: 100%;
    overflow-x: auto;
    border: 0.0625rem solid var(--border-color);
    border-radius: var(--radius-lg);
    margin-block: var(--space-2xl);
  }

  table {
    width: 100%;
    min-width: 36rem;
    border-collapse: collapse;
    background: var(--bg-card);
    font-size: 0.95rem;
  }

  th,
  td {
    color: var(--text-primary);
    text-align: start;
    border-block-end: 0.0625rem solid var(--border-color);
    padding-block: var(--space-md);
    padding-inline: var(--space-lg);
  }

  th {
    background: var(--bg-soft);
    color: var(--heading-color);
    font-weight: 800;
  }

  tr:last-child td {
    border-block-end: none;
  }

  /* ===== Details / Summary Accordion ===== */
  details {
    overflow: hidden;
    background: var(--bg-card);
    border: 0.0625rem solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    margin-block: var(--space-2xl);
  }

  details[open] {
    border-color: var(--accent);
  }

  summary {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    list-style: none;
    user-select: none;
    background: var(--bg-soft);
    color: var(--heading-color);
    padding-block: var(--space-lg);
    padding-inline: var(--space-xl);
    font-size: 1.05rem;
    font-weight: 800;
    line-height: 1.45;
  }

  summary:hover {
    background: var(--bg-soft-hover);
    color: var(--accent);
  }

  summary::-webkit-details-marker {
    display: none;
  }

  summary::before {
    content: "▸";
    flex-shrink: 0;
    display: inline-block;
    color: var(--accent);
    font-size: 1.2rem;
    line-height: 1;
    transition: transform 0.2s ease;
  }

  details[open] summary::before {
    transform: rotate(90deg);
  }

  details > *:not(summary) {
    padding-inline: var(--space-xl);
  }

  details > :last-child {
    padding-block-end: var(--space-xl);
  }

  /* ===== Footer ===== */
  footer {
    color: var(--footer-text);
    border-block-start: 0.0625rem solid var(--border-color);
    text-align: center;
    font-size: 0.9rem;
    padding-block: var(--space-2xl);
    margin-block-start: var(--space-5xl);
  }

  footer p {
    color: var(--footer-text);
    margin-block-end: var(--space-sm);
  }

  footer a {
    color: var(--accent);
    font-weight: 800;
  }

  /* ===== Mobile Melt Effect: Anti Padding Inception ===== */
  @media (max-width: 40rem) {
    .container {
      padding-block: var(--space-xl) var(--space-3xl);
    }

    .content-wrapper,
    article,
    .article-body,
    .nested-card {
      background: transparent;
      border: none;
      box-shadow: none;
      border-radius: 0;
      padding-block: var(--space-lg);
      padding-inline: var(--nested-padding);
    }

    h1 {
      font-size: 1.8rem;
    }

    h2 {
      font-size: 1.35rem;
      border-block-end-width: 0.125rem;
    }

    h3 {
      font-size: 1.15rem;
    }

    .quote-box,
    .highlight-box {
      padding-inline: var(--space-lg);
    }

    .image-container img {
      border-radius: var(--radius-md);
    }

    .table-wrap {
      margin-inline: calc(var(--screen-padding) * -1);
      border-inline: none;
      border-radius: 0;
    }

    summary {
      font-size: 1rem;
      padding-block: var(--space-md);
      padding-inline: var(--space-lg);
    }

    details > *:not(summary) {
      padding-inline: var(--space-lg);
    }

    footer {
      font-size: 0.85rem;
    }
  }

  @media (max-width: 25rem) {
    h1 {
      font-size: 1.55rem;
    }

    h2 {
      font-size: 1.25rem;
    }

    h3 {
      font-size: 1.1rem;
    }
  }

  /* ===== Reduced Motion ===== */
  @media (prefers-reduced-motion: reduce) {
    html {
      scroll-behavior: auto;
    }

    *,
    *::before,
    *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }

  /* ===== Print Friendly ===== */
  @media print {
    :root {
      --bg-body: #ffffff;
      --bg-card: #ffffff;
      --bg-soft: #f3f4f6;
      --bg-soft-hover: #e5e7eb;

      --text-primary: #000000;
      --text-secondary: #1f2937;
      --text-muted: #1f2937;
      --heading-color: #000000;

      --accent: #111827;
      --accent-hover: #000000;
      --accent-text: #ffffff;

      --border-color: #9ca3af;

      --quote-bg: #ffffff;
      --quote-border: #111827;

      --warning-bg: #ffffff;
      --warning-text: #000000;

      --footer-text: #000000;

      --shadow-card: none;
      --shadow-image: none;
    }

    body {
      background: #ffffff;
      color: #000000;
    }

    .container {
      width: 100%;
      padding: 0;
    }

    a {
      color: #000000;
      text-decoration: underline;
    }

    .content-wrapper,
    article,
    .article-body,
    .nested-card,
    .quote-box,
    .highlight-box,
    .image-container,
    details,
    .table-wrap,
    footer {
      box-shadow: none;
      break-inside: avoid;
    }
  }
</style>
