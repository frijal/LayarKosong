<body>
<div class="container"><div id="iposbrowser"></div><h1>Kalkulator Persentase</h1>
    <h2>Hitung Cepat Akurat</h2>
    <div class="tabs">
        <button class="tab active" id="tab1" onclick="switchTab('perubahan')">Perubahan %</button>
        <button class="tab" id="tab2" onclick="switchTab('nilai')">Nilai Akhir</button>
    </div>
    <div id="formPerubahan">
        <div class="form-group">
            <label>Nilai Awal</label>
            <input type="text" id="awal1" placeholder="Contoh: 1.000" oninput="handleInput(this, 'perubahan')">
        </div>
        <div class="form-group">
            <label>Nilai Akhir</label>
            <input type="text" id="akhir1" placeholder="Contoh: 1.200" oninput="handleInput(this, 'perubahan')">
        </div>
    </div>
    <div id="formNilai" style="display:none;">
        <div class="form-group">
            <label>Nilai Utama</label>
            <input type="text" id="awal2" placeholder="Contoh: 50.000" oninput="handleInput(this, 'nilai')">
        </div>
     <div class="form-group">
            <label>Aksi</label>
            <select id="aksi" onchange="hitungNilai()">
                <option value="tambah">Penambahan (+)</option>
                <option value="kurang">Diskon / Pengurangan (-)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Persentase (%)</label>
            <input type="number" id="persen2" placeholder="Contoh: 10" oninput="hitungNilai()">
        </div>
       </div>
    <div id="resultWrapper">
        <div id="resultText" class="result-text">Hasil: 0</div>
        <button class="copy-btn" id="copyBtn" onclick="copyResult()">Salin</button>
    </div>
    <div class="history-section">
        <div class="history-header">
            <h3>Riwayat</h3>
            <button class="clear-btn" onclick="clearHistory()">Hapus Semua</button>
        </div>
        <div id="historyList"></div>
    </div> <div id="related-articles-grid"></div>
    <div id="response"></div>
</div>
<script>
    let currentResultValue = "";
    // Fungsi utama untuk menangani input dengan format ribuan
    function formatNumberInput(input) {
        // Hapus semua karakter kecuali angka
        let value = input.value.replace(/[^0-9]/g, "");
        // Simpan posisi kursor agar tidak melompat ke akhir
        let cursorPosition = input.selectionStart;
        let oldLength = input.value.length;
        if (value === "") {
            input.value = "";
            return 0;
        }
        // Ubah ke format ribuan (Indonesia menggunakan titik)
        let formatted = parseInt(value).toLocaleString('id-ID');
        input.value = formatted;
        // Koreksi posisi kursor setelah format
        let newLength = input.value.length;
        input.setSelectionRange(cursorPosition + (newLength - oldLength), cursorPosition + (newLength - oldLength));
        return parseInt(value);
    }
    function handleInput(el, type) {
        formatNumberInput(el);
        if (type === 'perubahan') hitungPerubahan();
        if (type === 'nilai') hitungNilai();
    }
    // Ambil nilai murni (integer) dari input yang berformat titik
    function getRawValue(id) {
        let val = document.getElementById(id).value.replace(/[^0-9]/g, "");
        return val === "" ? NaN : parseFloat(val);
    }
    function switchTab(tab) {
        document.getElementById('formPerubahan').style.display = tab === 'perubahan' ? 'block' : 'none';
        document.getElementById('formNilai').style.display = tab === 'nilai' ? 'block' : 'none';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('resultWrapper').style.display = 'none';
    }
    function hitungPerubahan() {
        const a = getRawValue('awal1');
        const b = getRawValue('akhir1');
        if (isNaN(a) || isNaN(b) || a === 0) return;
        const p = ((b - a) / a) * 100;
        const formatted = Number(p.toFixed(2)) + "%";
        const indicator = p >= 0 ? `<span class="text-up">↑ ${formatted}</span>` : `<span class="text-down">↓ ${formatted}</span>`;
        showResult(`Hasil: ${indicator}`, formatted);
        debouncedSave(`${a.toLocaleString('id-ID')} → ${b.toLocaleString('id-ID')} = ${indicator}`);
    }
    function hitungNilai() {
        const a = getRawValue('awal2');
        const p = parseFloat(document.getElementById('persen2').value);
        const aksi = document.getElementById('aksi').value;
        if (isNaN(a) || isNaN(p)) return;
        const akhir = aksi === 'tambah' ? a * (1 + (p/100)) : a * (1 - (p/100));
        const formatted = Math.round(akhir).toLocaleString('id-ID');
        showResult(`Hasil: ${formatted}`, formatted);
        const simbol = aksi === 'tambah' ? '+' : '-';
        debouncedSave(`${a.toLocaleString('id-ID')} ${simbol} ${p}% = <b>${formatted}</b>`);
    }
    function showResult(text, rawValue) {
        currentResultValue = rawValue;
        const wrapper = document.getElementById('resultWrapper');
        document.getElementById('resultText').innerHTML = text;
        wrapper.style.display = 'flex';
        document.getElementById('copyBtn').innerText = "Salin";
    }
    function copyResult() {
        navigator.clipboard.writeText(currentResultValue.replace(/[^0-9,%↑↓]/g, ""));
        document.getElementById('copyBtn').innerText = "Tersalin!";
        setTimeout(() => { document.getElementById('copyBtn').innerText = "Salin"; }, 2000);
    }
    // Debounce untuk menyimpan ke history
    let timer;
    function debouncedSave(text) {
        clearTimeout(timer);
        timer = setTimeout(() => saveHistory(text), 1500);
    }
    function saveHistory(entry) {
        let history = JSON.parse(localStorage.getItem('calc_history') || "[]");
        if (history[0] === entry) return;
        history.unshift(entry);
        localStorage.setItem('calc_history', JSON.stringify(history.slice(0, 5)));
        renderHistory();
    }
    function renderHistory() {
        const list = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('calc_history') || "[]");
        list.innerHTML = history.map(item => `<div class="history-item">${item}</div>`).join('');
    }
    function clearHistory() {
        localStorage.removeItem('calc_history');
        renderHistory();
    }
    window.onload = renderHistory;
</script>
