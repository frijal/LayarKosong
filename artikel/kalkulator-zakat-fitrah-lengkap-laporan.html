<body>

<div class="container">
    <!-- Header Khusus Cetak -->
    <div class="print-header">
        <h1 id="headerNama">Laporan Kalkulator Zakat Fitrah Keluarga</h1>
<div id="iposbrowser"></div>
        <p>Tanggal Pembayaran: <span id="printTanggal"></span></p>
        <p style="font-size: 12px; font-weight: normal;">Tahun 1447 H / 2026 M</p>
    </div>

    <h2 class="ui-title">Kalkulator Zakat Fitrah</h2>

    <div class="form-grid">
        <div class="form-group">
            <label>Kepala Keluarga / Perwakilan:</label>
            <input type="text" id="kepalaKeluarga" placeholder="Contoh: Bpk. Ahmad" oninput="updateHeader()">
        </div>
        <div class="form-group">
            <label>Tanggal Pembayaran:</label>
            <input type="date" id="tglBayar" oninput="updateHeader()">
        </div>
    </div>

    <div class="form-group">
        <label>Nama-nama Anggota Keluarga (Pisahkan dengan koma):</label>
        <textarea id="namaInput" placeholder="Contoh: Ahmad, Siti, Yusuf" oninput="updateTable()"></textarea>
    </div>

    <div class="form-group">
        <label>Berapa Harga Beras per Kg saat ini? (Rp):</label>
        <input type="number" id="hargaBeras" value="00" oninput="updateTable()">
    </div>

    <div class="result-grid">
        <div class="result-card">
            <small>Total Berat Beras</small>
            <span id="totalBeras">0</span> Kg
        </div>
        <div class="result-card">
            <small>Total Nilai Uang</small>
            <span id="totalUang">Rp 0</span>
        </div>
    </div>

    <table id="tabelZakat">
        <thead>
            <tr>
                <th style="width: 40px;">#</th>
                <th>Nama Muzakki (Pembayar)</th>
                <th>Kewajiban Zakat</th>
            </tr>
        </thead>
        <tbody id="daftarNama">
            <!-- Data baris akan diisi oleh JavaScript -->
        </tbody>
    </table>

    <button class="btn-print" onclick="window.print()">Cetak Laporan Kalkulator / Simpan PDF</button>
</div>

<script>
    // Set default tanggal hari ini
    document.getElementById('tglBayar').valueAsDate = new Date();
    updateHeader();

    function updateHeader() {
        const nama = document.getElementById('kepalaKeluarga').value;
        const tgl = document.getElementById('tglBayar').value;

        // Update Judul
        document.getElementById('headerNama').innerText = nama ? "Laporan Kalkulator Zakat Fitrah Keluarga " + nama : "Laporan Kalkulator Zakat Fitrah Keluarga";

        // Format Tanggal untuk tampilan cetak
        if(tgl) {
            const opsi = { year: 'numeric', month: 'long', day: 'numeric' };
            const tglFormat = new Date(tgl).toLocaleDateString('id-ID', opsi);
            document.getElementById('printTanggal').innerText = tglFormat;
        }
    }

    function updateTable() {
        const input = document.getElementById('namaInput').value;
        const harga = document.getElementById('hargaBeras').value || 0;
        const tbody = document.getElementById('daftarNama');

        tbody.innerHTML = "";

        const daftarNama = input.split(',').map(n => n.trim()).filter(n => n !== "");
        const jumlahOrang = daftarNama.length;

        daftarNama.forEach((nama, index) => {
            let row = `<tr>
                <td>${index + 1}</td>
                <td>${nama}</td>
                <td>2.5 Kg atau Rp ${(harga * 2.5).toLocaleString('id-ID')}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        const totalBeras = jumlahOrang * 2.5;
        const totalUang = totalBeras * harga;

        document.getElementById('totalBeras').innerText = totalBeras.toLocaleString('id-ID');
        document.getElementById('totalUang').innerText = "Rp " + totalUang.toLocaleString('id-ID');
    }
</script>
