<body>
<div class="no-print">
<h2 style="margin:0;">Mentari Label Generator</h2>
<div class="controls">
<div class="input-group">
<label>1. Sumber Data (CSV):</label>
<input type="file" id="csvFile" accept=".csv">
</div>
<div class="input-group">
<label>2. URL/Path Lokasi Logo:</label>
<input type="text" id="logoUrl" value="logommp.png" placeholder="https://link-gambar.com/logo.png" style="width: 250px;">
</div>
<div class="input-group" style="justify-content: flex-end;">
<button onclick="generateLabels()" style="padding: 8px 15px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; font-weight: bold;">PREVIEW</button>
</div>
<div class="input-group" style="justify-content: flex-end;">
<button onclick="window.print()" style="padding: 8px 20px; cursor: pointer; font-weight: bold; background: #27ae60; color: white; border: none; border-radius: 4px;">PRINT PDF</button>
</div>
</div><p>Pakai 4 kolom CSV, dengan susunan: NamaProduct, KodeBarang, Harga, Satuan</p>
</div>
<div id="main-output"></div>
<script>
function generateLabels() {
const fileInput = document.getElementById('csvFile');
const logoUrl = document.getElementById('logoUrl').value;
const file = fileInput.files[0];
if (!file) {
alert("Silakan pilih file CSV terlebih dahulu!");
return;
}
const reader = new FileReader();
reader.onload = function(event) {
const text = event.target.result;
const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
const dataRows = rows.slice(1);
const mainOutput = document.getElementById('main-output');
mainOutput.innerHTML = '';
const ITEMS_PER_PAGE = 24;
for (let i = 0; i < dataRows.length; i += ITEMS_PER_PAGE) {
const pageData = dataRows.slice(i, i + ITEMS_PER_PAGE);
const pageWrapper = document.createElement('div');
pageWrapper.className = 'page-wrapper';
const labelGrid = document.createElement('div');
labelGrid.className = 'label-grid';
pageData.forEach(row => {
const columns = row.split(',');
if (columns.length >= 4) {
const name = columns[0].trim();
const serial = columns[1].trim();
const priceRaw = columns[2].trim().replace(/[Rp.\s]/g, '').replace(/,/g, '');
const formattedPrice = new Intl.NumberFormat('id-ID').format(priceRaw);
const unit = columns[3].trim();
labelGrid.insertAdjacentHTML('beforeend', `
<div class="label-box">
<div class="product-name">${name}</div>
<div class="serial-number">${serial}</div>
<div class="price-row">
<span class="price-text">Rp ${formattedPrice},-</span>
<span class="unit-text"> /${unit}</span>
</div>
<div class="footer-logo">
<img src="${logoUrl}" alt="Logo" onerror="this.style.display='none'">
</div>
</div>
`);
}
});
pageWrapper.appendChild(labelGrid);
mainOutput.appendChild(pageWrapper);
}
};
reader.readAsText(file);
}
</script>
