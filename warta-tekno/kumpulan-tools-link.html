class="fa-solid fa-satellite-dish"></i> Super Bookmark Sync</h1><p>Scraper Bookmark otomatis &amp; Uploader Serverless. Tarik data visual dari URL, lalu tembak balik ke <b>/ext/tool-layarkosong.json</b> di GitHub.</p></header><main class="container"><aside class="panel"><h2><i class="fa-solid fa-shield-halved"></i> GitHub Auth</h2><div class="form-group"><label>Repository (Username/Repo)</label><input id="ghRepo" placeholder="frijal/namarepo"></div><div class="form-group"><label>GitHub Token (Classic/Fine-grained)</label><input id="ghToken" placeholder="ghp_xxxxxxxxx" type="password"></div><hr style="border:0;border-top:1px solid var(--border);margin:20px 0"><h2><i class="fa-solid fa-spider"></i> Tambah Link</h2><div class="form-group"><input id="urlInput" placeholder="https://contoh.com/artikel" type="url"></div><button class="btn btn-primary" id="crawlBtn"><i class="fa-solid fa-bolt"></i> Scrape &amp; Tambahkan</button><hr style="border:0;border-top:1px solid var(--border);margin:20px 0"><h2><i class="fa-solid fa-server"></i> Eksekusi Database</h2><button class="btn btn-success" id="syncBtn"><i class="fa-solid fa-cloud-arrow-up"></i> Tembak ke GitHub (ext/)</button><button class="btn btn-danger" id="deleteBtn"><i class="fa-solid fa-trash-can"></i> Hapus Link Terpilih</button><div id="statusBox">Memuat sistem...</div></aside><section class="panel"><div class="toolbar"><input placeholder="🔍 Cari judul, deskripsi, atau url..." id="searchInput"><select id="sortSelect"><option value="newest">Paling Baru Ditambah</option><option value="oldest">Paling Lama</option><option value="title">A-Z Judul</option></select></div><div class="grid" id="linkGrid"></div></section><footer><a rel="noopener noreferrer" href="/about" target="_blank">☕</a><a rel="noopener noreferrer" href="/data-deletion" target="_blank">🛡️</a><a rel="noopener noreferrer" href="/disclaimer" target="_blank">⚠️</a><a rel="noopener noreferrer" href="/disclosure" target="_blank">📝</a><a rel="noopener noreferrer" href="/lisensi" target="_blank">📚</a><a rel="noopener noreferrer" href="/privacy" target="_blank">🔰</a><a rel="noopener noreferrer" href="/security-policy" target="_blank">⚔️</a></footer></main><script>let db = [];
 const TARGET_FILE = 'dapur/tool-layarkosong.json'; // Path wajib
 // Helper UI Element
 const getEl = (id) => document.getElementById(id);
 const statusBox = getEl('statusBox');
 function showStatus(msg, type = 'info') {
 statusBox.style.display = 'block';
 let color = '#a1a1aa';
 if (type === 'error') color = 'var(--danger)';
 if (type === 'success') color = 'var(--success)';
 if (type === 'warning') color = '#fbbf24';
 statusBox.style.color = color;
 statusBox.innerHTML = msg;
 }
 // --- 1. INISIALISASI (LOAD DARI SERVER & CACHE TOKEN) ---
 async function init() {
 // Restore token & repo dari LocalStorage agar tak capek ngetik ulang
 getEl('ghRepo').value = localStorage.getItem('lk_gh_repo') || '';
 getEl('ghToken').value = localStorage.getItem('lk_gh_token') || '';
 try {
 showStatus('<i class="fa-solid fa-spinner fa-spin"></i> Menarik data live dari server...', 'info');
 // Panggil file JSON dari domain lokal (dirinya sendiri)
 const res = await fetch(`https://raw.githubusercontent.com/frijal/LayarKosong/main/dapur/tool-layarkosong.json?v=${Date.now()}`);
 if (res.ok) {
 db = await res.json();
 render();
 showStatus(`<i class="fa-solid fa-check"></i> Berhasil memuat ${db.length} bookmark dari server.`, 'success');
 } else {
 showStatus('<i class="fa-solid fa-circle-info"></i> JSON belum ada di server. Database mulai dari 0.', 'warning');
 }
 } catch (e) {
 showStatus('<i class="fa-solid fa-circle-info"></i> Mode lokal aktif. Memulai database baru.', 'warning');
 }
 }
 // --- 2. CRAWLER (MICROLINK API) ---
 async function crawlUrl() {
 const urlInput = getEl('urlInput');
 const url = urlInput.value.trim();
 if (!url) return showStatus("URL tidak boleh kosong!", 'error');
 showStatus('<i class="fa-solid fa-spinner fa-spin"></i> Sedang merayap diam-diam...', 'info');
 getEl('crawlBtn').disabled = true;
 try {
 const response = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`);
 const res = await response.json();
 if (res.status !== 'success') throw new Error("Microlink gagal mengekstrak URL ini.");
 const info = res.data;
 const entry = {
 id: Date.now(),
 url: info.url || url,
 title: info.title || "Tanpa Judul",
 desc: info.description || "Tidak ada deskripsi tersedia.",
 img: info.image?.url || info.screenshot?.url || '/thumbnail.webp',
 favicon: info.logo?.url || `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}`,
 date: new Date().toISOString()
 };
 if (db.find(i => i.url === entry.url)) {
 getEl('crawlBtn').disabled = false;
 return showStatus("⚠️ URL ini sudah ada di dalam database.", 'warning');
 }
 db.unshift(entry);
 render();
 urlInput.value = '';
 showStatus(`<i class="fa-solid fa-check"></i> Scrape sukses! "${entry.title}" ditambahkan ke memori.`, 'success');
 } catch (e) {
 showStatus(`<i class="fa-solid fa-triangle-exclamation"></i> Gagal merayap: ${e.message}`, 'error');
 }
 getEl('crawlBtn').disabled = false;
 }
 // --- 3. UPLOAD KE GITHUB (DENGAN LOGIKA OVERWRITE) ---
 // Helper untuk mengubah string Unicode/JSON ke Base64 dengan aman
 function utf8ToBase64(str) {
 return window.btoa(unescape(encodeURIComponent(str)));
 }
 async function syncToGitHub() {
 const token = getEl('ghToken').value.trim();
 const repo = getEl('ghRepo').value.trim();
 const syncBtn = getEl('syncBtn');
 if (!token || !repo) {
 return showStatus("❌ Isi Repository dan Token GitHub terlebih dahulu!", 'error');
 }
 // Simpan inputan ke cache browser
 localStorage.setItem('lk_gh_repo', repo);
 localStorage.setItem('lk_gh_token', token);
 syncBtn.disabled = true;
 showStatus('<i class="fa-solid fa-spinner fa-spin"></i> Memulai protokol Sinkronisasi GitHub...', 'info');
 const apiUrl = `https://api.github.com/repos/${repo}/contents/${TARGET_FILE}`;
 try {
 // TAHAP A: Curi SHA dari file yang sudah ada (Syarat mutlak untuk overwrite)
 let fileSha = null;
 const getRes = await fetch(apiUrl, {
 headers: { 'Authorization': `token ${token}` }
 });
 if (getRes.ok) {
 const getData = await getRes.json();
 fileSha = getData.sha;
 }
 // TAHAP B: Siapkan amunisi Base64
 const jsonString = JSON.stringify(db, null, 2);
 const base64Content = utf8ToBase64(jsonString);
 // TAHAP C: Tembak (PUT Request)
 const putBody = {
 message: `Auto-Sync: Update ${db.length} bookmark via Layar Kosong Tool`,
 content: base64Content
 };
 // Kalau file sudah ada, sertakan SHA-nya agar GitHub mengizinkan overwrite
 if (fileSha) putBody.sha = fileSha;
 const putRes = await fetch(apiUrl, {
 method: 'PUT',
 headers: {
 'Authorization': `token ${token}`,
 'Content-Type': 'application/json',
 },
 body: JSON.stringify(putBody)
 });
 const putData = await putRes.json();
 if (putRes.ok) {
 showStatus(`<i class="fa-solid fa-cloud-arrow-up"></i> Sempurna! Database berhasil mendarat di GitHub (<b>/${TARGET_FILE}</b>).`, 'success');
 } else {
 throw new Error(putData.message || "Token mungkin kedaluwarsa atau repo salah.");
 }
 } catch (err) {
 showStatus(`❌ Gagal Sync: ${err.message}`, 'error');
 }
 syncBtn.disabled = false;
 }
 // --- 4. HAPUS & RENDER VISUAL ---
 function deleteSelected() {
 const checked = document.querySelectorAll('.card-checkbox:checked');
 if (checked.length === 0) return alert("Centang dulu kartu mana yang mau dibuang!");
 if (confirm(`Yakin mau membakar ${checked.length} link dari memori? (Jangan lupa Sync setelahnya)`)) {
 const idsToDelete = Array.from(checked).map(cb => parseInt(cb.value));
 db = db.filter(item => !idsToDelete.includes(item.id));
 render();
 showStatus(`🗑️ ${checked.length} link berhasil dihapus dari memori.`, 'success');
 }
 }
 function render() {
 const grid = getEl('linkGrid');
 const search = getEl('searchInput').value.toLowerCase();
 const sort = getEl('sortSelect').value;
 let filtered = db.filter(i => (i.title+i.desc+i.url).toLowerCase().includes(search));
 if (sort === 'title') filtered.sort((a,b) => a.title.localeCompare(b.title));
 if (sort === 'oldest') filtered = [...filtered].reverse();
 grid.innerHTML = filtered.map(item => `
 <div class="card" id="card-${item.id}">
 <input type="checkbox" class="card-checkbox" value="${item.id}">
 <a href="${item.url}" target="_blank" class="card-link">
 <img src="${item.img}" class="card-img" loading="lazy" onerror="this.src='/thumbnail.webp'">
 <div class="card-body">
 <div class="card-title">
 <img src="${item.favicon}" onerror="this.style.display='none'">
 <span>${item.title}</span>
 </div>
 <p class="card-desc">${item.desc}</p>
 <div class="card-footer">${new URL(item.url).hostname}</div>
 </div>
 </a>
 </div>
 `).join('');
 }
 // --- 5. EVENT LISTENERS ---
