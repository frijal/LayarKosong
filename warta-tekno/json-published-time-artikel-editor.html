e"><hr><h3>Preview Diff</h3><div id="diffBox"></div><h3>Log</h3><pre id="log"></pre><script>let folderHandle=null;
let listHandle=null;
let listFile=null;
let fallbackFiles=[];
let allowedFiles=new Set();
let changes=[];
const logBox=document.getElementById("log");
const diffBox=document.getElementById("diffBox");
const log=m=>logBox.textContent+=m+"\n";
/* STRICT: harus ada "YYYY-MM-DDT */
const STRICT_REGEX = /"\d{4}-\d{2}-\d{2}T/g;
/* ===== PICKERS ===== */
pickFolder.onclick=async()=>{
 if(window.showDirectoryPicker){
 try{
 folderHandle=await showDirectoryPicker();
 fallbackFiles=[];
 log("✔ Folder dipilih (API)");
 return;
 }catch{}
 }
 folderFallback.click();
};
folderFallback.onchange=e=>{
 fallbackFiles=[...e.target.files];
 folderHandle=null;
 log(`✔ Folder fallback (${fallbackFiles.length} file)`);
};
pickList.onclick=async()=>{
 if(window.showOpenFilePicker){
 try{
 [listHandle]=await showOpenFilePicker({
 types:[{accept:{"text/plain":[".txt"]}}]
 });
 listFile=null;
 log("✔ ubahtanggal.txt dipilih (API)");
 return;
 }catch{}
 }
 listFallback.click();
};
listFallback.onchange=e=>{
 listFile=e.target.files[0];
 listHandle=null;
 log("✔ ubahtanggal.txt dipilih (fallback)");
};
/* ===== PREVIEW ===== */
preview.onclick=async()=>{
 diffBox.innerHTML="";
 logBox.textContent="";
 changes=[];
 allowedFiles.clear();
 const newDate=dateInput.value.trim();
 if(!/^\d{4}-\d{2}-\d{2}$/.test(newDate)){
 alert("Format tanggal harus YYYY-MM-DD");
 return;
 }
 if((!folderHandle&&!fallbackFiles.length)||(!listHandle&&!listFile)){
 alert("Folder dan ubahtanggal.txt wajib dipilih");
 return;
 }
 const txt=listHandle
 ? await (await listHandle.getFile()).text()
 : await listFile.text();
 txt.split(/\r?\n/)
 .map(v=>v.trim())
 .filter(Boolean)
 .forEach(f=>allowedFiles.add(f));
 for(const name of allowedFiles){
 try{
 let html,file;
 if(folderHandle){
 const fh=await folderHandle.getFileHandle(name);
 file=await fh.getFile();
 html=await file.text();
 }else{
 file=fallbackFiles.find(f=>f.name===name);
 if(!file){log(`⚠ Tidak ada: ${name}`);continue;}
 html=await file.text();
 }
 if(!STRICT_REGEX.test(html)){
 log(`⚠ Pola tidak ditemukan: ${name}`);
 continue;
 }
 const beforeMatches=[...html.matchAll(STRICT_REGEX)]
 .map(m=>m[0]);
 const newHtml=html.replace(
 STRICT_REGEX,
 `"${newDate}T`
 );
 const afterMatches=[...newHtml.matchAll(STRICT_REGEX)]
 .map(m=>m[0]);
 changes.push({name,html:newHtml});
 diffBox.innerHTML+=`
<div class="diff">
<strong>${name}</strong><br>
<del>${beforeMatches[0]}</del><br>
<ins>"${newDate}T</ins>
</div>`;
 }catch{
 log(`✖ Gagal proses: ${name}`);
 }
 }
 log(`Preview selesai (${changes.length} file)`);
};
/* ===== APPLY ===== */
apply.onclick=async()=>{
 if(!changes.length){
 alert("Tidak ada perubahan untuk diterapkan");
 return;
 }
 if(!confirm("Yakin menerapkan perubahan ke file?")){
 return;
 }
 for(const f of changes){
 try{
 if(folderHandle){
 const fh=await folderHandle.getFileHandle(f.name);
 const w=await fh.createWritable();
 await w.write(f.html);
 await w.close();
 log(`✔ Updated ${f.name}`);
 }else{
 const a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([f.html],{type:"text/html"}));
 a.download=f.name;
 a.click();
 log(`⬇ Download ${f.name}`);
 }
 }catch{
 log(`✖ Gagal tulis ${f.name}`);
 }
 }
};</script><div id="progress"></div><a href="https://dalam.web.id/" id="layar-kosong-header"></a><div class="search-floating-container"><input placeholder="cari artikel..." autocomplete="off" id="floatingSearchInput"><span class="clear-button" id="floatingSearchClear"></span><div class="floating-results-container" id="floatingSearchResults"></div></div><div id="internal-nav"></div><script defer="" src="/ext/marquee-url.js"></script><script defer="" src="/ext/iposbrowser.js"></script><script defer="" src="/ext/lightbox.js"></script><script defer="" src="/ext/response.js"></script><script defer="" src="/ext/balon-cf.js"></script><script>if('modelContext' in navigator){navigator.modelContext.provideContext({tools:[{name:"baca_llms_index",description:"Mengambil daftar lengkap artikel Layar Kosong",inputSchema:{type:"object",properties:{}},execute:async()=>{const res=await fetch('/llms.txt');return await res.text()}}]})}</script><noscript>schema_oleh_Fakhrul_Rijal_2026-06-29</noscript><noscript>minify_oleh_Fakhrul_Rijal</noscript></body></html>
