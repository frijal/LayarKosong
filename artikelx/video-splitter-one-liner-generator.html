<body>
<div class="container">
    <div id="iposbrowser"></div><h1>🎬 Video Splitter One-Liner</h1>
    <label>Nama File Video (Sumber):</label>
    <p class="copy-hint">💡 Posisi terminal sekarang udah berada di dalam folder lokasi video asli berada.</p>
    <input type="text" id="fileName" value="ganti-dengan-nama-video.mp4">
    <label>Durasi per Bagian (detik):</label>
    <input type="number" id="duration" value="20">
    <button class="btn-gen" onclick="generateScript()">Generate One-Liner Command</button>
    <div class="flex-header">
        <label>Salin &amp; Tempel di Terminal:</label>
        <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">Salin Kode</button>
    </div>
    <pre id="output"># Klik tombol di atas untuk generate perintah...</pre>
    <p class="copy-hint">💡 Tip: Pastikan FFmpeg dan bc sudah terinstal di sistem kamu.</p>
    <div id="related-articles-grid"></div><div id="response"></div>
</div>
<script>
function generateScript() {
    const file = document.getElementById('fileName').value;
    const dur = document.getElementById('duration').value;
    const oneLiner = `INPUT="${file}"; DURATION=${dur}; LEN=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$INPUT"); START=0; COUNT=0; while (( $(echo "$START < $LEN" | bc -l) )); do OUTPUT="part_$COUNT.mp4"; ffmpeg -hide_banner -loglevel error -i "$INPUT" -ss $START -t $DURATION -c copy "$OUTPUT" && echo "Berhasil: $OUTPUT"; START=$(echo "$START + $DURATION" | bc); COUNT=$((COUNT+1)); done; echo "Selesai!"`;
    document.getElementById('output').textContent = oneLiner;
    // Reset teks tombol salin jika generate ulang
    document.getElementById('copyBtn').textContent = "Salin Kode";
    document.getElementById('copyBtn').style.background = "#28a745";
}
function copyToClipboard() {
    const copyText = document.getElementById("output").textContent;
    if (copyText.startsWith("#")) return; // Jangan salin jika belum di-generate
    navigator.clipboard.writeText(copyText).then(() => {
        const btn = document.getElementById("copyBtn");
        btn.textContent = "Tersalin!";
        btn.style.background = "#555";
        setTimeout(() => {
            btn.textContent = "Salin Kode";
            btn.style.background = "#28a745";
        }, 2000);
    });
}
</script>
