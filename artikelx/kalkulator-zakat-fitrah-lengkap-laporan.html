        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* Header Laporan Kalkulator Cetak */

        .print-header h1 { margin: 0; color: #1b5e20; text-transform: uppercase; font-size: 20px; }
        .print-header p { margin: 5px 0; font-size: 14px; font-weight: bold; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; font-family: inherit; }

        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .result-card { background: #f1f8e9; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #c8e6c9; }
        .result-card small { color: #2e7d32; display: block; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; font-size: 11px; }
        .result-card span { font-size: 1.5em; font-weight: bold; color: #1b5e20; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #2e7d32; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .btn-print { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 6px;
                     cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        .btn-print:hover { background: #1b5e20; }

        /* Pengaturan Cetak (A4) */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; border: none; }
            .btn-print, .form-group, .form-grid, .ui-title { display: none; }
            .print-header { display: block; }
            .result-card { border: 1px solid #ddd; background: #fff !important; }
            th { background-color: #f0f0f0 !important; color: black !important; border: 1px solid #333; }

<body>

<div class="container">
    <!-- Header Khusus Cetak -->
    <div class="print-header">
        <h1 id="headerNama">Laporan Kalkulator Zakat Fitrah Keluarga</h1>
        <p>Tanggal Pembayaran: <span id="printTanggal"></span></p>
        <p style="font-size: 12px; font-weight: normal;">Tahun 1447 H / 2026 M</p>
    </div>

    <h2 class="ui-title">Kalkulator Zakat Fitrah</h2>

    <div class="form-grid">
        <div class="form-group">
            <label>Kepala Keluarga / Perwakilan:</label>
            <input type="text" id="kepalaKeluarga" placeholder="Contoh: Bpk. Ahmad" oninput="updateHeader()">
        </div>
        <div class="form-group">
            <label>Tanggal Pembayaran:</label>
            <input type="date" id="tglBayar" oninput="updateHeader()">
        </div>
    </div>

    <div class="form-group">
        <label>Nama-nama Anggota Keluarga (Pisahkan dengan koma):</label>
        <textarea id="namaInput" placeholder="Contoh: Ahmad, Siti, Yusuf" oninput="updateTable()"></textarea>
    </div>

    <div class="form-group">
        <label>Harga Beras per Kg saat ini, (Rp):</label>
        <input type="number" id="hargaBeras" value="15000" oninput="updateTable()">
    </div>

    <div class="result-grid">
        <div class="result-card">
            <small>Total Berat Beras</small>
            <span id="totalBeras">0</span> Kg
        </div>
        <div class="result-card">
            <small>Total Nilai Uang</small>
            <span id="totalUang">Rp 0</span>
        </div>
    </div>

    <table id="tabelZakat">
        <thead>
            <tr>
                <th style="width: 40px;">#</th>
                <th>Nama Muzakki (Pembayar)</th>
                <th>Kewajiban Zakat</th>
            </tr>
        </thead>
        <tbody id="daftarNama">
            <!-- Data baris akan diisi oleh JavaScript -->
        </tbody>
    </table>

    <button class="btn-print" onclick="window.print()">Cetak Laporan Kalkulator / Simpan PDF</button>
</div>

<script>
    // Set default tanggal hari ini
    document.getElementById('tglBayar').valueAsDate = new Date();
    updateHeader();

    function updateHeader() {
        const nama = document.getElementById('kepalaKeluarga').value;
        const tgl = document.getElementById('tglBayar').value;

        // Update Judul
        document.getElementById('headerNama').innerText = nama ? "Laporan Kalkulator Zakat Fitrah Keluarga " + nama : "Laporan Kalkulator Zakat Fitrah Keluarga";

        // Format Tanggal untuk tampilan cetak
        if(tgl) {
            const opsi = { year: 'numeric', month: 'long', day: 'numeric' };
            const tglFormat = new Date(tgl).toLocaleDateString('id-ID', opsi);
            document.getElementById('printTanggal').innerText = tglFormat;
        }
    }

    function updateTable() {
        const input = document.getElementById('namaInput').value;
        const harga = document.getElementById('hargaBeras').value || 0;
        const tbody = document.getElementById('daftarNama');

        tbody.innerHTML = "";

        const daftarNama = input.split(',').map(n => n.trim()).filter(n => n !== "");
        const jumlahOrang = daftarNama.length;

        daftarNama.forEach((nama, index) => {
            let row = `<tr>
                <td>${index + 1}</td>
                <td>${nama}</td>
                <td>2.5 Kg atau Rp ${(harga * 2.5).toLocaleString('id-ID')}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        const totalBeras = jumlahOrang * 2.5;
        const totalUang = totalBeras * harga;

        document.getElementById('totalBeras').innerText = totalBeras.toLocaleString('id-ID');
        document.getElementById('totalUang').innerText = "Rp " + totalUang.toLocaleString('id-ID');
    }
</script>

</body>
