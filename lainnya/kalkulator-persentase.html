si</label><select id=aksi><option value=tambah>Tambah (+)<option value=kurang>Kurang (-)</select></div><div class=input-group><label>Persentase (%)</label><input id=persen2 type=number></div><button onclick=hitungNilai()>Hitung Nilai Akhir</button></div><div class=result-container id=resultWrapper><div class=result-text id=resultText></div><button class=btn-copy id=copyBtn onclick=copyResult()>Salin</button></div></div><div class=history-card><strong style=margin-bottom:10px;display:block>Riwayat</strong><div id=historyList></div></div></div><script>let currentResult = "";

 function showResult(text, rawValue) {

 }
 function copyResult() {
 navigator.clipboard.writeText(currentResult).then(() => {

 });
 }
 function addHistory(text) {
 const list = document.getElementById('historyList');
 const item = document.createElement('div');
 item.className = 'history-item';
 item.innerHTML = `<span>${text}</span>`;
 list.insertBefore(item, list.firstChild);
 }
 function hitungPerubahan() {
 const a = parseFloat(document.getElementById('awal1').value);
 const b = parseFloat(document.getElementById('akhir1').value);
 if(isNaN(a) || isNaN(b) || a === 0) return alert("Masukkan angka valid");
 const p = ((b - a) / a) * 100;
 const formatted = p.toFixed(2) + "%";
 showResult(`Hasil: ${formatted}`, formatted);
 addHistory(`${a.toLocaleString()} → ${b.toLocaleString()} = ${formatted}`);
 }
 function hitungNilai() {
 const a = parseFloat(document.getElementById('awal2').value);
 const p = parseFloat(document.getElementById('persen2').value);
 const aksi = document.getElementById('aksi').value;
 if(isNaN(a) || isNaN(p)) return alert("Masukkan angka valid");
 let akhir = aksi === 'tambah' ? a * (1 + (p/100)) : a * (1 - (p/100));
 const formatted = akhir.toLocaleString();

 addHistory(`${a.toLocaleString()} ${aksi === 'tambah' ? '+' : '-'} ${p}% = ${formatted}`);
