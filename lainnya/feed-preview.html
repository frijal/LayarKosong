    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elInput = document.getElementById('feed-url-input');
            const elBtnLoad = document.getElementById('btn-load');
            const elLoading = document.getElementById('loading-state');
            const elError = document.getElementById('error-state');
            const elErrorMsg = document.getElementById('error-msg');
            const elContent = document.getElementById('feed-content');
            const elItemsContainer = document.getElementById('items-container');
            const elBtnCopy = document.getElementById('btn-copy-raw');
            let currentRawUrl = '';
            const params = new URLSearchParams(window.location.search);
            const feedParam = params.get('feed');
            if (feedParam) {
                elInput.value = feedParam;
                fetchAndRenderFeed(feedParam);
            } else {
                elInput.value = '/rss.rss';
                fetchAndRenderFeed('/rss.rss');
            }
            elBtnLoad.addEventListener('click', () => {
                if (elInput.value.trim()) fetchAndRenderFeed(elInput.value.trim());
            });
            elInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && elInput.value.trim()) fetchAndRenderFeed(elInput.value.trim());
            });
            elBtnCopy.addEventListener('click', async () => {
                try {
                    const absoluteUrl = new URL(currentRawUrl, window.location.origin).href;
                    await navigator.clipboard.writeText(absoluteUrl);
                    const originalHtml = elBtnCopy.innerHTML;
                    elBtnCopy.innerHTML = `<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg><span class="text-green-500">Tersalin!</span>`;
                    setTimeout(() => elBtnCopy.innerHTML = originalHtml, 2000);
                } catch (err) {
                    console.error('Gagal menyalin:', err);
                }
            });
            async function fetchAndRenderFeed(url) {
                currentRawUrl = url;
                window.history.replaceState({}, '', `?feed=${encodeURIComponent(url)}`);
                elContent.classList.add('hidden');
                elError.classList.add('hidden');
                elLoading.classList.remove('hidden');
                elLoading.classList.add('flex');
                elItemsContainer.innerHTML = '';
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const xmlText = await response.text();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    const parseError = xmlDoc.querySelector('parsererror');
                    if (parseError) throw new Error('Dokumen XML tidak valid.');
                    const parsedData = parseUniversalFeed(xmlDoc);
                    renderUI(parsedData);
                } catch (error) {
                    elLoading.classList.add('hidden');
                    elLoading.classList.remove('flex');
                    elError.classList.remove('hidden');
                    elErrorMsg.textContent = error.message + " (Pastikan CORS mengizinkan jika fetch dari domain luar).";
                }
            }
            function parseUniversalFeed(xml) {
                const isAtom = xml.querySelector('feed') !== null;
                const extractImage = (node) => {
                    let img = node.querySelector('enclosure')?.getAttribute('url') ||
                              node.querySelector('link[rel="enclosure"]')?.getAttribute('href');
                    if (!img) {
                        const mediaContent = node.getElementsByTagName('media:content')[0] || node.getElementsByTagNameNS('*', 'content')[0];
                        if (mediaContent && mediaContent.getAttribute('url')) {
                            img = mediaContent.getAttribute('url');
                        }
                    }
                    if (!img) {
                        const mediaThumb = node.getElementsByTagName('media:thumbnail')[0] || node.getElementsByTagNameNS('*', 'thumbnail')[0];
                        if (mediaThumb && mediaThumb.getAttribute('url')) {
                            img = mediaThumb.getAttribute('url');
                        }
                    }
                    return img || '';
                };
                if (isAtom) {
                    return {
                        type: 'Atom',
                        title: xml.querySelector('feed > title')?.textContent || 'Tanpa Judul',
                        desc: xml.querySelector('feed > subtitle')?.textContent || '',
                        link: xml.querySelector('feed > link[rel="alternate"]')?.getAttribute('href') || xml.querySelector('feed > link:not([rel="self"])')?.getAttribute('href') || '#',
                        items: Array.from(xml.querySelectorAll('entry')).map(entry => {
                            const summaryNode = entry.querySelector('summary') || entry.querySelector('content');
                            return {
                                title: entry.querySelector('title')?.textContent || 'Tanpa Judul',
                                link: entry.querySelector('link[rel="alternate"]')?.getAttribute('href') || entry.querySelector('link')?.getAttribute('href') || '#',
                                date: entry.querySelector('updated')?.textContent || entry.querySelector('published')?.textContent,
                                desc: stripHtml(summaryNode?.textContent || ''),
                                image: extractImage(entry)
                            };
                        })
                    };
                } else {
                    return {
                        type: 'RSS 2.0',
                        title: xml.querySelector('channel > title')?.textContent || 'Tanpa Judul',
                        desc: xml.querySelector('channel > description')?.textContent || '',
                        link: xml.querySelector('channel > link')?.textContent || '#',
                        items: Array.from(xml.querySelectorAll('item')).map(item => {
                            return {
                                title: item.querySelector('title')?.textContent || 'Tanpa Judul',
                                link: item.querySelector('link')?.textContent || item.querySelector('guid')?.textContent || '#',
                                date: item.querySelector('pubDate')?.textContent,
                                desc: stripHtml(item.querySelector('description')?.textContent || ''),
                                image: extractImage(item)
                            };
                        })
                    };
                }
            }
            function stripHtml(htmlStr) {
                const tmp = document.createElement("DIV");
                tmp.innerHTML = htmlStr;
                const text = tmp.textContent || tmp.innerText || "";
                return text.length > 150 ? text.substring(0, 150) + '...' : text;
            }
            function renderUI(data) {
                document.title = `${data.title} - Preview`;
