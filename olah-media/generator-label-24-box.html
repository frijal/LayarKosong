 // Listener untuk handle upload gambar lokal
 document.getElementById('logoFile').addEventListener('change', function(e) {
 const file = e.target.files[0];
 if (file) {
 const reader = new FileReader();
 reader.onload = function(event) {
 currentLogoData = event.target.result; // Base64 data gambar
 document.getElementById('logoUrl').value = ""; // Kosongkan URL jika pakai file lokal
 };
 reader.readAsDataURL(file);
 }
 });
 function generateLabels() {
 const csvInput = document.getElementById('csvFile');
 const manualUrl = document.getElementById('logoUrl').value;
 // Gunakan URL manual jika diisi, jika tidak gunakan hasil browse
 const finalLogo = manualUrl.trim() !== "" ? manualUrl : currentLogoData;
 if (!csvInput.files[0]) {
 alert("Pilih file CSV dulu ya!");
 return;
 }
 const reader = new FileReader();
 reader.onload = function(e) {
 const rows = e.target.result.split(/\r?\n/).filter(r => r.trim() !== "");
 const dataRows = rows.slice(1);
 const mainOutput = document.getElementById('main-output');
 mainOutput.innerHTML = '';
 const ITEMS_PER_PAGE = 24;
 for (let i = 0; i < dataRows.length; i += ITEMS_PER_PAGE) {
 const pageWrapper = document.createElement('div');
 pageWrapper.className = 'page-wrapper';
 const labelGrid = document.createElement('div');
 labelGrid.className = 'label-grid';
 dataRows.slice(i, i + ITEMS_PER_PAGE).forEach(row => {
 const col = row.split(',');
 if (col.length >= 4) {
 const formattedPrice = new Intl.NumberFormat('id-ID').format(col[2].trim().replace(/[Rp.\s,]/g, ''));
 labelGrid.insertAdjacentHTML('beforeend', `
 <div class="label-box">
 <div class="product-name">${col[0].trim()}</div>
 <div class="serial-number">${col[1].trim()}</div>
 <div class="price-row">
 <span class="price-text">Rp ${formattedPrice},-</span>
 <span class="unit-text"> /${col[3].trim()}</span>
 </div>
 <div class="footer-logo">
 <img src="${finalLogo}" alt="Logo" onerror="this.parentElement.style.display='none'">
 </div>
 </div>
 `);
 }
 });
 pageWrapper.appendChild(labelGrid);
 mainOutput.appendChild(pageWrapper);
 }
 };
 reader.readAsText(csvInput.files[0]);
 }</script><noscript>srcset_oleh_Fakhrul_Rijal</noscript><div id="progress"></div><a href="https://dalam.web.id/" id="layar-kosong-header"></a><div class="search-floating-container"><input placeholder="cari artikel..." autocomplete="off" id="floatingSearchInput"><span class="clear-button" id="floatingSearchClear"></span><div class="floating-results-container" id="floatingSearchResults"></div></div><div id="internal-nav"></div><script defer="" src="/ext/pemandu.js"></script><script defer="" src="/ext/iposbrowser.js"></script><script defer="" src="/ext/lightbox.js"></script><script defer="" src="/ext/response.js"></script><script defer="" src="/ext/balon-cf.js"></script><script>if('modelContext' in pemandu){pemandu.modelContext.provideContext({tools:[{name:"baca_llms_index",description:"Mengambil daftar lengkap artikel Layar Kosong",inputSchema:{type:"object",properties:{}},execute:async()=>{const res=await fetch('/llms.txt');return await res.text()}}]})}</script><noscript>schema_oleh_Fakhrul_Rijal_2026-06-29</noscript><noscript>minify_oleh_Fakhrul_Rijal</noscript></body></html>
