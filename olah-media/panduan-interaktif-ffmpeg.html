ilkan diagram visual proses dan tombol "Salin" untuk menyalin perintah.</p><div class="mt-8 border-t pt-4"><h3 class="text-xl font-semibold text-gray-800 mb-4">Jaga Data Pribadi Tetap Aman</h3><div class="flex space-x-3"><a class="btn-facebook social-share" href="#" id="share-fb" target="_blank">Facebook</a><a class="btn-twitter social-share" href="#" id="share-tw" target="_blank">Twitter</a><a class="btn-whatsapp social-share" href="#" id="share-wa" target="_blank">WhatsApp</a></div></div></div></template><template id="ffmpeg-convert-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Ubah Format Audio MP3 → OGG</h2><div class="diagram-box mb-4"><div class="diagram-step">🎵<br>input.mp3</div><div class="diagram-arrow">→</div><div class="diagram-step">ffmpeg -i input.mp3 output.ogg</div><div class="diagram-arrow">→</div><div class="diagram-step">🎶<br>output.ogg</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>ffmpeg -i input.mp3 output.ogg</code></pre></div></div></template><template id="ffmpeg-batch-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Batch Convert Audio</h2><div class="diagram-box mb-4"><div class="diagram-step">📁<br>folder/*.mp3</div><div class="diagram-arrow">→</div><div class="diagram-step">for f in *.mp3; do ffmpeg -i "$f" "${f%.mp3}.ogg"; done</div><div class="diagram-arrow">→</div><div class="diagram-step">📁<br>folder/*.ogg</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>for f in *.mp3; do ffmpeg -i "$f" "${f%.mp3}.ogg"; done</code></pre></div></div></template><template id="ffmpeg-wav-mp3-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">WAV → MP3</h2><div class="diagram-box mb-4"><div class="diagram-step">🎵 input.wav</div><div class="diagram-arrow">→</div><div class="diagram-step">ffmpeg -i input.wav -codec:a n><pre><code>ffmpeg -i input.mp4 -vf scale=1280:720 output.mp4</code></pre></div></div></template><template id="ffmpeg-extract-audio-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Extract Audio</h2><div class="diagram-box mb-4"><div class="diagram-step">🎬 input.mp4</div><div class="diagram-arrow">→</div><div class="diagram-step">ffmpeg -i input.mp4 -q:a 0 -map a output.mp3</div><div class="diagram-arrow">→</div><div class="diagram-step">🎵 output.mp3</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>ffmpeg -i input.mp4 -q:a 0 -map a output.mp3</code></pre></div></div></template><template id="ffmpeg-mp4-webm-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Convert MP4 → WebM</h2><div class="diagram-box mb-4"><div class="diagram-step">🎬 input.mp4</div><div class="diagram-arrow">→</div><div class="diagram-step">ffmpeg -i input.mp4 -c:v libvpx -b:v 1M -c:a libvorbis output.webm</div><div class="diagram-arrow">→</div><div class="diagram-step">🎬 output.webm</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>ffmpeg -i input.mp4 -c:v libvpx -b:v 1M -c:a libvorbis output.webm</code></pre></div></div></template><template id="ffmpeg-batch-video-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Batch Convert Video</h2><div class="diagram-box mb-4"><div class="diagram-step">📁 folder/*.mov</div><div class="diagram-arrow">→</div><div class="diagram-step">for f in *.mov; do ffmpeg -i "$f" -c:v libx264 -c:a aac "${f%.mov}.mp4"; done</div><div class="diagram-arrow">→</div><div class="diagram-step">📁 folder/*.mp4</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>for f in *.mov; do ffmpeg -i "$f" -c:v libx264 -c:a aac "${f%.mov}.mp4"; done</code></pre></div></div></template><div style="text-align:center;margin-top:5
