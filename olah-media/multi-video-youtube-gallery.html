t":"image\/svg+xml"}}]}</script></head><body><header><nav aria-label="Breadcrumb" class="static-crumb" style="font-size:.85rem"><a href="https://dalam.web.id">Beranda</a> / <a href="/olah-media">Multimedia, Editing...</a></nav><h1>Video Gallery Generator</h1><p>Dashboard manajemen multi video YouTube dengan dukungan thumbnail dan output script embed.</p></header><main class="dashboard-container"><div class="left-panel"><div class="card" style="margin-bottom:2rem"><h3>Konfigurasi Video</h3><div class="form-group"><label for="ytUrls">Masukkan URL YouTube (Pisahkan dengan Enter):</label><textarea placeholder="https://www.youtube.com/watch?v=xxxx
https://youtu.be/yyyyy" id="ytUrls"></textarea></div><div class="form-group"><label for="ratio">Pilih Rasio Aspek:</label><select id="ratio"><option value="56.25">16:9 (Standar YouTube)</option><option value="75">4:3 (Klasik)</option><option value="100">1:1 (Persegi)</option></select></div><button id="validateBtn">Validasi &amp; Generate Semua</button><div class="msg" id="message"></div></div><div class="card"><h3>Script Embed Siap-Tempel</h3><label for="embedCode">Salin kode HTML di bawah ini:</label><textarea placeholder="Kode embed akan muncul di sini..." id="embedCode" readonly=""></textarea></div></div><div class="right-panel"><div class="card"><h3>Live Preview &amp; Gallery</h3><div class="video-container" id="previewContainer" style="padding-bottom:56.25%"><div class="preview-overlay" id="previewOverlay"></div><iframe allowfullscreen="" id="preview" loading="lazy"></iframe></div><div class="gallery" id="gallery"></div></div><div id="related-articles-grid"></div><div id="response"></div><div id="iposbrowser"></div></div></main><div class="lightbox" id="lightbox"><button class="lb-close" id="lbClose">Tutup</button><button class="lb-nav lb-prev" id="lbPrev">❮</button><button class="lb-nav lb-next" id="lbNext">❯</button><div class="lb-content"><iframe allowfullscreen="" id="lbFrame"></iframe></div></div><script>const validateBtn = document.getElementById('validateBtn');
 const ytInput = document.getElementById('ytUrls');
 const msg = document.getElementById('message');
 const preview = document.getElementById('preview');
 const previewContainer = document.getElementById('previewContainer');
 const previewOverlay = document.getElementById('previewOverlay');
 const embedBox = document.getElementById('embedCode');
 const gallery = document.getElementById('gallery');
 const lightbox = document.getElementById('lightbox');
 const lbFrame = document.getElementById('lbFrame');
 const lbClose = document.getElementById('lbClose');
 const lbPrev = document.getElementById('lbPrev');
 const lbNext = document.getElementById('lbNext');

 let videoList = [];
 let currentIndex = 0;

 function extractVideoId(url){
 const regex = /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/;
 const match = url.trim().match(regex);
 return match ? match[1] : null;
 }

 validateBtn.addEventListener('click', ()=>{
 const urls = ytInput.value.trim().split('\n').map(u=>u.trim()).filter(u=>u);
 videoList = urls.map(extractVideoId).filter(Boolean);

 if(videoList.length > 0){
 currentIndex = 0;
 updatePreview();

 msg.textContent = `✅ ${videoList.length} video valid. Klik thumbnail atau video untuk fullscreen.`;
 msg.className = 'msg success';

 // Generate embed code
 const ratio = document.getElementById('ratio').value;
 let embedHtml = '';
 gallery.innerHTML = '';

 videoList.forEach((id,index)=>{
 const embedUrl = `https://www.youtube.com/embed/${id}`;
 embedHtml += `<div class="video-container" style="position:relative;width:100%;height:0;padding-bottom:${ratio}%; margin-bottom: 20px;">\n <iframe src="${embedUrl}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;"></iframe>\n</div>\n`;

 // Tambah thumbnail gallery
 const thumbDiv = document.createElement('div');
 thumbDiv.classList.add('thumbnail');
 const img = document.createElement('img');
 img.loading = 'lazy';
 img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
 thumbDiv.appendChild(img);

 thumbDiv.onclick = ()=>{
 currentIndex = index;
 lbFrame.src = `${embedUrl}?autoplay=1`;
 lightbox.classList.add('open');
 document.body.style.overflow = 'hidden';
 };

 gallery.appendChild(thumbDiv);
 });

 embedBox.value = embedHtml;
 } else {
 preview.src = '';
 msg.textContent = '❌ Tidak ada URL valid. Pastikan format URL YouTube benar.';
 msg.className = 'msg error';
 embedBox.value = '';
 gallery.innerHTML = '';
 }
 });

 function updatePreview(){
 const id = videoList[currentIndex];
 const ratio = document.getElementById('ratio').value;
 const embedUrl = `https://www.youtube.com/embed/${id}`;
 preview.src = embedUrl;
 previewContainer.style.paddingBottom = ratio + '%';

 // Menggunakan overlay untuk mendeteksi klik
 previewOverlay.onclick = ()=>{
 lbFrame.src = `${embedUrl}?autoplay=1`;
 lightbox.classList.add('open');
 document.body.style.overflow = 'hidden';
 };
 }

 // Kontrol Lightbox
 lbClose.addEventListener('click', ()=>{
 lightbox.classList.remove('open');
 lbFrame.src = '';
 document.body.style.overflow = '';
 });

 lbPrev.addEventListener('click', ()=>{
 if(videoList.length === 0) return;
 currentIndex = (currentIndex - 1 + videoList.length) % videoList.length;
 lbFrame.src = `https://www.youtube.com/embed/${videoList[currentIndex]}?autoplay=1`;
 });

 lbNext.addEventListener('click', ()=>{
 if(videoList.length === 0) return;
 currentIndex = (currentIndex + 1) % videoList.length;
 lbFrame.src = `https://www.youtube.com/embed/${videoList[currentIndex]}?autoplay=1`;
 });

 // Swipe support untuk mobile (pada lightbox overlay)
 let touchStartX = 0;
 let touchEndX = 0;

 lightbox.addEventListener('touchstart', e => {
 touchStartX = e.changedTouches[0].screenX;
 });

 lightbox.addEventListener('touchend', e => {
 touchEndX = e.changedTouches[0].screenX;
 handleGesture();
 });

 function handleGesture(){
 if(touchEndX < touchStartX - 40) lbNext.click(); // Swipe Kiri
 if(touchEndX > touchStartX + 40) lbPrev.click(); // Swipe Kanan
 }</script><div id="progress"></div><a href="https://dalam.web.id/" id="layar-kosong-header"></a><div class="search-floating-container"><input placeholder="cari artikel..." autocomplete="off" id="floatingSearchInput"><span class="clear-button" id="floatingSearchClear"></span><div class="floating-results-container" id="floatingSearchResults"></div></div><div id="internal-nav"></div><script defer="" src="/ext/pemandu.js"></script><script defer="" src="/ext/iposbrowser.js"></script><script defer="" src="/ext/response.js"></script><script defer="" src="/ext/balon-cf.js"></script><script>if('modelContext' in navigator){navigator.modelContext.provideContext({tools:[{name:"baca_llms_index",description:"Mengambil daftar lengkap artikel Layar Kosong",inputSchema:{type:"object",properties:{}},execute:async()=>{const res=await fetch('/llms.txt');return await res.text()}}]})}</script><noscript>schema_oleh_Fakhrul_Rijal_2026-07-15</noscript><noscript>minify_oleh_Fakhrul_Rijal</noscript></body></html>
