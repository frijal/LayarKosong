ct","inLanguage":"id-ID","@id":"https:\/\/dalam.web.id\/favicon.svg","url":"https:\/\/dalam.web.id\/favicon.svg","contentUrl":"https:\/\/dalam.web.id\/favicon.svg","width":512,"height":512,"caption":"Fakhrul Rijal","encodingFormat":"image\/svg+xml"}}]}</script></head><body><main><div id="iposbrowser"></div><h1>Multi Video YouTube dengan Thumbnail Gallery</h1><h2>Multi Video YouTube dengan Thumbnail Gallery</h2><p>Masukkan beberapa URL video YouTube (pisahkan dengan enter), pilih rasio, klik tombol untuk generate. Klik thumbnail atau video untuk fullscreen &amp; navigasi panah/swipe.</p><textarea placeholder="https://www.youtube.com/watch?v=xxxx
https://youtu.be/yyyyy" id="ytUrls"></textarea><label for="ratio">Pilih rasio:</label><select id="ratio"><option value="56.25">16:9</option><option value="75">4:3</option><option value="100">1:1 (persegi)</option></select><button id="validateBtn">Validasi &amp; Generate Semua</button><div class="msg" id="message"></div><div class="video-container" id="previewContainer" style="padding-bottom:56.25%"><iframe allowfullscreen="" id="preview" loading="lazy"></iframe></div><div class="gallery" id="gallery"></div><h3>Script Embed Siap-Tempel</h3><textarea placeholder="Kode embed akan muncul di sini..." id="embedCode" readonly=""></textarea><div id="related-articles-grid"></div><div id="response"></div></main><div class="lightbox" id="lightbox"><button class="lb-close" id="lbClose">Tutup</button><button class="lb-nav lb-prev" id="lbPrev">❮</button><button class="lb-nav lb-next" id="lbNext">❯</button><iframe allowfullscreen="" id="lbFrame"></iframe></div><script>const validateBtn = document.getElementById('validateBtn');
const ytInput = document.getElementById('ytUrls');
const msg = document.getElementById('message');
const preview = document.getElementById('preview');
const previewContainer = document.getElementById('previewContainer');
const embedBox = document.getElementById('embedCode');
const gallery = document.getElementById('gallery');
const lightbox = document.getElementById('lightbox');
const lbFrame = document.getElementById('lbFrame');
const lbClose = document.getElementById('lbClose');
const lbPrev = document.getElementById('lbPrev');
const lbNext = document.getElementById('lbNext');
let videoList = [];
let currentIndex = 0;
function extractVideoId(url){
 const regex = /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/;
 const match = url.trim().match(regex);
 return match ? match[1] : null;
}
validateBtn.addEventListener('click', ()=>{
 const urls = ytInput.value.trim().split('\n').map(u=>u.trim()).filter(u=>u);
 videoList = urls.map(extractVideoId).filter(Boolean);
 if(videoList.length>0){
 currentIndex = 0;
 updatePreview();
 msg.textContent = `✅ ${videoList.length} video valid. Klik thumbnail atau video untuk fullscreen & navigasi.`;
 // Generate embed code
 const ratio = document.getElementById('ratio').value;
 let embedHtml = '';
 gallery.innerHTML = '';
 videoList.forEach((id,index)=>{
 const embedUrl = `https://www.youtube.com/embed/${id}`;
 embedHtml += `<div class="video-container" style="position:relative;width:100%;height:0;padding-bottom:${ratio}%;">
 <iframe src="${embedUrl}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;"></iframe>
</div>\n`;
 // Tambah thumbnail gallery
 const thumbDiv = document.createElement('div');
 thumbDiv.classList.add('thumbnail');
 const img = document.createElement('img');
 img.loading='lazy';
 img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
 thumbDiv.appendChild(img);
 thumbDiv.onclick = ()=>{
 currentIndex = index;
 lbFrame.src = embedUrl;
 lightbox.classList.add('open');
 document.body.style.overflow='hidden';
 };
 gallery.appendChild(thumbDiv);
 });
 embedBox.value = embedHtml;
 } else {
 preview.src = '';
 msg.textContent = '❌ Tidak ada URL valid.';
 embedBox.value = '';
 gallery.innerHTML='';
 }
});
function updatePreview(){
 const id = videoList[currentIndex];
 const ratio = document.getElementById('ratio').value;
 const embedUrl = `https://www.youtube.com/embed/${id}`;
 preview.src = embedUrl;
 previewContainer.style.paddingBottom = ratio + '%';
 preview.onclick = ()=>{
 lbFrame.src = embedUrl;
 lightbox.classList.add('open');
 document.body.style.overflow='hidden';
 };
}
lbClose.addEventListener('click', ()=>{
 lightbox.classList.remove('open');
 lbFrame.src='';
 document.body.style.overflow='';
});
lbPrev.addEventListener('click', ()=>{
 if(videoList.length===0) return;
 currentIndex = (currentIndex-1+videoList.length)%videoList.length;
 lbFrame.src = `https://www.youtube.com/embed/${videoList[currentIndex]}`;
});
lbNext.addEventListener('click', ()=>{
 if(videoList.length===0) return;
 currentIndex = (currentIndex+1)%videoList.length;
 lbFrame.src = `https://www.youtube.com/embed/${videoList[currentIndex]}`;
});
// Swipe support untuk mobile
let touchStartX = 0;
let touchEndX = 0;
lbFrame.addEventListener('touchstart', e=>{
 touchStartX = e.changedTouches[0].screenX;
});
lbFrame.addEventListener('touchend', e=>{
 touchEndX = e.changedTouches[0].screenX;
 handleGesture();
});
function handleGesture(){
 if(touchEndX < touchStartX - 40) lbNext.click();
 if(touchEndX > touchStartX + 40) lbPrev.click();
}</script><div id="progress"></div><a href="https://dalam.web.id/" id="layar-kosong-header"></a><div class="search-floating-container"><input placeholder="cari artikel..." autocomplete="off" id="floatingSearchInput"><span class="clear-button" id="floatingSearchClear"></span><div class="floating-results-container" id="floatingSearchResults"></div></div><div id="internal-nav"></div><section id="related-marquee-section"><div id="related-marquee-container"></div></section><script defer="" src="/ext/marquee-url.js"></script><script defer="" src="/ext/lightbox.js"></script><script defer="" src="/ext/iposbrowser.js"></script><script defer="" src="/ext/response.js"></script><script defer="" src="/ext/balon-cf.js"></script><script>if('modelContext' in navigator){navigator.modelContext.provideContext({tools:[{name:"baca_llms_index",description:"Mengambil daftar lengkap artikel Layar Kosong",inputSchema:{type:"object",properties:{}},execute:async()=>{const res=await fetch('/llms.txt');return await res.text()}}]})}</script><noscript>schema_oleh_Fakhrul_Rijal_2026-06-25</noscript><noscript>minify_oleh_Fakhrul_Rijal</noscript></body></html>
