 const dur = document.getElementById('duration').value;

 document.getElementById('output').textContent = oneLiner;
 // Reset teks tombol salin jika generate ulang
 document.getElementById('copyBtn').textContent = "Salin Kode";
 document.getElementById('copyBtn').style.background = "#28a745";
}
function copyToClipboard() {

 if (copyText.startsWith("#")) return; // Jangan salin jika belum di-generate
 navigator.clipboard.writeText(copyText).then(() => {
 const btn = document.getElementById("copyBtn");
 btn.textContent = "Tersalin!";

 setTimeout(() => {
 btn.textContent = "Salin Kode";
 btn.style.background = "#28a745";
 }, 2000);
 });
}</script><div id=progress></div><a href=https://dalam.web.id/ id=layar-kosong-header></a><div class=search-floating-container><input placeholder="cari artikel..." autocomplete=off id=floatingSearchInput><span class=clear-button id=floatingSearchClear></span><div class=floating-results-container id=floatingSearchResults></div></div><div class=floating-nav id=dynamic-nav-container></div><div id=internal-nav></div><section id=related-marquee-section><div id=related-marquee-container></div></section><script defer src=/ext/marquee-url.js></script><script defer src=/ext/lightbox.js></script><script defer src=/ext/iposbrowser.js></script><script defer src=/ext/response.js></script><script>document.addEventListener('DOMContentLoaded',() => {if(typeof hljs !== 'undefined') hljs.highlightAll();});</script><noscript>html_hasil_reverse</noscript><noscript>srcset_oleh_Fakhrul_Rijal</noscript><script>if('modelContext' in navigator){navigator.modelContext.provideContext({tools:[{name:"baca_llms_index",description:"Mengambil daftar lengkap artikel Layar Kosong",inputSchema:{type:"object",properties:{}},execute:async()=>{const res=await fetch('/llms.txt');return await res.text()}}]})}</script><noscript>schema_oleh_Fakhrul_Rijal_2026-06-18</noscript><noscript>minify_oleh_Fakhrul_Rijal</noscript>
