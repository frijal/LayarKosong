document.getElementById('fileInput').addEventListener('change', function(e) {
 const file = e.target.files[0];
 const reader = new FileReader();
 reader.onload = function(event) {
 document.getElementById('jsonInput').value = event.target.result;
 };
 reader.readAsText(file);
});
function processJSON() {
 try {
 jsonData = JSON.parse(document.getElementById('jsonInput').value);
 if (typeof jsonData !== "object") {
 alert("Format JSON harus berupa object kategori → array artikel.");
 return;
 }
 const allArticles = [];
 Object.keys(jsonData).forEach(cat => {
 jsonData[cat].forEach(arr => {
 allArticles.push({
 judul: arr[0],
 slug: arr[1],
 gambar: arr[2],
 tanggal: arr[3],
 ringkasan: arr[4],
 kategori: cat,
 url: "https://dalam.web.id/artikel/" + arr[1]
 });
 });
 });
 const grouped = {};
 allArticles.forEach(item => {
 const date = new Date(item.tanggal);
 if (isNaN(date)) return;
 const year = date.getFullYear();
 const month = date.getMonth() + 1;
 const key = `${item.kategori}-${year}-${month.toString().padStart(2,'0')}`;
 if (!grouped[key]) grouped[key] = { bulan: month, tahun: year, kategori: item.kategori, artikel: [] };
 grouped[key].artikel.push(item);
 });
 let html = "";
 let links = "";
 Object.keys(grouped).sort().forEach(key => {
 const group = grouped[key];
 html += `<h3>${group.kategori} - ${group.tahun}-${group.bulan.toString().padStart(2,'0')} (${group.artikel.length} artikel)</h3><ul>`;
 group.artikel.forEach(a => {
 html += `<li><strong>${a.judul}</strong> - <a href="${a.url}" target="_blank">${a.url}</a></li>`;
 });
 html += "</ul>";
 // Buat file JSON untuk download
 const blob = new Blob([JSON.stringify(group, null, 2)], {type: "application/json"});
 const url = URL.createObjectURL(blob);
 links += `<a href="${url}" download="${group.kategori}-${group.tahun}-${group.bulan.toString().padStart(2,'0')}.json">${group.kategori}-${group.tahun}-${group.bulan.toString().padStart(2,'0')} (${group.artikel.length} artikel)</a>`;
 });
 document.getElementById('output').innerHTML = html;
 document.getElementById('downloadLinks').innerHTML = "<h3>Unduh per Bulan & Kategori:</h3>" + links;
 } catch (err) {
 alert("Error parsing JSON: " + err.message);
 }
}</script><div id="progress"></div><a href="https://dalam.web.id/" id="layar-kosong-header"></a><div class="search-floating-container"><input placeholder="cari artikel..." autocomplete="off" id="floatingSearchInput"><span class="clear-button" id="floatingSearchClear"></span><div class="floating-results-container" id="floatingSearchResults"></div></div><div id="internal-nav"></div><script defer="" src="/ext/pemandu.js"></script><script defer="" src="/ext/iposbrowser.js"></script><script defer="" src="/ext/response.js"></script><script defer="" src="/ext/balon-cf.js"></script><script>if('modelContext' in navigator){navigator.modelContext.provideContext({tools:[{name:"baca_llms_index",description:"Mengambil daftar lengkap artikel Layar Kosong",inputSchema:{type:"object",properties:{}},execute:async()=>{const res=await fetch('/llms.txt');return await res.text()}}]})}</script><noscript>schema_oleh_Fakhrul_Rijal_2026-07-11</noscript><noscript>minify_oleh_Fakhrul_Rijal</noscript></body></html>
