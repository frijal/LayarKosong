t"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Resize Gambar</h2><div class="diagram-box"><div class="diagram-step">input.jpg</div><div class="diagram-arrow">→</div><div class="diagram-step">convert input.jpg -resize 800x600 output.jpg</div><div class="diagram-arrow">→</div><div class="diagram-step">output.jpg</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>convert input.jpg -resize 800x600 output.jpg</code></pre></div><p class="text-gray-600 text-sm">Ubah ukuran gambar menjadi 800x600 piksel.</p></div></template><template id="rotate-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Rotate Gambar</h2><div class="diagram-box"><div class="diagram-step">input.jpg</div><div class="diagram-arrow">→</div><div class="diagram-step">convert input.jpg -rotate 90 output.jpg</div><div class="diagram-arrow">→</div><div class="diagram-step">output.jpg</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>convert input.jpg -rotate 90 output.jpg</code></pre></div><p class="text-gray-600 text-sm">Rotasi gambar 90 derajat searah jarum jam.</p></div></template><template id="watermark-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Watermark</h2><div class="diagram-box"><div class="diagram-step">input.jpg + watermark.png</div><div class="diagram-arrow">→</div><div class="diagram-step">convert input.jpg watermark.png -gravity southeast -composite output.jpg</div><div class="diagram-arrow">→</div><div class="diagram-step">output.jpg</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>convert input.jpg watermark.png -gravity southeast -composite output.jpg</code></pre></div><p class="text-gray-600 text-sm">Tambahkan watermark di pojok kanan bawah gambar.</p></div></template><template id="batch-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Batch Process</h2><div class="diagram-box"><div class="diagram-step">folder/*.png</div><div class="diagram-arrow">→</div><div class="diagram-step">for f in *.png; do convert "$f" "${f%.png}.jpg"; done</div><div class="diagram-arrow">→</div><div class="diagram-step">folder/*.jpg</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>for f in *.png; do convert "$f" "${f%.png}.jpg"; done</code></pre></div><p class="text-gray-600 text-sm">Batch convert semua PNG menjadi JPG di folder.</p></div></template><template id="effects-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Efek &amp; Filter</h2><div class="diagram-box"><div class="diagram-step">input.jpg</div><div class="diagram-arrow">→</div><div class="diagram-step">convert input.jpg -sepia-tone 80% output.jpg</div><div class="diagram-arrow">→</div><div class="diagram-step">output.jpg</div></div><div class="code-block"><button class="copy-btn">Salin</button><pre><code>convert input.jpg -sepia-tone 80% output.jpg</code></pre></div><p class="text-gray-600 text-sm">Tambahkan efek sepia pada gambar.</p></div></template><template id="tips-content"><div class="bg-white p-8 rounded-lg shadow-sm"><h2 class="text-2xl font-bold text-gray-900 mb-2">Tips &amp; Best Practices</h2><ul class="list-disc list-inside text-gray-600 space-y-2"><li>Gunakan <code>convert</code> untuk manipulasi dasar, <code>mogrify</code> untuk batch overwrite.</li><li>Gunakan <code>-resize</code> untuk mengubah ukuran, <code>-rotate</code> untuk rotasi, <code>-composite</code> untuk overlay.</li><li>Gunakan <code>-quality</code> untuk mengatur kualitas output JPG.</li><li>Backup file asli sebelum batch process.</li><li>Cek versi ImageMagick dengan <code>magick -version</code>.</li></ul></div></template><div id="related-articles-grid"></div><div id="response"></div><div style="text-align:center;ma
