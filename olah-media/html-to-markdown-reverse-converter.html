idesain khusus mengikuti logika <strong>markdown-enhancer.js</strong></div></div><script>function doReverse() {
 let html = document.getElementById('inputHTML').value;
 if (!html) { document.getElementById('outputMD').value = ""; return; }

 .replace(/<(em|i)>(.<em>?)<\/\1>/gi, '</em>$2*')

 .replace(/<a href="([^"]<em>)"[^>]</em>>(.*?)<\/a>/gi, (match, url, text) => {

 })

 .replace(/<code>(.*?)<\/code>/gi, '<code>$1</code>');
