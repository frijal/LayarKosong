size:.9rem}select{color:var(--text-color);border:1px solid var(--border-color);background-color:#333;border-radius:6px;padding:8px;font-family:inherit}.action-buttons{align-items:center;gap:20px;display:flex}.action-buttons .action-btn{color:var(--text-color);font-size:1.3rem;text-decoration:none;transition:color .3s,transform .3s}.action-buttons .action-btn:hover{color:var(--primary-color);transform:scale(1.2)}.action-buttons .social-twitter:hover{color:#1da1f2}.action-buttons .social-facebook:hover{color:#1877f2}.action-buttons .social-whatsapp:hover{color:#25d366}.action-buttons .separator{color:var(--border-color);align-self:center;font-size:1.2rem}#gallery-container{border-radius:8px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;min-height:200px;padding:10px;display:grid}.thumb-item{cursor:pointer;background-color:var(--card-bg);border:1px solid var(--border-color);border-radius:8px;position:relative;overflow:hidden}.thumb-item img{object-fit:cover;aspect-ratio:1;width:100%;height:100%;transition:transform .3s;display:block}.thumb-item:hover img{transform:scale(1.1)}.thumb-item:hover .caption{transform:translateY(0)}.thumb-item .caption{color:#fff;text-align:center;white-space:nowrap;text-overflow:ellipsis;background:#000000b3;padding:8px;font-size:.8rem;transition:transform .3s;position:absolute;bottom:0;left:0;right:0;overflow:hidden;transform:translateY(100%)}.lightbox{z-index:1000;background-color:#000000e6;flex-direction:column;justify-content:center;align-items:center;width:100%;height:100%;display:none;position:fixed;top:0;left:0}.lightbox.active{display:flex}.lightbox-content{object-fit:contain;max-width:90%;max-height:80%}.lightbox-caption{color:#fff;text-align:center;background-color:#00000080;border-radius:5px;margin-top:15px;padding:5px 15px;font-size:1rem;text-decoration:none;transition:background-color .3s}.lightbox-caption:hover{background-color:#00aaff80}.lightbox-close,.lightbox-nav{color:#fff;cursor:pointer;user-select:none;font-size:3rem;transition:color .2s;position:absolute}.lightbox-close:hover,.lightbox-nav:hover{color:#ccc}.lightbox-close{top:15px;right:35px}.lightbox-prev{top:50%;left:15px;transform:translateY(-50%)}.lightbox-next{top:50%;right:15px;transform:translateY(-50%)}</style></head><body><div class="container"><header><h1>Galeri Gambar</h1></header><div class="controls"><div id="status">Memuat gambar...</div><div class="sort-container"><label for="sort-select">Urutkan:</label><select id="sort-select"><option value="date_desc">Tanggal (Terbaru-Lama)</option><option value="date_asc">Tanggal (Lama-Terbaru)</option><option value="name_asc">Nama (A-Z)</option><option value="name_desc">Nama (Z-A)</option><option value="type_asc">Tipe (A-Z)</option><option value="type_desc">Tipe (Z-A)</option></select></div><div class="action-buttons"><a class="action-btn" href="https://dalam.web.id/" title="Beranda"><i class="fa-solid fa-house"></i></a><a title="RSS Feed" class="action-btn" href="https://dalam.web.id/feed"><i class="fa-solid fa-rss"></i></a><a title="Peta Situs" class="action-btn" href="https://dalam.web.id/sitemap"><i class="fa-solid fa-sitemap"></i></a><span class="separator">|</span><a class="action-btn social-twitter" title="Bagikan ke Twitter" href="#"><i class="fa-brands fa-twitter"></i></a><a class="action-btn social-facebook" title="Bagikan ke Facebook" href="#"><i class="fa-brands fa-facebook"></i></a><a class="action-btn social-whatsapp" title="Bagikan ke WhatsApp" href="#"><i class="fa-brands fa-whatsapp"></i></a></div></div><div id="gallery-container"></div></div><div class="lightbox" id="lightbox"><span class="lightbox-close" id="lightbox-close">×</span><span class="lightbox-nav lightbox-prev" id="lightbox-prev">❮</span><span class="lightbox-nav lightbox-next" id="lightbox-next">❯</span><img class="lightbox-content" id="lightbox-img"><a class="lightbox-caption" href="#" id="lightbox-caption"></a></div><script>const BASE_URL = 'https://dalam.web.id';
 const statusDiv = document.getElementById('status');
 const galleryContainer = document.getElementById('gallery-container');
 const sortSelect = document.getElementById('sort-select');
 const lightbox = document.getElementById('lightbox');
 const lightboxImg = document.getElementById('lightbox-img');
 const lightboxCaption = document.getElementById('lightbox-caption');
 const lightboxClose = document.getElementById('lightbox-close');
 const lightboxPrev = document.getElementById('lightbox-prev');
 const lightboxNext = document.getElementById('lightbox-next');
 let allImageData = [];
 let currentIndex = 0;

 const slugify = (text) => {
 return text.toString().toLowerCase().trim()
 .replace(/^[^\w\s]*/u, '')
 .replace(/ & /g, '-and-')
 .replace(/[^a-z0-9\s-]/g, '')
 .replace(/\s+/g, '-')
 .replace(/-+/g, '-');
 };

 async function fetchAndDisplayImages() {
 if(statusDiv) statusDiv.textContent = 'Menunggu Data Provider... ⏳';

 // Mekanisme penjaga: Tunggu sampai window.siteDataProvider tersedia
 while (!window.siteDataProvider) {
 await new Promise(r => setTimeout(r, 100));
 }

 try {
 const data = await window.siteDataProvider.getFor('img.html');
 const extractedData = [];

 for (const [categoryName, articles] of Object.entries(data)) {
 const catSlug = slugify(categoryName);
 articles.forEach(item => {
 // item.url adalah indeks 2, item.title adalah indeks 1 (slug)
 if (item.url && item.url.startsWith('http')) {
 const slugOnly = item.title.replace('.html', '');
 extractedData.push({
 title: item.title,
 url: item.url,
 loc: `${BASE_URL}/${catSlug}/${slugOnly}`,
 date: item.date,
 category: categoryName,
 type: item.url.split('.').pop().split('?')[0]
 });
 }
 });
 }

 allImageData = extractedData;
 if (allImageData.length === 0) {
 if(statusDiv) statusDiv.textContent = 'Tidak ada aset visual ditemukan.';
 return;
 }
 if(statusDiv) statusDiv.textContent = `Terkoneksi: ${allImageData.length} artikel dimuat.`;
 sortAndRender();
 } catch (error) {
 if(statusDiv) statusDiv.textContent = `Error: ${error.message}`;
 }
 }


 function sortAndRender() {
 const sortBy = sortSelect ? sortSelect.value : 'date_desc';
 allImageData.sort((a, b) => {
 switch (sortBy) {
 case 'name_asc': return a.title.localeCompare(b.title);
 case 'name_desc': return b.title.localeCompare(a.title);
 case 'date_desc': return new Date(b.date) - new Date(a.date);
 case 'date_asc': return new Date(a.date) - new Date(b.date);
 default: return 0;
 }
 });
 displayThumbnails();
 }
 function displayThumbnails() {
 if(!galleryContainer) return;
 galleryContainer.innerHTML = '';
 allImageData.forEach((item, index) => {
 const thumb = document.createElement('div');
 thumb.className = 'thumb-item';
 thumb.innerHTML = `
 <img src="${item.url}" alt="${item.title}" loading="lazy">
 <div class="caption">${item.title}</div>
 `;
 thumb.addEventListener('click', () => openLightbox(index));
 galleryContainer.appendChild(thumb);
 });
 }
function updateLightbox() {
 const current = allImageData[currentIndex];
 lightboxImg.src = current.url;

 // Pastikan caption bisa jadi link
 lightboxCaption.textContent = current.title;

 // Jika lightboxCaption adalah elemen <a>, maka ini bekerja:
 if (lightboxCaption.tagName === 'A') {
 lightboxCaption.href = current.loc;
 lightboxCaption.target = "_blank";
 }
}
 function openLightbox(index) {
 currentIndex = index;
 updateLightbox();
 lightbox.classList.add('active');
 document.body.style.overflow = 'hidden';
 }
 function closeLightbox() {
 lightbox.classList.remove('active');
 document.body.style.overflow = 'auto';
 }
 function showNext() {
 currentIndex = (currentIndex + 1) % allImageData.length;
 updateLightbox();
 }
 function showPrev() {
 currentIndex = (currentIndex - 1 + allImageData.length) % allImageData.length;
 updateLightbox();
 }
 document.addEventListener('DOMContentLoaded', () => {
 fetchAndDisplayImages();
 const shareData = {
 '.social-twitter': `https://x.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(document.title)}`,
 '.social-facebook': `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`,
 '.social-whatsapp': `https://api.whatsapp.com/send?text=${encodeURIComponent(document.title + ' ' + window.location.href)}`
 };
 Object.entries(shareData).forEach(([selector, link]) => {
 const el = document.querySelector(selector);
 if (el) {
 el.href = link;
 el.onclick = (e) => {
 e.preventDefault();
 window.open(link, 'share-v69', 'width=600,height=400');
 };
 }
 });
 });
 if(sortSelect) sortSelect.addEventListener('change', sortAndRender);
 if(lightboxClose) lightboxClose.addEventListener('click', closeLightbox);
 if(lightboxNext) lightboxNext.addEventListener('click', showNext);
 if(lightboxPrev) lightboxPrev.addEventListener('click', showPrev);
 document.addEventListener('keydown', e => {
 if (lightbox && lightbox.classList.contains('active')) {
 if (e.key === 'ArrowRight') showNext();
 if (e.key === 'ArrowLeft') showPrev();
 if (e.key === 'Escape') closeLightbox();
 }
 });</script><script>if('modelContext' in navigator){navigator.modelContext.provideContext({tools:[{name:"baca_llms_index",description:"Mengambil daftar lengkap artikel Layar Kosong",inputSchema:{type:"object",properties:{}},execute:async()=>{const res=await fetch('/llms.txt');return await res.text()}}]})}</script><noscript>minify_oleh_Fakhrul_Rijal</noscript></body></html>
