;border-radius:4px;padding:8px 15px;font-weight:700" onclick=generateLabels()>PREVIEW</button></div><div class=input-group style=justify-content:flex-end><button style="cursor:pointer;color:#fff;background:#27ae60;border:none;border-radius:4px;padding:8px 20px;font-weight:700" onclick=window.print()>PRINT PDF</button></div></div><p>Pakai 4 kolom CSV, dengan susunan: NamaProduct, KodeBarang, Harga, Satuan</div><div id=main-output></div><script>function generateLabels() {
const fileInput = document.getElementById('csvFile');
const logoUrl = document.getElementById('logoUrl').value;
const file = fileInput.files[0];
if (!file) {
alert("Silakan pilih file CSV terlebih dahulu!");
return;
}
const reader = new FileReader();
reader.onload = function(event) {
const text = event.target.result;
const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
const dataRows = rows.slice(1);
const mainOutput = document.getElementById('main-output');
mainOutput.innerHTML = '';
const ITEMS_PER_PAGE = 24;
for (let i = 0; i < dataRows.length; i += ITEMS_PER_PAGE) {
const pageData = dataRows.slice(i, i + ITEMS_PER_PAGE);
const pageWrapper = document.createElement('div');
pageWrapper.className = 'page-wrapper';
const labelGrid = document.createElement('div');
labelGrid.className = 'label-grid';
pageData.forEach(row => {
const columns = row.split(',');
if (columns.length >= 4) {
const name = columns[0].trim();
const serial = columns[1].trim();
const priceRaw = columns[2].trim().replace(/[Rp.\s]/g, '').replace(/,/g, '');
const formattedPrice = new Intl.NumberFormat('id-ID').format(priceRaw);
const unit = columns[3].trim();
labelGrid.insertAdjacentHTML('beforeend', `
<div class="label-box">
<div class="product-name">${name}</div>
<div class="serial-number">${serial}</div>
<div class="price-row">
<span class="price-text">Rp ${formattedPrice},-</span>
<span class="unit-text"> /${unit}</span>
</div>
<div class="footer-logo">
<img src="${logoUrl}" alt="Logo" onerror="this.style.display='none'">
</div>
</div>
`);
}
});
pageWrapper.appendChild(labelGrid);
mainOutput.appendChild(pageWrapper);
}
};
reader.readAsText(file);
}</script><div id=progress></div><a href=https://dalam.web.id/ id=layar-kosong-header></a><div class=search-floating-container><input placeholder="cari artikel..." autocomplete=off id=floatingSearchInput><span class=clear-button id=floatingSearchClear></span><div class=floating-results-container id=floatingSearchResults></div></div><div class=floating-nav id=dynamic-nav-container></div><div id=internal-nav></div><section id=related-marquee-section><div id=related-marquee-container></div></section><script defer src=/ext/markdown.js></script><script defer src=/ext/marquee-url.js></script><script defer src=/ext/lightbox.js></script><script defer src=/ext/iposbrowser.js></script><script defer src=/ext/response.js></script><noscript>markdown_oleh_Fakhrul_Rijal</noscript><noscript>srcset_oleh_Fakhrul_Rijal</noscript></html><noscript>schema_oleh_Fakhrul_Rijal_2026-03-30</noscript><noscript>minify_oleh_Fakhrul_Rijal</noscript>
