name: 🛠️ Pemeliharaan & Upgrade (Ultimate v7 - Bun Edition)

on:
  workflow_dispatch:
    inputs:
      upgrade_type:
        description: 'Pilih tipe upgrade'
        required: true
        default: 'minor'
        type: choice
        options:
          - minor
          - latest
  schedule:
    - cron: '0 8 9 * *'
jobs:
  ultimate-maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🧩 Checkout kode
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 1

      - name: ⚙️ Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461
        with:
          bun-version: latest

      - name: 📦 Install & Upgrade Dependencies
        run: |
          bun install
          # Gunakan 'latest' jika dipicu manual dengan pilihan 'latest' atau jika jadwal 3-bulanan (logika manual)
          TARGET_UPGRADE="${{ github.event.inputs.upgrade_type || 'minor' }}"
          echo "🚀 Upgrading dependencies to: $TARGET_UPGRADE"
          bunx npm-check-updates -u --target $TARGET_UPGRADE
          bun install
          echo "✅ Dependencies updated & bun.lock synchronized."

      - name: 🌈 Update Assets (Highlight.js & Font Awesome)
        run: |
          # Install temporary paket terbaru
          bun add @highlightjs/cdn-assets@latest @fortawesome/fontawesome-free@latest --no-save

          # Mapping Highlight.js (Dapur Edition)
          cp node_modules/@highlightjs/cdn-assets/highlight.min.js dapur/highlight.js
          cp node_modules/@highlightjs/cdn-assets/styles/github*.css dapur/
          cp node_modules/@highlightjs/cdn-assets/styles/tomorrow-night-bright.css dapur/prism-tomorrow.min.css
          cp node_modules/@highlightjs/cdn-assets/styles/monokai.min.css dapur/prism-okaidia.min.css
          cp node_modules/@highlightjs/cdn-assets/styles/default.min.css dapur/prism.min.css
          cp node_modules/@highlightjs/cdn-assets/styles/atom-one-dark.min.css dapur/atom-one-dark.min.css
          cp node_modules/@highlightjs/cdn-assets/styles/atom-one-light.min.css dapur/atom-one-light.min.css
          cp node_modules/@highlightjs/cdn-assets/styles/monokai.min.css dapur/monokai.min.css
          cp node_modules/@highlightjs/cdn-assets/styles/vs.min.css dapur/vs.min.css
          cp node_modules/@highlightjs/cdn-assets/styles/vs2015.min.css dapur/vs-dark.min.css
          
          # Urus Font Awesome
          mkdir -p dapur/fontawesome-webfonts
          cp -f node_modules/@fortawesome/fontawesome-free/webfonts/* dapur/fontawesome-webfonts/
          cp node_modules/@fortawesome/fontawesome-free/css/all.min.css dapur/fontawesome.css
          sed -i 's|\.\./webfonts/|./fontawesome-webfonts/|g' dapur/fontawesome.css

          # Save Metadata
          HLJS_VER=$(cat node_modules/@highlightjs/cdn-assets/package.json | jq -r .version)
          FA_VER=$(cat node_modules/@fortawesome/fontawesome-free/package.json | jq -r .version)
          echo -e "hljs=$HLJS_VER\nfontawesome=$FA_VER\nupdated=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > mini/asset-info.txt

      - name: 🔍 Verifikasi Integritas Font
        id: font_check
        run: |
          FONT_DIR="dapur/fontawesome-webfonts"
          OUTPUT="mini/fontawesome-verify.txt"
          PREV="mini/fontawesome-verify-prev.txt"
          [ -f "$OUTPUT" ] && cp "$OUTPUT" "$PREV"
          printf "Font Integrity Report - $(date)\nFilename | Size | SHA-256\n" > "$OUTPUT"
          find "$FONT_DIR" -type f -regex ".*\.\(woff\|woff2\|ttf\)" | sort | while read -r f; do
              printf "%s | %s | %s\n" "$(basename "$f")" "$(stat -c%s "$f")" "$(sha256sum "$f" | awk '{print $1}')" >> "$OUTPUT"
          done
          if [ -f "$PREV" ] && ! diff -q "$PREV" "$OUTPUT" > /dev/null; then
            echo "alert=true" >> $GITHUB_OUTPUT
          else
            echo "alert=false" >> $GITHUB_OUTPUT
          fi

      - name: 🧹 Operasi Super Clean (Audit & Karantina)
        run: |
          if [ -f dapur/sapu-bersih.ts ]; then
            bun run dapur/sapu-bersih.ts
          else
            echo "⚠️ sapu-bersih.ts not found! Running manual audit..."
            bunx audit-ci --low || true
          fi

      - name: 🧪 Jalankan Unit Test
        run: bun test || echo "No tests found, skipping..."

      - name: 🔍 Cek Perubahan Final
        id: check_changes
        run: |
          git add .
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "detected=true" >> $GITHUB_OUTPUT
          else
            echo "detected=false" >> $GITHUB_OUTPUT
          fi

      - name: 📨 Buat Pull Request
        if: steps.check_changes.outputs.detected == 'true'
        uses: peter-evans/create-pull-request@3499eb61835cc0015c0b786e203d74b1e8f55e43
        with:
          branch: chore/ultimate-maintenance-${{ github.run_id }}
          delete-branch: true
          title: 'chore: 🛠️ Mega Maintenance (Deps, Assets & Cleanup)'
          commit-message: 'chore: automated maintenance and dependency upgrade'
          body: |
            🔧 **Operasi Pemeliharaan Ultimate Berhasil!**

            **Perubahan yang dilakukan:**
            1. **Dependencies:** Upgraded ke `${{ github.event.inputs.upgrade_type || 'minor' }}`.
            2. **Assets:** Highlight.js & Font Awesome diperbarui ke versi terbaru.
            3. **Cleanup:** `sapu-bersih.ts` dijalankan (Karantina JS & Audit Paket).
            4. **Integrity:** ${{ steps.font_check.outputs.alert == 'true' && '🚨 **ALERT:** Hash font berubah!' || '✅ Hash font aman.' }}

            *Dapur Layar Kosong sekarang steril dan up-to-date.*
          labels: automated, maintenance
          reviewers: frijal
