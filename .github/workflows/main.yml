name: "🟢 Automation & MedSos (Full Bun)"

on:
  schedule:
    - cron: "10 0,8,16 * * *"

  workflow_dispatch:
    inputs:
      all:
        description: "✅ Jalankan semua tugas"
        required: false
        default: true
        type: boolean

      blogspot:
        description: "🧡 Blogspot Planet Autopost"
        required: false
        default: false
        type: boolean

      cloudflare:
        description: "🧹 Cloudflare Cleanup"
        required: false
        default: false
        type: boolean

      discord:
        description: "🦋 Discord Feed"
        required: false
        default: false
        type: boolean

      facebook:
        description: "🚀 Facebook Page Process"
        required: false
        default: false
        type: boolean

      linkedin:
        description: "🆕 LinkedIn Post"
        required: false
        default: false
        type: boolean

      mastodon:
        description: "🐘 Mastodon Autopost"
        required: false
        default: false
        type: boolean

      diskusi_rss:
        description: "📰 RSS kirim ke Diskusi GitHub"
        required: false
        default: false
        type: boolean

      threads:
        description: "⚙️ Threads Post"
        required: false
        default: false
        type: boolean

      tumblr:
        description: "🎨 Tumblr Autopost"
        required: false
        default: false
        type: boolean

      wordpress:
        description: "🪐 WordPress Planet Autopost"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  discussions: write
  issues: write

jobs:
  everything-job:
    runs-on: ubuntu-latest

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: 🚀 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: 📦 Install
        run: bun install

      - name: 🧾 Siapkan Log Automation MedSos
        run: |
          echo "MEDSOS_LOG_FILE=$RUNNER_TEMP/automation-medsos.log" >> "$GITHUB_ENV"
          : > "$RUNNER_TEMP/automation-medsos.log"

      # =========================================================
      # 🟢 AUTOMATION SCRIPTS (ALL RUNNING ON BUN)
      # =========================================================

      - name: RSS kirim ke Diskusi Github
        id: diskusi_rss
        if: github.event_name == 'schedule' || inputs.all || inputs.diskusi_rss
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          bun run dapur/bikin-rss-diskusi.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      - name: 🧹 1. Cloudflare Cleanup
        id: cloudflare
        if: github.event_name == 'schedule' || inputs.all || inputs.cloudflare
        continue-on-error: true
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -o pipefail
          bun run dapur/rapikan-cloudflare.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      - name: 🐘 2. Mastodon Autopost
        id: mastodon
        if: github.event_name == 'schedule' || inputs.all || inputs.mastodon
        continue-on-error: true
        env:
          MASTODON_INSTANCE: mastodon.social
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
        run: |
          set -o pipefail
          bun run dapur/post-to-mastodon.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      - name: ⚙️ 3. Threads Post Script
        id: threads
        if: github.event_name == 'schedule' || inputs.all || inputs.threads
        continue-on-error: true
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: |
          set -o pipefail
          bun run dapur/post-to-threads.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      - name: 🆕 4. LinkedIn Post Script
        id: linkedin
        if: github.event_name == 'schedule' || inputs.all || inputs.linkedin
        continue-on-error: true
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
        run: |
          set -o pipefail
          bun run dapur/post-to-linkedin.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      - name: 🎨 5. Tumblr Autopost
        id: tumblr
        if: github.event_name == 'schedule' || inputs.all || inputs.tumblr
        continue-on-error: true
        env:
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_TOKEN: ${{ secrets.TUMBLR_TOKEN }}
          TUMBLR_TOKEN_SECRET: ${{ secrets.TUMBLR_TOKEN_SECRET }}
        run: |
          set -o pipefail
          bun run dapur/post-to-tumblr.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      - name: 🦋 6. Discord Feed
        id: discord
        if: github.event_name == 'schedule' || inputs.all || inputs.discord
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -o pipefail
          bun run dapur/post-to-discord.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      - name: 🚀 7. Facebook Page Process
        id: facebook
        if: github.event_name == 'schedule' || inputs.all || inputs.facebook
        continue-on-error: true
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: |
          set -o pipefail
          bun run dapur/post-to-facebook.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      - name: 🪐 8. WordPress Planet Autopost
        id: wordpress
        if: github.event_name == 'schedule' || inputs.all || inputs.wordpress
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          WP_POST_EMAIL: ${{ secrets.WP_POST_EMAIL }}
        run: |
          set -o pipefail
          bun run dapur/post-to-wordpress.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      - name: 🧡 9. Blogspot Planet Autopost
        id: blogspot
        if: github.event_name == 'schedule' || inputs.all || inputs.blogspot
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BLOGSPOT_POST_EMAIL: ${{ secrets.BLOGSPOT_POST_EMAIL }}
        run: |
          set -o pipefail
          bun run dapur/post-to-blogspot.ts 2>&1 | tee -a "$MEDSOS_LOG_FILE"

      # =========================================================
      # 📋 RINGKASAN HASIL
      # =========================================================

      - name: 📋 Ringkasan Hasil Job
        if: always()
        env:
          STATUS_DISKUSI_RSS: ${{ steps.diskusi_rss.outcome }}
          STATUS_CLOUDFLARE: ${{ steps.cloudflare.outcome }}
          STATUS_MASTODON: ${{ steps.mastodon.outcome }}
          STATUS_THREADS: ${{ steps.threads.outcome }}
          STATUS_LINKEDIN: ${{ steps.linkedin.outcome }}
          STATUS_TUMBLR: ${{ steps.tumblr.outcome }}
          STATUS_DISCORD: ${{ steps.discord.outcome }}
          STATUS_FACEBOOK: ${{ steps.facebook.outcome }}
          STATUS_WORDPRESS: ${{ steps.wordpress.outcome }}
          STATUS_BLOGSPOT: ${{ steps.blogspot.outcome }}
        run: |
          status_icon() {
            local outcome="$1"

            case "$outcome" in
              success)   echo "✅ Berhasil" ;;
              skipped)   echo "⏭️ Dilewati (toggle off)" ;;
              failure)   echo "❌ Gagal" ;;
              cancelled) echo "🚫 Dibatalkan" ;;
              *)         echo "⏸️ Nonaktif / tidak diketahui" ;;
            esac
          }

          esc_md() {
            local value="${1:-"-"}"

            value="$(printf '%s' "$value" | tr '\r\n' '  ' | sed 's/|/\\|/g')"

            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "-"
            fi
          }

          clean_log() {
            if [ -n "${MEDSOS_LOG_FILE:-}" ] && [ -f "$MEDSOS_LOG_FILE" ]; then
              sed -E \
                -e 's/\x1b\[[0-9;]*m//g' \
                -e 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}T[^ ]+Z[[:space:]]+//' \
                "$MEDSOS_LOG_FILE"
            fi
          }

          get_last() {
            local pattern="$1"
            local replace="$2"

            printf '%s\n' "$LOG" \
              | grep -E "$pattern" \
              | tail -n 1 \
              | sed -E "$replace" || true
          }

          fallback() {
            local value="$1"

            if [ -n "$value" ]; then
              printf '%s' "$value"
            else
              printf '%s' "-"
            fi
          }

          row() {
            local task="$1"
            local outcome="$2"
            local report="$3"

            printf '| %s | %s | %s |\n' \
              "$(esc_md "$task")" \
              "$(esc_md "$(status_icon "$outcome")")" \
              "$(esc_md "$(fallback "$report")")" \
              >> "$GITHUB_STEP_SUMMARY"
          }

          LOG="$(clean_log || true)"

          RSS_COUNT="$(get_last '📦 Terdeteksi [0-9]+ artikel baru\.' 's/.*📦 Terdeteksi ([0-9]+) artikel baru\./\1/')"

          CF_TOTAL="$(get_last '📦 Total deployment ditemukan: [0-9]+' 's/.*📦 Total deployment ditemukan: ([0-9]+).*/\1/')"
          CF_PREVIEW="$(get_last '🔎 Preview deployment ditemukan: [0-9]+' 's/.*🔎 Preview deployment ditemukan: ([0-9]+).*/\1/')"
          CF_DELETE="$(get_last '🗑 Preview total akan dihapus: [0-9]+' 's/.*🗑 Preview total akan dihapus: ([0-9]+).*/\1/')"
          CF_KEEP="$(get_last '🧾 Menyisakan [0-9]+ preview terbaru\.' 's/.*🧾 Menyisakan ([0-9]+) preview terbaru\./\1/')"

          BLOGSPOT_TITLE="$(get_last '🚀 Mengirim Email Post ke Blogspot Planet: ' 's/.*🚀 Mengirim Email Post ke Blogspot Planet: (.*)$/\1/')"
          DISCORD_TITLE="$(get_last '🚀 Mengirim Plain Text ke Discord: ' 's/.*🚀 Mengirim Plain Text ke Discord: (.*)$/\1/')"
          FACEBOOK_TITLE="$(get_last '🚀 Mengirim ke Facebook Page: ' 's/.*🚀 Mengirim ke Facebook Page: (.*)$/\1/')"
          LINKEDIN_TITLE="$(get_last '✅ Berhasil! Artikel ".+" sudah tayang di LinkedIn\.' 's/.*✅ Berhasil! Artikel "(.+)" sudah tayang di LinkedIn\./\1/')"
          MASTODON_TITLE="$(get_last '🚀 Mengirim ke Mastodon: ' 's/.*🚀 Mengirim ke Mastodon: (.*)$/\1/')"
          THREADS_TITLE="$(get_last '✅ Sukses: ' 's/.*✅ Sukses: (.*)$/\1/')"
          TUMBLR_TITLE="$(get_last '🚀 Mengirim ke Tumblr: ' 's/.*🚀 Mengirim ke Tumblr: (.*)$/\1/')"
          WORDPRESS_TITLE="$(get_last '🚀 Mengirim Email Post ke WordPress Planet: ' 's/.*🚀 Mengirim Email Post ke WordPress Planet: (.*)$/\1/')"

          MASTODON_URL="$(get_last '✅ Berhasil post ke Mastodon: https?://' 's/.*✅ Berhasil post ke Mastodon: (https?:\/\/[^[:space:]]+).*/\1/')"
          TUMBLR_URL="$(get_last '✅ Berhasil post ke Tumblr: https?://' 's/.*✅ Berhasil post ke Tumblr: (https?:\/\/[^[:space:]]+).*/\1/')"

          CF_REPORT="-"
          if [ -n "$CF_DELETE" ] || [ -n "$CF_KEEP" ]; then
            CF_REPORT=""

            if [ -n "$CF_DELETE" ]; then
              CF_REPORT="${CF_DELETE} preview dihapus"
            fi

            if [ -n "$CF_KEEP" ]; then
              if [ -n "$CF_REPORT" ]; then
                CF_REPORT="${CF_REPORT}, ${CF_KEEP} preview disisakan"
              else
                CF_REPORT="${CF_KEEP} preview disisakan"
              fi
            fi

            if [ -n "$CF_TOTAL" ] && [ -n "$CF_PREVIEW" ]; then
              CF_REPORT="${CF_REPORT} (${CF_TOTAL} total, ${CF_PREVIEW} preview)"
            fi
          fi

          RSS_REPORT="-"
          if [ -n "$RSS_COUNT" ]; then
            RSS_REPORT="${RSS_COUNT} artikel baru"
          fi

          MASTODON_REPORT="$MASTODON_URL"
          if [ -z "$MASTODON_REPORT" ]; then
            MASTODON_REPORT="$MASTODON_TITLE"
          fi

          TUMBLR_REPORT="$TUMBLR_URL"
          if [ -z "$TUMBLR_REPORT" ]; then
            TUMBLR_REPORT="$TUMBLR_TITLE"
          fi

          {
            echo "## 📊 Ringkasan Automation & MedSos"
            echo ""
            echo "| Tugas | Status | Laporan |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          row "Blogspot Planet 🧡"       "$STATUS_BLOGSPOT"     "$BLOGSPOT_TITLE"
          row "Cloudflare Cleanup 🧹"    "$STATUS_CLOUDFLARE"   "$CF_REPORT"
          row "Discord 🦋"               "$STATUS_DISCORD"      "$DISCORD_TITLE"
          row "Facebook 🚀"              "$STATUS_FACEBOOK"     "$FACEBOOK_TITLE"
          row "LinkedIn 🆕"              "$STATUS_LINKEDIN"     "$LINKEDIN_TITLE"
          row "Mastodon 🐘"              "$STATUS_MASTODON"     "$MASTODON_REPORT"
          row "RSS ke Diskusi GitHub 📰" "$STATUS_DISKUSI_RSS"  "$RSS_REPORT"
          row "Threads ⚙️"               "$STATUS_THREADS"      "$THREADS_TITLE"
          row "Tumblr 🎨"                "$STATUS_TUMBLR"       "$TUMBLR_REPORT"
          row "WordPress Planet 🪐"      "$STATUS_WORDPRESS"    "$WORDPRESS_TITLE"

      # =========================================================
      # 💾 FINAL COMMIT
      # =========================================================

      - name: 💾 Save All Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .

          if git diff --staged --quiet; then
            echo "ℹ️ Ga ada kerjaan baru, skip commit."
          else
            git commit -m "chore: MedSos Post [$(date +'%Y-%m-%d %H:%M')]"
            git pull origin main --rebase --autostash
            git push
          fi
