name: 🔄 Migrate KV to D1

on:
  workflow_dispatch: # Bisa dijalankan manual dari tab Actions

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Run Migration Script
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_ID_KV: ${{ secrets.CLOUDFLARE_ID_KV }}
        run: bun run migrate-kv.ts

      - name: Apply SQL to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Gunakan konfigurasi Worker yang sudah kita buat sebelumnya
          cat <<EOF > ./wrangler-migrate.toml
          name = "migrator"
          [[d1_databases]]
          binding = "DB"
          database_name = "layarkosong-counter-db"
          database_id = "${{ secrets.CLOUDFLARE_ID_D1_COUNTER }}"
          EOF
          
          bunx wrangler d1 execute layarkosong-counter-db --remote --file=migrasi-kv-ke-d1.sql -c ./wrangler-migrate.toml
