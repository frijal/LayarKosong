name: Cleanup HTML (Preload & Unicode)

on:
  workflow_dispatch:

jobs:
  cleanup-html:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: 1. Clean HTML Preload (Custom Script)
        run: bun run dapur/pembersih-img-preload.ts

      - name: 2. Clean Hidden Unicode (Perl)
        # Menghapus zero-width characters dan memperbaiki spasi non-breaking
        run: |
          find . -type f -name "*.html" -print0 | xargs -0 -r perl -i -CSD -pe 's/\x{00A0}/&nbsp;/g; s/\x{200B}|\x{200C}|\x{200D}|\x{FEFF}//g'

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-clean HTML (preload links & unicode)"
          title: "🤖 Cleanup: Bersihkan HTML (Preload & Karakter Gaib)"
          body: |
            Halo Frijal! Bot telah melakukan pembersihan otomatis pada file HTML kamu:
            
            1. **Preload Cleanup**: Menghapus tag link preload iklan yang tidak diinginkan.
            2. **Unicode Cleanup**: Menghapus karakter Unicode tersembunyi (zero-width) dan memperbaiki spasi non-breaking.
            
            Mohon periksa **Files changed** untuk memverifikasi perubahannya sebelum di-merge! ✨
          branch: chore/auto-clean-html
          delete-branch: true
          labels: "automated pr, cleanup"
