name: 🚀 Cloudflare Deployer & Smart D1 Sync

on:
  workflow_run:
    workflows: ["☢️ Build and Generate Site Files"]
    types: [completed]
  push:
    branches:
      - main
    paths:
      - '_redirects'
      - '_headers'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Pilih mode deploy'
        required: true
        default: 'full'
        type: choice
        options:
          - full         # Default run: deploy + smart sync D1
          - update-only  # Hanya deploy, tanpa sync D1

permissions:
  contents: read
  deployments: write

jobs:
  deploy-direct:
    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      # 1. Checkout source
      - name: Checkout source branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: source
          fetch-depth: 1
          persist-credentials: true

      - name: '1.5 Setup Node.js v22'
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: source

      - name: 🧹 Prepare Clean Directory (rsync)
        run: |
          mkdir deploy_dir
          rsync -a --delete \
            --include='gaya-hidup/***' \
            --include='jejak-sejarah/***' \
            --include='lainnya/***' \
            --include='olah-media/***' \
            --include='opini-sosial/***' \
            --include='sistem-terbuka/***' \
            --include='warta-tekno/***' \
            --include='functions/***' \
            --include='search/***' \
            --include='ext/***' \
            --include='.well-known/***' \
            --include='img/***' \
            --include='redirectmap.json' \
            --include='auth.md' \
            --include='llms.md' \
            --include='_redirects' \
            --include='_headers' \
            --include='*.html' \
            --include='*.xml' \
            --include='*.xsl' \
            --include='*.txt' \
            --include='favicon.*' \
            --include='icon.*' \
            --include='logo.*' \
            --include='thumbnail.*' \
            --include='thumbnail-sm.*' \
            --include='*.webmanifest' \
            --exclude='*' \
            source/ deploy_dir/
          # 🗑️ Catatan: artikel.json & artikel-lite.json resmi dihapus dari daftar rsync!

      # 🔑 Create Config (selalu dibuat — dibutuhkan oleh D1 maupun deploy)
      - name: Create Temporary Wrangler Config
        run: |
          cat <<EOF > /tmp/wrangler.toml
          #:schema https://raw.githubusercontent.com/cloudflare/wrangler2/sys-types/pages/modules/config-schema.json
          name = "layarkosong"
          compatibility_date = "2025-12-01"
          pages_build_output_dir = "deploy_dir"
          [vars]
          BUN_VERSION = "latest"
          NODE_VERSION = "24"
          [[d1_databases]]
          binding = "DB"
          database_name = "layarkosong-db"
          database_id = "${{ secrets.CLOUDFLARE_ID_D1 }}"
          EOF

      # =========================================================
      # 🔥 FASE D1 DIFFERENTIAL SYNC (SMART UPDATE)
      # =========================================================
      
      - name: 📦 Download State D1 Terakhir
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'full' }}
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "⬇️ Mengunduh state D1 saat ini..."
          bunx wrangler@latest d1 execute layarkosong-db --remote --command="SELECT id, date, code FROM articles_fts" --json -c /tmp/wrangler.toml > current_d1_state.json
          ls -lah current_d1_state.json

      - name: 🔍 Jalankan Script Diff & Generate Patch SQL
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'full' }}
        # Pastikan path ini sesuai dengan script diff Mas Frijal yang baru
        run: bun run source/search/sync-d1-diff.ts 

      - name: 🚀 Eksekusi Patch ke D1
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'full' }}
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -f "d1-patch.sql" ]; then
            PATCH_SIZE=$(wc -c <"d1-patch.sql")
            if [ "$PATCH_SIZE" -gt 0 ]; then
               echo "Terdapat data baru/berubah. Mengeksekusi patch ke D1..."
               bunx wrangler@latest d1 execute layarkosong-db --remote --file=d1-patch.sql -c /tmp/wrangler.toml
            else
               echo "Tidak ada perubahan artikel. Melewati eksekusi D1."
            fi
          else
             echo "File d1-patch.sql tidak ditemukan. Cek script diff Node.js!"
             exit 1
          fi

      # =========================================================
      # 🌐 FASE DEPLOY & PURGE CACHE
      # =========================================================

      - name: Deploy to Cloudflare Pages
        run: |
          cp /tmp/wrangler.toml ./wrangler.toml
          cp -r source/functions ./functions

          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]
          do
            echo "🚀 Attempt $attempt to deploy..."
            if bunx wrangler pages deploy deploy_dir --project-name=layarkosong --branch=main --commit-dirty=true; then
              echo "✅ Deploy succeeded on attempt $attempt"
              break
            else
              echo "⚠️ Deploy failed on attempt $attempt"
              attempt=$((attempt+1))
              [ $attempt -le $max_attempts ] && sleep 15
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 🔥 Purge Cache API Katalog Spesifik (Single-file Purge)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'full' }}
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }} # ⚠️ Pastikan secret ini sudah di-set di GitHub!
        run: |
          echo "Menghapus cache khusus untuk endpoint /katalog di Cloudflare Edge..."
          
          # Mendaftarkan seluruh variasi URL secara eksak (exact match)
          curl -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json" \
               --data '{
                 "files": [
                   "https://dalam.web.id/katalog?ui=halaman-pencarian.ts",
                   "https://dalam.web.id/katalog?ui=homepage.ts",
                   "https://dalam.web.id/katalog?ui=img.html",
                   "https://dalam.web.id/katalog?ui=iposbrowser.ts",
                   "https://dalam.web.id/katalog?ui=pemandu.ts",
                   "https://dalam.web.id/katalog?ui=sitemap.ts"
                 ]
               }'
          
          echo -e "\n✅ Cache URL katalog spesifik berhasil dibersihkan!"
