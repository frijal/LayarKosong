name: 🔄 Migrate KV to D1 (Bash & Wrangler Way)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: 1. Tarik Data & Buat SQL (Menggunakan Logika Grep-mu)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_ID: ${{ secrets.CLOUDFLARE_ID_KV }}
        run: |
          echo "🚀 Mulai memanen keys dari KV..."
          
          # Pakai trik grep saktimu untuk mengekstrak nama key!
          KEYS=$(bunx wrangler kv key list --namespace-id="$KV_ID" --remote | grep -o '"name": "[^"]*' | grep -o '[^"]*$')
          
          echo "Mempersiapkan file migrasi.sql..."
          > migrasi.sql # Kosongkan file jika ada
          
          # Loop semua key yang ditemukan
          for key in $KEYS; do
            # Ekstrak nilai mentah dari KV
            VAL=$(bunx wrangler kv key get --namespace-id="$KV_ID" --remote "$key")
            
            # Parsing JSON mentah ({"v": 10, "t": 5}) menggunakan regex perl/grep
            # Jika gagal grep (kosong), fallback ke 0 atau 1
            V=$(echo "$VAL" | grep -Po '"v":\s*\K[0-9]+' || echo 0)
            T=$(echo "$VAL" | grep -Po '"t":\s*\K[0-9]+' || echo 1)
            
            # Jika data lama bentuknya cuma angka biasa (bukan JSON)
            if [ "$V" -eq 0 ] && [[ "$VAL" =~ ^[0-9]+$ ]]; then
              V=$VAL
            fi
            
            # Bersihkan prefix "view:" dari key
            CLEAN_PATH=$(echo "$key" | sed 's/^view://')
            
            # Tulis ke file SQL
            echo "INSERT INTO page_stats (path, views, visitors) VALUES ('$CLEAN_PATH', $V, $T) ON CONFLICT(path) DO UPDATE SET views = views + excluded.views, visitors = visitors + excluded.visitors;" >> migrasi.sql
          done
          
          echo "✅ Semua data selesai diubah menjadi SQL!"
          
          # Intip 5 baris pertama untuk memastikan bentuknya benar
          echo "Preview isi migrasi.sql:"
          head -n 5 migrasi.sql

      - name: 2. Eksekusi Suntik ke D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "🚀 Menyuntikkan data ke D1..."
          
          echo 'name = "migrator"
          [[d1_databases]]
          binding = "DB"
          database_name = "layarkosong-counter-db"
          database_id = "${{ secrets.CLOUDFLARE_ID_D1_COUNTER }}"' > ./wrangler.toml
          
          bunx wrangler d1 execute layarkosong-counter-db --remote --file=migrasi.sql
