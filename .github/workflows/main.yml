name: Auto Post to X (Twitter)

on:
  schedule:
    # Berjalan otomatis setiap 4 jam sekali (Waktu UTC)
    - cron: '0 */4 * * *'
  
  # Trigger sakti agar kamu bisa menjalankan skrip ini secara manual untuk dites
  workflow_dispatch:

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    
    # Izin wajib agar bot GitHub Actions bisa menyimpan (commit) file log kembali ke repository
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        # Memastikan puppeteer dan kawan-kawannya terinstal sebelum skrip jalan
        run: bun install

      - name: 🚀 Run Auto Poster X Script
        env:
          # Memanggil Secret yang tadi sudah kamu simpan
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: bun run dapur/post-to-twitter.ts

      - name: 💾 Commit State File (Database)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 chore: update history auto-post X"
          # Menargetkan file log spesifik agar repository tetap rapi
          file_pattern: "mini/posted-twitter.txt"
