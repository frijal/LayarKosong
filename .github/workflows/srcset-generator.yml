name: Generate Srcset Prototype

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:          
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: latest

      - name: Install Deps
        run: bun install

      - name: Run Generator
        run: bun run srcset-generator.ts      

      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: srcset-results
          path: |
            output/
            img/**/*-sm.webp
          retention-days: 7
          if-no-files-found: warn # Supaya tidak error jika folder output kosong
