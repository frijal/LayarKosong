name: Generate Srcset

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:          
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install Deps
        run: bun install

      - name: Run Cleanup & Generator
        run: |
          bun run srcset-generator.ts

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Amankan semua perubahan di folder artikel dan img
          git add .
          
          # Hanya commit jika ada perubahan yang terdeteksi
          if ! git diff --cached --quiet; then
            git commit -m "chore: optimize images and cleanup html [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
