name: 🔄 Proses ArtikelX

on:
#  push:
#    branches: ['main']
#    paths:
#      - 'artikelx/*.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process_articles:
    runs-on: ubuntu-latest
    timeout-minutes: 1
   
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest     

      - name: Install Node dependencies
        run: bun install

      - name: 🔰 Edit Komponen HTML (Bun.js)
        run: bun run dapur/Edit-Komponen-HTML.ts

    #  - name: 🧹 Sterilize Schema (Bun.js)
    #    run: bun run dapur/clean-schema.ts artikelx/

      - name: 🛠️ Ganti ke Rumah aja, fontaws dan highlight.js (Bun Mode)
        run: |
          set -euo pipefail          
          bun dapur/gantifontshighlight.ts --no-backup

      # Menjalankan Mirroring & WebP Optimization di folder artikelx
      - name: Inject SEO, Mirror Images & WebP (seo-fixer.ts)
        run: |
          set -euo pipefail
          bun run dapur/seo-fixer.ts artikelx/      
    
      - name: Move to artikel/
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(artikelx/*.html)
          if [[ ${#files[@]} -gt 0 ]]; then
            mv -f "${files[@]}" artikel/
            echo "Berhasil pindahkan ${#files[@]} file ke artikel/"
          else
            echo "Tidak ada file di artikelx/"
          fi

      - name: Commit & Push
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # PERBAIKAN: img/ ditambahkan agar gambar hasil mirroring ikut ter-upload
          git add .
          
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan."
            exit 0
          fi

          git commit -m "Proses ArtikelX: Move, Mirror & WebP"
          git push origin main

      - name: Cloudflare Cleanup
        continue-on-error: true
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -o pipefail
          bun run dapur/rapikan-cloudflare.ts
