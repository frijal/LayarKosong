name: 🚨 Major Dependency Upgrade (Pure Bun Mode)

on:
  workflow_dispatch: # Bisa dijalankan manual dari tab Actions
  schedule:
    - cron: '0 2 1 */3 *' # Otomatis tiap 3 bulan sekali (1 Maret, 1 Juni, dst.)

jobs:
  major-upgrade:
    runs-on: ubuntu-latest
    
    # Memberikan izin untuk menulis perubahan ke repo dan membuat PR
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🧩 Checkout kode
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: '🚀 Setup Bun'
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest

      - name: 📦 Install Awal
        run: bun install

      - name: 🔍 Update Manifest ke Major Terbaru
        run: |
          echo "--- MENCARI VERSI MAJOR TERBARU ---"
          # Menggunakan bunx untuk menjalankan npm-check-updates tanpa install permanen
          bunx npm-check-updates -u --target latest
          echo "✅ package.json telah diperbarui ke versi Major."

      - name: 🧹 Operasi Sapu Bersih (Cleanup & Mubazir)
        run: |
          if [ -f dapur/sapu-node.ts ]; then
            echo "🔥 Menjalankan script sapu-node..."
            bun run dapur/sapu-node.ts
          else
            echo "⚠️ Script sapu-node tidak ditemukan, melakukan reset standar..."
            # Fallback jika file script tidak ada
            rm -rf node_modules package-lock.json yarn.lock pnpm-lock.yaml bun.lockb
            bun install
          fi

      - name: 🧪 Jalankan Unit Test
        run: |
          # Bun test sangat cepat, pastikan test case kamu pakai akhiran .test.ts
          bun test || echo "No tests found, skipping..."

      - name: 🔍 Cek Perubahan Final
        id: check_changes
        run: |
          # Memantau hanya file yang relevan dengan ekosistem Bun
          if [[ -n "$(git status --porcelain package.json bun.lock)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📢 Perubahan terdeteksi pada dependensi."
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "💤 Tidak ada perubahan, semua paket sudah up-to-date."
          fi

      - name: 📨 Buat Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          branch: chore/bun-major-upgrade-${{ github.run_id }}
          title: 'chore: 🚨 Major Upgrade & Bun Optimization'
          commit-message: 'chore: upgrade dependencies to latest major versions'
          body: |
            🚨 **Operasi Otomatis Berhasil!**

            Repositori **Layar Kosong** telah diperbarui:
            1. **Major Upgrade**: Semua paket di `package.json` telah dinaikkan ke versi terbaru.
            2. **Sapu Bersih**: Script `dapur/sapu-node.ts` telah dijalankan untuk:
               - Mendeteksi dan menghapus paket yang tidak dipanggil di kode.
               - Menghapus file lock lama (NPM/Yarn/PNPM).
               - Membangun ulang `bun.lock` yang murni.
            
            **Catatan:**
            Upgrade versi Major mungkin memiliki *breaking changes*. Harap cek kembali fungsionalitas utama sebelum melakukan merge.
          labels: |
            dependencies
            major-upgrade
            bun-only
          reviewers: frijal
          draft: false

      - name: ℹ️ Selesai
        if: steps.check_changes.outputs.changes == 'false'
        run: echo "✨ Repositori sudah dalam kondisi paling optimal."
