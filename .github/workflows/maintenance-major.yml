name: 🚨 Major Dependency Upgrade (Scheduled & Manual)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 1 */3 *' # Tiap 3 bulan sekali

jobs:
  major-upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🧩 Checkout kode
        uses: actions/checkout@v4 # Gunakan v4 yang stabil
        with:
          fetch-depth: 1

      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Awal
        run: bun install 

      - name: 🔍 Preview & Apply Major Upgrades
        run: |
          echo "--- DAFTAR UPGRADE MAJOR ---"
          # Kita pakai bunx langsung untuk NCU
          bunx npm-check-updates -u --target latest
          echo "✅ package.json telah diperbarui ke versi Major terbaru."

      - name: 🧹 Menjalankan Tukang Sapu & Hard Reset
        run: |
          if [ -f dapur/cleanup.ts ]; then
            echo "🔥 Menjalankan Cleanup: Hapus node_modules dan Rebuild Lockfile..."
            bun run dapur/cleanup.ts
          else
            echo "⚠️ Script cleanup tidak ditemukan, melakukan install standar..."
            rm -rf node_modules bun.lock # Hapus manual jika script tidak ada
            bun install
          fi

      - name: 🕵️ Detektif Scan (Cek paket mati)
        run: |
          if [ -f dapur/cek-mubazir.ts ]; then
            echo "--- LAPORAN DETEKTIF SETELAH UPGRADE ---"
            bun run dapur/cek-mubazir.ts
          fi

      - name: 🧪 Audit Keamanan (Bun Way)
        run: |
          # Menggunakan audit bawaan Bun yang lebih paham bun.lock
          bun pm scan || echo "⚠️ Ada temuan audit, silakan cek manual."

      - name: 🧪 Jalankan Unit Test
        run: |
          bun test || echo "No tests found, skipping..."

      - name: 🔍 Cek Perubahan Final
        id: check_changes
        run: |
          # Cek perubahan pada package.json atau bun.lock
          if [[ -n "$(git status --porcelain package.json bun.lock)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📢 Ditemukan perubahan versi."
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "💤 Tidak ada perubahan."
          fi

      - name: 📨 Buat Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/major-upgrade-${{ github.run_id }}
          title: 'chore: 🚨 Major Dependency Upgrade'
          commit-message: 'chore: upgrade dependencies to latest major versions'
          body: |
            🚨 **Operasi Major Upgrade Berhasil!**

            Perubahan yang dilakukan:
            - Semua paket di-upgrade ke versi **Latest/Major**.
            - `dapur/cleanup.ts` telah membersihkan dan mengoptimalkan `node_modules`.
            - `dapur/cek-mubazir.ts` telah memverifikasi penggunaan dependensi.

            **Catatan untuk Layar Kosong:**
            Upgrade versi Major seringkali membawa *breaking changes*. Mohon cek kembali fungsi-fungsi krusial sebelum melakukan merge.
          labels: dependencies, major, breaking-change
          reviewers: frijal
