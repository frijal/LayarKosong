name: Universal Package Manager

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Pilih Aksi'
        required: true
        default: 'add'
        type: choice
        options:
          - add
          - remove
      packages:
        description: 'Nama paket (contoh: axios lodash)'
        required: true
        default: ''
      is_dev:
        description: 'Install sebagai DevDependency? (Hanya untuk Bun/Node)'
        required: false
        type: boolean
        default: false

jobs:
  manage-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: 'Setup Bun.js'
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      - name: '📦 Bun Package Operation'
        if: hashFiles('package.json') != ''
        run: |
          ACTION="${{ github.event.inputs.action }}"
          PKGS="${{ github.event.inputs.packages }}"
          IS_DEV="${{ github.event.inputs.is_dev }}"
          
          if [ "$ACTION" == "add" ]; then
            echo "Installing $PKGS via Bun..."
            if [ "$IS_DEV" == "true" ]; then
              bun add -d $PKGS
            else
              bun add $PKGS
            fi
          else
            echo "Removing $PKGS via Bun..."
            bun remove $PKGS
          fi
          
          # Optimasi lockfile
          bun install --production

      - name: Check if Python files exist
        id: check_python
        run: |
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          else
            echo "has_python=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check_python.outputs.has_python == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Python Package Operation
        if: steps.check_python.outputs.has_python == 'true'
        run: |
          ACTION="${{ github.event.inputs.action }}"
          PKGS="${{ github.event.inputs.packages }}"
          
          if [ "$ACTION" == "add" ]; then
            echo "Adding $PKGS to Python environment..."
            for pkg in $PKGS; do
              # Tambahkan ke requirements.txt jika belum ada
              if ! grep -q "^${pkg}=" requirements.txt; then
                echo "$pkg" >> requirements.txt
              fi
            done
            pip install $PKGS
          else
            echo "Removing $PKGS from Python environment..."
            if [ -f requirements.txt ]; then
              for pkg in $PKGS; do
                sed -i "/^${pkg}==/d; /^${pkg}>=/d; /^${pkg}$/d" requirements.txt
              done
            fi
            pip uninstall -y $PKGS || true
          fi

      - name: Generate Audit Report
        run: |
          DATE=$(date +'%Y-%m-%d')
          mkdir -p sementara/audit
          REPORT="sementara/audit/package_log_$DATE.txt"
          
          echo "Universal Package Manager Report ($DATE)" > "$REPORT"
          echo "Aksi: ${{ github.event.inputs.action }}" >> "$REPORT"
          echo "Paket: ${{ github.event.inputs.packages }}" >> "$REPORT"
          
          if [ -f package.json ]; then
            echo -e "\n--- Analisis Struktur Dapur Terbaru ---" >> "$REPORT"
            # Pastikan panggil detektif versi .ts kita yang baru!
            bun run dapur/sapu-bersih.ts >> "$REPORT" || echo "Audit script tidak ditemukan." >> "$REPORT"
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          ACTION_LABEL="${{ github.event.inputs.action == 'add' && 'install' || 'cleanup' }}"
          
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: $ACTION_LABEL [${{ github.event.inputs.packages }}]"
            git push
          fi
