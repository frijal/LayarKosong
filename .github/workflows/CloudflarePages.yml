name: 🚀 Cloudflare Deployer Filter & Direct

on:
  workflow_run:
    workflows: ["☢️ Build and Generate Site Files"]
    types: [completed]
  push:
    branches:
      - main
    paths:
      # - 'wrangler.toml'
      - '_redirects'
      - '_headers'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Pilih mode deploy'
        required: true
        default: 'full'
        type: choice
        options:
          - full         # Default run: deploy + build D1
          - update-only  # Hanya deploy, tanpa build D1

permissions:
  contents: read
  deployments: write

jobs:
  deploy-direct:
    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      # 1. Checkout source
      - name: Checkout source branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: source
          fetch-depth: 1
          persist-credentials: true

      - name: '1.5 Setup Node.js v22'
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0

      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: source

      - name: 🧹 Prepare Clean Directory (rsync)
        run: |
          mkdir deploy_dir
          rsync -a --delete \
            --include='gaya-hidup/***' \
            --include='jejak-sejarah/***' \
            --include='lainnya/***' \
            --include='olah-media/***' \
            --include='opini-sosial/***' \
            --include='sistem-terbuka/***' \
            --include='warta-tekno/***' \
            --include='functions/***' \
            --include='search/***' \
            --include='ext/***' \
            --include='.well-known/***' \
            --include='img/***' \
            --include='artikel.json' \
            --include='redirectmap.json' \
            --include='auth.md' \
            --include='llms.md' \
            --include='_redirects' \
            --include='_headers' \
            --include='*.html' \
            --include='*.xml' \
            --include='*.xsl' \
            --include='*.txt' \
            --include='favicon.*' \
            --include='icon.*' \
            --include='logo.*' \
            --include='thumbnail.*' \
            --include='thumbnail-sm.*' \
            --include='*.webmanifest' \
            --exclude='*' \
            source/ deploy_dir/

      # 🔑 Create Config (selalu dibuat — dibutuhkan oleh D1 maupun deploy)
      - name: Create Temporary Wrangler Config
        run: |
          cat <<EOF > /tmp/wrangler.toml
          #:schema https://raw.githubusercontent.com/cloudflare/wrangler2/sys-types/pages/modules/config-schema.json
          name = "layarkosong"
          compatibility_date = "2025-12-01"
          pages_build_output_dir = "deploy_dir"
          [vars]
          BUN_VERSION = "latest"
          NODE_VERSION = "24"
          [[d1_databases]]
          binding = "DB"
          database_name = "layarkosong-db"
          database_id = "${{ secrets.CLOUDFLARE_ID_D1 }}"
          [[kv_namespaces]]
          binding = "COUNTS_KV"
          id = "${{ secrets.CLOUDFLARE_ID_KV }}"
          [[ai_search]]
          binding = "LAYARKOSONG_INDEX"
          instance_name = "layarkosong-search-index"
          EOF

      # 🍳 Run Dapur — DILEWATI kalau mode: update-only
      - name: Run Dapur (Build D1)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'full' }}
        run: bun run source/search/build-d1.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      # 🚀 Deploy (Retry 3x) — selalu jalan di kedua mode
      - name: Deploy to Cloudflare Pages
        run: |
          cp /tmp/wrangler.toml ./wrangler.toml
          cp -r source/functions ./functions

          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]
          do
            echo "🚀 Attempt $attempt to deploy..."
            if bunx wrangler pages deploy deploy_dir --project-name=layarkosong --branch=main --commit-dirty=true; then
              echo "✅ Deploy succeeded on attempt $attempt"
              break
            else
              echo "⚠️ Deploy failed on attempt $attempt"
              attempt=$((attempt+1))
              [ $attempt -le $max_attempts ] && sleep 15
            fi
          done

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # === PICU SYNC LOGIK INTERNAL VERSI SAKTI ===
      - name: 🚀 Trigger Internal D1 to AI Search Sync
        run: |
          sleep 4
          curl -X GET "https://dalam.web.id/dfds67thUYG"
