name: 🚀 Cloudflare Deployer Filter & Direct 

on:
  workflow_run:
    workflows: ["☢️ Build and Generate Site Files"]
    types: [completed]  
  push:
    branches:
      - main  
    paths:
      # Daftar filter trigger tetap sama (untuk efisiensi trigger)
      - 'wrangler.toml'  # Tambahkan ini biar kalau config berubah, dia auto-run
      - '_redirects'
      - '_headers'

  workflow_dispatch:

permissions:
  contents: read # Cukup READ saja, karena kita gak perlu push balik ke repo!
  deployments: write

jobs:
  deploy-direct:
    runs-on: ubuntu-latest
   
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      # 1. Ambil source code dari main
      - name: Checkout source branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: source
          fetch-depth: 1
          persist-credentials: true
     
      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run:  bun install
        working-directory: source

      - name: Create Dynamic Wrangler Config
        run: |
            cat <<EOF > source/wrangler.toml
            [[d1_databases]]
            binding = "DB"
            database_name = "layarkosong-db"
            database_id = "${{ secrets.CLOUDFLARE_ID_D1 }}"

            [[kv_namespaces]]
            binding = "COUNTS_KV"
            id = "${{ secrets.CLOUDFLARE_ID_KV }}"
            EOF

      - name: Build D1 Database (Dapur)
        run: bun run dapur/build-d1.ts
        env:
    # Jika script dapurmu butuh token atau ID secara langsung:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ID_D1: ${{ secrets.CLOUDFLARE_ID_D1 }}
                    
      # 2. Buat folder bersih & Filter file (Bagian PENTING ini tetap ada)
      - name: Prepare Clean Directory
        run: |
          mkdir deploy_dir
          echo "🧹 Filtering files using rsync..."
          
          # Logic 'satpam' rsync yang sama persis
          rsync -a --delete \
            --include='gaya-hidup/***' \
            --include='jejak-sejarah/***' \
            --include='lainnya/***' \
            --include='olah-media/***' \
            --include='opini-sosial/***' \
            --include='sistem-terbuka/***' \
            --include='warta-tekno/***' \
            --include='functions/***' \
            --include='search/***' \
            --include='ext/***' \
            --include='.well-known/***' \
            --include='img/***' \
            --include='artikel.json' \
            --include='redirectmap.json' \
            --include='wrangler.toml' \
            --include='llms.md' \
            --include='_redirects' \
            --include='_headers' \
            --include='*.html' \
            --include='*.xml' \
            --include='*.xsl' \
            --include='*.txt' \
            --include='favicon.*' \
            --include='icon.*' \
            --include='logo.*' \
            --include='thumbnail.*' \
            --include='*.webmanifest' \
            --exclude='*' \
            source/ deploy_dir/
            
          echo "✅ Ready to deploy contents of deploy_dir/"
     
      - name: Deploy to Cloudflare Pages (with retry)
        run: |
          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]
          do
          echo "🚀 Attempt $attempt to deploy..."
          if bunx wrangler pages deploy --branch=main; then
          echo "✅ Deploy succeeded on attempt $attempt"
          break
          else
          echo "⚠️ Deploy failed on attempt $attempt"
          attempt=$((attempt+1))
          if [ $attempt -le $max_attempts ]; then
          echo "🔄 Retrying in 15 seconds..."
          sleep 15
          else
          echo "❌ All attempts failed"
          exit 1
          fi
          fi
          done
        working-directory: source
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

