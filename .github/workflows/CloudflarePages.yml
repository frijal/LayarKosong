name: 🚀 Cloudflare Deployer Filter & Direct 

on:
  workflow_run:
    workflows: ["☢️ Build and Generate Site Files"]
    types: [completed]  

  push:
    branches:
      - main  
    paths:
      - 'wrangler.toml'
      - '_redirects'
      - '_headers'

  workflow_dispatch:
    inputs:
      sparse:
        description: "Custom sparse filter (rsync include pattern, pisahkan dengan spasi)"
        required: false
        default: ""

permissions:
  contents: read
  deployments: write

jobs:
  deploy-direct:
    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout source branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: source
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Bun.js
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: source

      # 🔥 Logic dynamic sparse
      - name: Prepare Clean Directory
        run: |
          mkdir deploy_dir
          echo "🧹 Filtering files..."

          if [ -z "${{ github.event.inputs.sparse }}" ]; then
            echo "⚙️ Using DEFAULT filter"

            rsync -a --delete \
              --include='functions/***' \
              --include='gaya-hidup/***' \
              --include='jejak-sejarah/***' \
              --include='lainnya/***' \
              --include='olah-media/***' \
              --include='opini-sosial/***' \
              --include='sistem-terbuka/***' \
              --include='warta-tekno/***' \
              --include='ext/***' \
              --include='.well-known/***' \
              --include='img/***' \
              --include='artikel.json' \
              --include='redirectmap.json' \
              --include='wrangler.toml' \
              --include='llms.md' \
              --include='_redirects' \
              --include='_headers' \
              --include='*.html' \
              --include='*.xml' \
              --include='*.xsl' \
              --include='*.txt' \
              --include='favicon.*' \
              --include='icon.*' \
              --include='logo.*' \
              --include='thumbnail.*' \
              --include='*.webmanifest' \
              --exclude='*' \
              source/ deploy_dir/

          else
            echo "⚙️ Using CUSTOM sparse: ${{ github.event.inputs.sparse }}"

            INCLUDE_ARGS=""
            for pattern in ${{ github.event.inputs.sparse }}; do
              if [[ "$pattern" != *"*"* ]]; then
                pattern="$pattern/***"
              fi
                INCLUDE_ARGS="$INCLUDE_ARGS --include='$pattern'"
            done

            eval rsync -a --delete \
              $INCLUDE_ARGS \
              --exclude='*' \
              source/ deploy_dir/
          fi

          echo "✅ Ready to deploy contents of deploy_dir/"

      - name: Deploy to Cloudflare Pages
        run: bunx wrangler pages deploy --branch=main
        working-directory: source
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
