name: Zemester Content Aggregation

on:
  schedule:
    - cron: '30 1 1 1,7 *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
   
    permissions:
      contents: write # Wajib supaya bisa push hasil commit

    steps:
      - name: 🚀 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: 🍞 Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: ⚙️ Run Aggregation Script 
        # Ganti path ini jika file .ts kamu berada di folder lain
        run: bun dapur/build-aggregation.ts

      - name: 💾 Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Tambahkan file hasil agregasi dan file log
          git add .        
          
          # Cek apakah ada perubahan sebelum commit
          if git diff --cached --quiet; then
            echo "Tidak ada konten baru, skip commit."
          else
            git commit -m "chore: auto-generate semester aggregation $(date +'%Y-%m-%d')"
            git push
          fi
