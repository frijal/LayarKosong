name: Inject content via PR

on:
  workflow_dispatch:
    inputs:
      position:
        description: 'Sisipkan "sebelum" atau "sesudah" target?'
        required: true
        type: choice
        options: [sesudah, sebelum]
      target_string:
        description: 'Target (contoh: </title>)'
        required: true
        default: '</title>'
      sentence:
        description: 'Kalimat yang disisipkan'
        required: true
        default: '<script src="/ext/data-provider.js" defer></script>'
      target_directory:
        description: 'Folder target'
        required: true
        default: '.'
      file_extension:
        description: 'Ekstensi file (html, js, dll)'
        required: true
        default: 'html'

jobs:
  inject-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject content
        run: |
          TARGET="${{ github.event.inputs.target_string }}"
          SENTENCE="${{ github.event.inputs.sentence }}"
          
          if [[ "${{ github.event.inputs.position }}" == "sesudah" ]]; then
            find "${{ github.event.inputs.target_directory }}" -type f -name "*.${{ github.event.inputs.file_extension }}" -exec sed -i "s#$TARGET#$TARGET\n$SENTENCE#g" {} +
          else
            find "${{ github.event.inputs.target_directory }}" -type f -name "*.${{ github.event.inputs.file_extension }}" -exec sed -i "s#$TARGET#$SENTENCE\n$TARGET#g" {} +
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "CI: Auto-inject content into *.${{ github.event.inputs.file_extension }}"
          title: "Auto-inject: Update file content"
          body: "Workflow otomatis menambahkan script ke file target."
          branch: "auto-inject-changes"
          delete-branch: true
