name: 📋 SEO Audit Layar Kosong

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: 🚀 Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install

      - name: 🕵️‍♂️ Run SEO Audit
        run: bun run dapur/audit-seo.ts

      - name: 📝 Commit & Push Report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # Hanya commit kalau ada perubahan (agar tidak error jika tidak ada issue baru)
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update SEO audit report [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
