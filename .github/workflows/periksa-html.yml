name: 📋 SEO Audit Layar Kosong

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: 🚀 Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install happy-dom glob

      - name: 🕵️‍♂️ Run SEO Audit
        run: bun run dapur/audit-seo.ts

      - name: 📝 Commit & Push Report
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          # Hanya commit kalau ada perubahan (agar tidak error jika tidak ada issue baru)
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update SEO audit report [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
