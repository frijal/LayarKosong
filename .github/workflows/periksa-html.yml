name: 📋 SEO Audit Layar Kosong

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: 🚀 Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install

      - name: 🕵️‍♂️ Run SEO Audit
        run: bun run dapur/audit-seo.ts

      - name: 📝 Commit & Push Report
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          # Hanya commit kalau ada perubahan (agar tidak error jika tidak ada issue baru)
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update SEO audit report [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
