name: ☢️ Build and Generate Site Files

on:
  workflow_run:
    workflows: ["🔄 Proses ArtikelX"]
    types: [completed]
    branches: ['main']
  workflow_dispatch:
    inputs:
      run_generator:
        description: 'Jalankan Generator (JSON, RSS, Sitemap XML)'
        type: boolean
        default: true
      run_sitemap_txt:
        description: 'Jalankan Update sitemap.txt'
        type: boolean
        default: true
      run_schema:
        description: 'Jalankan Inject Schema.org'
        type: boolean
        default: true
      run_minify_html:
        description: 'Jalankan HTML Minify'
        type: boolean
        default: true
      run_minify_jsonxml:
        description: 'Jalankan JSONXML Minify'
        type: boolean
        default: true
      run_convert_markdown:
        description: 'Ubah ke format Markdown'
        type: boolean
        default: true  

env:
  DO_GENERATOR: ${{ github.event.inputs.run_generator || 'true' }}
  DO_SITEMAP_TXT: ${{ github.event.inputs.run_sitemap_txt || 'true' }}
  DO_SCHEMA: ${{ github.event.inputs.run_schema || 'true' }}
  DO_MINIFY_HTML: ${{ github.event.inputs.run_minify_html || 'true' }}
  DO_MINIFY_JSONXML: ${{ github.event.inputs.run_minify_jsonxml || 'true' }}
  DO_CONVERT_MARKDOWN : ${{ github.event.inputs.run_convert_markdown || 'true' }}

jobs:
  build:
    runs-on: ubuntu-latest
   
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: '1. Checkout Repository'
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 1
          persist-credentials: true      

      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: '3. Install Dependencies'
        run: bun install 

      - name: '4️⃣ Generate artikel.json, Sitemap XML & RSS'
        if: env.DO_GENERATOR == 'true'
        run: bun run dapur/generator-pro.ts
        env:
          RSS_LIMIT: 30

      - name: '5️⃣ Update sitemap.txt (Native Bun - Sorted by Date)'
        if: env.DO_SITEMAP_TXT == 'true'
        run: |
          bun run dapur/koki.ts --once
          bun run dapur/bikin-sitemap-txt.ts
          bun run dapur/generate_llms.ts
                    
      - name: '6️⃣ Inject SEO Schema'
        if: env.DO_SCHEMA == 'true'
        run: bun run dapur/inject-schema.ts

      - name: '7️⃣ Convert HTML to Markdown'
        if: env.DO_CONVERT_MARKDOWN == 'true'
        run: bun run dapur/html-to-markdown.ts
        
      - name: '8️⃣ Minify HTML'
        if: env.DO_MINIFY_HTML == 'true'
        run: bun run dapur/minify-html.ts

      - name: '9️⃣ Minify Data (JSON & XML)'
        if: env.DO_MINIFY_JSONXML == 'true'
        run: bun run dapur/minify-jsonxml.ts
        
      - name: '🔟 Commit and Push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "✅ Tidak ada perubahan."
          else
            git commit -m "build: 🚀 optimized site assets (schema, minify, sitemap) [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
