name: ☢️ Build and Generate Site Files

on:
  workflow_run:
    workflows: ["🔄 Proses ArtikelX"]
    types: [completed]
    branches: ['main']

  workflow_dispatch:
    inputs:
      run_generator:
        description: 'Generator (JSON, RSS, Sitemap XML)'
        type: boolean
        default: true

      run_srcset:
        description: 'Image Optimize & Srcset Generator'
        type: boolean
        default: true

      run_sitemap_txt:
        description: 'Update sitemap.txt'
        type: boolean
        default: true

      run_schema:
        description: 'Inject Schema.org'
        type: boolean
        default: true

      run_minify_html:
        description: 'HTML Minify'
        type: boolean
        default: true

      run_minify_jsonxml:
        description: 'JSONXML Minify'
        type: boolean
        default: true

env:
  DO_GENERATOR: ${{ github.event.inputs.run_generator || 'true' }}
  DO_SITEMAP_TXT: ${{ github.event.inputs.run_sitemap_txt || 'true' }}
  DO_SCHEMA: ${{ github.event.inputs.run_schema || 'true' }}
  DO_MINIFY_HTML: ${{ github.event.inputs.run_minify_html || 'true' }}
  DO_MINIFY_JSONXML: ${{ github.event.inputs.run_minify_jsonxml || 'true' }}
  DO_SRCSET: ${{ github.event.inputs.run_srcset || 'true' }}

jobs:
  build:
    runs-on: ubuntu-latest

    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write

    steps:
      - name: '1. Checkout Repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: '3. Install Dependencies'
        run: bun install

      - name: '4. Generate artikel.json, Sitemap XML & RSS'
        if: env.DO_GENERATOR == 'true'
        run: bun run dapur/generator-pro.ts
        env:
          RSS_LIMIT: 30

      - name: '5. Optimize Images & Generate Srcset'
        if: env.DO_SRCSET == 'true'
        run: |
          bun run dapur/srcset-generator.ts

      - name: '6. Update sitemap.txt (Native Bun - Sorted by Date)'
        if: env.DO_SITEMAP_TXT == 'true'
        run: |
          bun run dapur/koki.ts --once
          bun run dapur/bikin-sitemap-txt.ts
          bun run dapur/generate_llms.ts
          bun run dapur/redirectmap.ts

      - name: '7. Inject SEO Schema'
        if: env.DO_SCHEMA == 'true'
        run: bun run dapur/inject-schema.ts

      - name: '8. Minify HTML'
        if: env.DO_MINIFY_HTML == 'true'
        run: bun run dapur/minify-html.ts

      - name: '9. Minify Data (JSON & XML)'
        if: env.DO_MINIFY_JSONXML == 'true'
        run: bun run dapur/minify-jsonxml.ts

      - name: '10. Commit and Push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add semua perubahan lainnya (JSON, XML, dan CACHE di folder mini/)
          git add .

          if git diff --staged --quiet; then
            echo "✅ Tidak ada perubahan data."
          else
            git commit -m "beres: 🚀 update data site [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: '11. Cloudflare Cleanup'
        continue-on-error: true
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -o pipefail
          bun run dapur/rapikan-cloudflare.ts
