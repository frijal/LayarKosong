name: ☢️ Build and Generate Site Files

on:
  workflow_run:
    workflows: ["🔄 Proses ArtikelX"]
    types: [completed]
    branches: ['main']
  workflow_dispatch:
    inputs:
      run_generator:
        description: 'Jalankan Generator (JSON, RSS, Sitemap XML)'
        type: boolean
        default: true
      run_sitemap_txt:
        description: 'Jalankan Update sitemap.txt'
        type: boolean
        default: true
      run_schema:
        description: 'Jalankan Inject Schema.org'
        type: boolean
        default: true
      run_minify_html:
        description: 'Jalankan HTML Minify'
        type: boolean
        default: true
      run_minify_jsonxml:
        description: 'Jalankan JSONXML Minify'
        type: boolean
        default: true
      run_convert_markdown:
        description: 'Ubah ke format Markdown'
        type: boolean
        default: true  

env:
  DO_GENERATOR: ${{ github.event.inputs.run_generator || 'true' }}
  DO_SITEMAP_TXT: ${{ github.event.inputs.run_sitemap_txt || 'true' }}
  DO_SCHEMA: ${{ github.event.inputs.run_schema || 'true' }}
  DO_MINIFY_HTML: ${{ github.event.inputs.run_minify_html || 'true' }}
  DO_MINIFY_JSONXML: ${{ github.event.inputs.run_minify_jsonxml || 'true' }}
  DO_CONVERT_MARKDOWN : ${{ github.event.inputs.run_convert_markdown || 'true' }}

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: '1. Checkout Repository'
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 1
          persist-credentials: true      

      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461
        with:
          bun-version: latest

      - name: '3. Install Dependencies'
        run: bun install 

      - name: '4️⃣ Generate artikel.json, Sitemap XML & RSS'
        if: env.DO_GENERATOR == 'true'
        run: bun run dapur/generator-pro.ts
        env:
          RSS_LIMIT: 30

      - name: '5️⃣ Update sitemap.txt (Native Bun - Sorted by Date)'
        if: env.DO_SITEMAP_TXT == 'true'
        run: |
          echo "📝 Mengurutkan dan membuat sitemap.txt (Terbaru di Bawah)..."
          bun -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('artikel.json', 'utf8'));
            const articleList = [];
            const slugify = (t) => t.toLowerCase().trim().replace(/\s+/g, '-');
            const BASE_URL = 'https://dalam.web.id';

            // 1. Kumpulkan semua artikel ke dalam satu flat array agar bisa diurutkan
            for (const [cat, posts] of Object.entries(data)) {
              const catSlug = slugify(cat);
              posts.forEach(p => {
                articleList.push({
                  url: BASE_URL + '/' + catSlug + '/' + p[1].replace('.html', '').replace(/^\//, ''),
                  date: new Date(p[3].substring(0, 10)) // Ambil tanggal dari indeks ke-3
                });
              });
            }

            // 2. Sortir berdasarkan tanggal (Ascending: Lama -> Baru)
            articleList.sort((a, b) => a.date.getTime() - b.date.getTime());

            // 3. Masukkan URL Manual di awal
            const finalUrls = [
              '', '/jejak-sejarah', '/lainnya', '/olah-media', 
              '/opini-sosial', '/sistem-terbuka', '/warta-tekno', 
              '/gaya-hidup', '/about', '/privacy', '/search', 
              '/security-policy', '/data-deletion-form', '/disclaimer', 
              '/feed', '/img', '/lisensi', '/sitemap'
            ].map(u => BASE_URL + u);

            // 4. Masukkan URL Artikel yang sudah tersortir
            articleList.forEach(art => finalUrls.push(art.url));

            // 5. Simpan dan buang duplikasi (jika ada)
            fs.writeFileSync('sitemap.txt', [...new Set(finalUrls)].join('\n') + '\n');
            console.log('✅ sitemap.txt berhasil diurutkan berdasarkan tanggal terbit.');
          "
      
      - name: '6️⃣ Inject SEO Schema'
        if: env.DO_SCHEMA == 'true'
        run: bun run dapur/inject-schema.ts

      - name: '7️⃣ Convert HTML to Markdown'
        if: env.DO_CONVERT_MARKDOWN == 'true'
        run: bun run dapur/html-to-markdown.ts
        
      - name: '8️⃣ Minify HTML'
        if: env.DO_MINIFY_HTML == 'true'
        run: bun run dapur/minify-html.ts

      - name: '9️⃣ Minify Data (JSON & XML)'
        if: env.DO_MINIFY_JSONXML == 'true'
        run: bun run dapur/minify-jsonxml.ts     

      - name: '🔟 Commit and Push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --staged --quiet; then
            echo "✅ Tidak ada perubahan."
          else
            git commit -m "build: 🚀 optimized site assets (schema, minify, sitemap) [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
