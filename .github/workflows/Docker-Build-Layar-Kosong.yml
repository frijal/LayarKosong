name: 🐳 Build and Push to GHCR

on:
  push:
    branches: [main]
  schedule:
    - cron: '55 3 4 * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🧹 Sync Lockfiles
        run: |
          if [ -f "package.json" ]; then
            echo "Found package.json, ensuring bun.lockb is current..."
            # Jika ada package-lock.json lama, Bun akan otomatis convert saat install
            bun install --frozen-lockfile
          else
            echo "package.json not found in root, skipping install."
          fi

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 🛠️ Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOCKER_BUILDKIT=1

      - name: 📋 Version Report
        run: |
          echo "## 📦 Software Versions in Image" >> $GITHUB_STEP_SUMMARY
          # Gunakan tag 'latest' yang baru saja di-push
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest sh -c "
            echo '- **Bun:** ' \$(bun --version)
            echo '- **Node:** ' \$(node --version)
            echo '- **Python:** ' \$(python3 --version)
          " >> $GITHUB_STEP_SUMMARY
