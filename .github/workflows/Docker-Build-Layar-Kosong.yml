name: 🐳 Build and Push to GHCR

on:
  schedule:
      - cron: 55 3 4 * *
  workflow_dispatch:

# Tambahkan izin untuk menulis ke Registry
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # Ini bakal otomatis jadi 'username/repo-name'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: 🧹 Clean & Sync Lockfiles
        run: |
          if [ -f package-lock.json ]; then
            rm -f package-lock.json
          fi
          bun install 

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 🛠️ Build and Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Kita aktifkan kembali BuildKit karena ini standar di GitHub Actions
          # Kalau mau tetap paksa BuildKit=0 (legacy), hapus baris ini dan pakai command manual
          build-args: |
            DOCKER_BUILDKIT=1 

      - name: 🚀 Auto-Commit Cleanup
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync lockfiles 🧹"
            git push origin main
          fi

      - name: 📋 Version Report
        run: |
          echo "## 📦 Software Versions in Image" >> $GITHUB_STEP_SUMMARY
          docker run --rm ghcr.io/frijal/layarkosong:latest sh -c "
            echo '- **Bun:** ' \$(bun --version) >> summary.txt
            echo '- **Node:** ' \$(node --version) >> summary.txt
            echo '- **Python:** ' \$(python3 --version) >> summary.txt
            echo '- **Chrome:** ' \$(google-chrome --version) >> summary.txt
            echo '- **Perl:** ' \$(perl -v | head -n 2 | tail -n 1) >> summary.txt
          "
          # (Opsional) Catat ke log GitHub
          docker run --rm ghcr.io/frijal/layarkosong:latest bun --version
