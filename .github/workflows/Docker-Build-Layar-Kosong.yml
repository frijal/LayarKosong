name: 🐳 Build and Push to GHCR

on:
  schedule:
      - cron: '0 4 4 * *'
  workflow_dispatch:

# Tambahkan izin untuk menulis ke Registry
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # Ini bakal otomatis jadi 'username/repo-name'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      - name: 🧹 Clean & Sync Lockfiles
        run: |
          if [ -f package-lock.json ]; then
            rm -f package-lock.json
          fi
          bun install 

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 🛠️ Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Kita aktifkan kembali BuildKit karena ini standar di GitHub Actions
          # Kalau mau tetap paksa BuildKit=0 (legacy), hapus baris ini dan pakai command manual
          build-args: |
            DOCKER_BUILDKIT=1 

      - name: 🚀 Auto-Commit Cleanup
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync lockfiles 🧹"
            git push origin main
          fi

      - name: 📋 Version Report
        run: |
          echo "## 📦 Software Versions in Image" >> $GITHUB_STEP_SUMMARY
          docker run --rm ghcr.io/frijal/layarkosong:latest sh -c "
            echo '- **Bun:** ' \$(bun --version) >> summary.txt
            echo '- **Node:** ' \$(node --version) >> summary.txt
            echo '- **Python:** ' \$(python3 --version) >> summary.txt
            echo '- **Chrome:** ' \$(google-chrome --version) >> summary.txt
            echo '- **Perl:** ' \$(perl -v | head -n 2 | tail -n 1) >> summary.txt
          "
          # (Opsional) Catat ke log GitHub
          docker run --rm ghcr.io/frijal/layarkosong:latest bun --version
