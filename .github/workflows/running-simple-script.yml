name: Run Bun Script

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  run-bun-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run TypeScript script
        run: bun run build-search.ts
