name: Import D1 to JSON via Bun
# Membuat menu dropdown saat menjalankan workflow secara manual
on:
  workflow_dispatch:
    inputs:
      kategori:
        description: 'Pilih Kategori Artikel yang Ingin Ditarik'
        required: true
        type: choice
        default: 'opini-sosial' # Opsi default yang langsung terpilih
        options:
          - gaya-hidup
          - jejak-sejarah
          - lainnya
          - olah-media
          - opini-sosial
          - sistem-terbuka
          - warta-tekno
          - SEMUA-KATEGORI # Opsi tambahan buat narik semua data (jaga-jaga)

jobs:
  export-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Tarik Data dari D1 via Bunx
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          KATEGORI="${{ github.event.inputs.kategori }}"
          
          # Logika untuk merakit perintah SQL secara dinamis
          if [ "$KATEGORI" == "SEMUA-KATEGORI" ]; then
            echo "🚀 Mengekspor seluruh artikel dari database..."
            QUERY="SELECT id, title, content, category FROM articles_fts;"
            FILE_OUT="artikel_semua.json"
          else
            echo "🚀 Mengekspor artikel khusus kategori: $KATEGORI..."
            QUERY="SELECT id, title, content, category FROM articles_fts WHERE category = '$KATEGORI';"
            FILE_OUT="artikel_${KATEGORI}.json"
          fi
          
          # Eksekusi Wrangler untuk tarik data
          bunx wrangler d1 execute layarkosong-db --command="$QUERY" --remote --json > "$FILE_OUT"
          
          # Daftarkan nama file hasil ekspor ke environment variabel GitHub
          echo "OUTPUT_FILE=$FILE_OUT" >> $GITHUB_ENV

      - name: Upload JSON sebagai Artifact
        uses: actions/upload-artifact@v4
        with:
          # Nama artifact otomatis menyesuaikan kategori yang dipilih
          name: json-${{ github.event.inputs.kategori }}
          path: ${{ env.OUTPUT_FILE }}
          retention-days: 1
