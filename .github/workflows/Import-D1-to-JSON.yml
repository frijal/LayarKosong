name: Import D1 to JSON via Bun

# Trigger manual dari tab "Actions" di GitHub
on:
  workflow_dispatch: 

jobs:
  export-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: true

      # Setup environment Bun resmi di GitHub Actions
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      # Jalankan perintah export menggunakan bunx
      - name: Tarik Data dari D1 jadi JSON
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        # Ganti 'layarkosong-db' dengan nama database aslimu
        run: |
          bunx wrangler d1 execute layarkosong-db --command="SELECT id, title, content FROM articles_fts" --remote --json > artikel_layarkosong.json

      # Bungkus file hasilnya agar bisa di-download
      - name: Upload JSON sebagai Artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-json-backup
          path: artikel_layarkosong.json
          retention-days: 2
