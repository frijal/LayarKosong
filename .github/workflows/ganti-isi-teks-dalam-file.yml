name: "Mass Replace via Bun (PR)"

on:
  workflow_dispatch:
    inputs:
      search_text:
        description: "Teks/Kalimat yang dicari"
        required: true
      replace_text:
        description: "Teks/Kalimat pengganti"
        required: false
      extensions:
        description: "Ekstensi file (koma-separated, misal: md,ts,js). Kosongkan untuk semua file."
        required: false
        default: "html"
      folder:
        description: "Lokasi folder (default: .)"
        required: false
        default: "."

permissions:
  contents: write
  pull-requests: write

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1          
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      - name: Run Filtered Replacement
        env:
          SEARCH: ${{ github.event.inputs.search_text }}
          REPLACE: ${{ github.event.inputs.replace_text }}
          FOLDER: ${{ github.event.inputs.folder }}
          EXT: ${{ github.event.inputs.extensions }}
        run: bun run dapur/ganti-teks.ts

      - name: Check Git Status
        id: status
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            CHANGED=$(git --no-pager status --porcelain | awk '{print $2}' | tr '\n' ',' | sed 's/,$//')
            echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::Tidak ada perubahan pada ekstensi file tersebut."
          fi

      - name: Create Pull Request
        if: steps.status.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@a45d1fb447fcaf601166e405fd4f335cde1a8aa8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: ganti text pada file ${{ github.event.inputs.extensions }}"
          branch: "ganti-txt/${{ github.run_id }}"
          delete-branch: true
          title: "Mass Replace (${{ github.event.inputs.extensions }}): ${{ github.event.inputs.search_text }}"
          body: |
            ## 🤖 Automated Replacement Report

            - **Workflow Run:** `${{ github.workflow }}`
            - **Waktu Eksekusi:** `${{ github.event.head_commit.timestamp || github.event.repository.pushed_at }}`
            - **Cari:** `${{ github.event.inputs.search_text }}`
            - **Ganti:** `${{ github.event.inputs.replace_text }}`
            - **Ekstensi:** `${{ github.event.inputs.extensions }}`
            - **Folder:** `${{ github.event.inputs.folder }}`

            ### 📝 Daftar File yang Diubah
            ```text
            ${{ steps.status.outputs.changed_files || 'Tidak ada file yang berubah' }}
            ```
