name: Cloudflare Deployer Non-DB + KV

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy-direct:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: source
          fetch-depth: 1
          persist-credentials: true

      - name: '1.5 Setup Node.js v22'
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0

      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: source

      - name: 🧹 Prepare Clean Directory (rsync)
        run: |
          mkdir deploy_dir
          rsync -a --delete \
            --include='gaya-hidup/***' \
            --include='jejak-sejarah/***' \
            --include='lainnya/***' \
            --include='olah-media/***' \
            --include='opini-sosial/***' \
            --include='sistem-terbuka/***' \
            --include='warta-tekno/***' \
            --include='functions/***' \
            --include='search/***' \
            --include='ext/***' \
            --include='.well-known/***' \
            --include='img/***' \
            --include='artikel.json' \
            --include='redirectmap.json' \
            --include='llms.md' \
            --include='_redirects' \
            --include='_headers' \
            --include='*.html' \
            --include='*.xml' \
            --include='*.xsl' \
            --include='*.txt' \
            --include='favicon.*' \
            --include='icon.*' \
            --include='logo.*' \
            --include='thumbnail.*' \
            --include='thumbnail-sm.*' \
            --include='*.webmanifest' \
            --exclude='functions/cari.js' \
            --exclude='functions/hit.ts' \
            --exclude='*' \
            source/ deploy_dir/

      - name: Create Temporary Wrangler Config
        run: |
          cat <<EOF > /tmp/wrangler.toml
          #:schema https://raw.githubusercontent.com/cloudflare/wrangler2/sys-types/pages/modules/config-schema.json
          name = "layarkosong"
          compatibility_date = "2025-12-01"
          pages_build_output_dir = "deploy_dir"
          [vars]
          BUN_VERSION = "latest"
          NODE_VERSION = "24"
          EOF

      - name: 🚀 Deploy to Cloudflare Pages (Retry 3x)
        run: |
          cp /tmp/wrangler.toml ./wrangler.toml
          cp -r source/functions ./functions

          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]
          do
            echo "🚀 Attempt $attempt to deploy..."
            if bunx wrangler pages deploy deploy_dir --project-name=layarkosong --branch=main --commit-dirty=true; then
              echo "✅ Deploy succeeded on attempt $attempt"
              break
            else
              echo "⚠️ Deploy failed on attempt $attempt"
              attempt=$((attempt+1))
              [ $attempt -le $max_attempts ] && sleep 15
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
