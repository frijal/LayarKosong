name: 🛡️ Full Audit, Inspector & Auto-Fix

on:
  workflow_dispatch:

jobs:
  comprehensive-check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 🧩 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: true
      
      # --------------------
      # SETUP RUNTIMES (Node + Python)
      # --------------------
      - name: '2. Setup Bun.js'
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      - name: 🐍 Setup Python (3.x)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
          cache: 'pip'

      # --------------------
      # INSTALL DEPENDENCIES
      # --------------------
      - name: 📦 Install Dependencies (Node & Python)
        run: |
          # Install Node deps
          bun install 
          
          # Install Python audit tools
          pip install pip-check-reqs

      # ====================
      # BAGIAN 1: INSPECTOR
      # ====================
      - name: 🧠 JavaScript Syntax Check
        run: |
          echo "Memeriksa syntax JavaScript di dapur/..."
          for file in dapur/*.js; do
            if [ -f "$file" ]; then
              node --check "$file" && echo "✅ $file: OK" || exit 1
            fi
          done

      # ====================
      # BAGIAN 2: AUDIT & REPORT (DETECTOR MODE)
      # ====================
      - name: 🕵️ Trace node-fetch Residuals
        run: |
          DATE=$(date +'%Y-%m-%d')
          REPORT="sementara/audit/node_fetch_usage_$DATE.txt"
          echo "--- Scan node-fetch (Legacy Trace) ---" > "$REPORT"
          grep -RIn "node-fetch" . --exclude-dir=node_modules || echo "✅ Clean: node-fetch tidak ditemukan" >> "$REPORT"

      - name: 📦 Node.js Dependency Audit (Internal Detective)
        run: |
          DATE=$(date +'%Y-%m-%d')
          LIST_REPORT="sementara/audit/npm_list_$DATE.txt"
          UNUSED_REPORT="sementara/audit/npm_unused_$DATE.txt"

          echo "--- Top-Level Dependencies ---" > "$LIST_REPORT"
          npm list --depth=0 >> "$LIST_REPORT" || true

          echo "--- Unused Dependency Report (Layar Kosong Detective) ---" > "$UNUSED_REPORT"
          # Pakai script custom Mas Bro sebagai pengganti dependensi check
          bun run dapur/cek-mubazir.ts >> "$UNUSED_REPORT"

      - name: 🐍 Python Dependency Audit
        run: |
          DATE=$(date +'%Y-%m-%d')
          
          # Cari requirements.txt secara dinamis
          REQ_FILE=$(find . -name "requirements.txt" | head -n 1)
          
          if [ -n "$REQ_FILE" ]; then
            echo "--- Python Requirements ($REQ_FILE) ---" > sementara/audit/python_requirements_$DATE.txt
            cat "$REQ_FILE" >> sementara/audit/python_requirements_$DATE.txt

            echo "--- Unused Python Packages ---" > sementara/audit/python_unused_$DATE.txt
            # Scan semua folder (.) untuk mencari import python yang tidak terdaftar di requirements
            pip-extra-reqs . --requirements "$REQ_FILE" >> sementara/audit/python_unused_$DATE.txt || true
          else
            echo "ℹ️ requirements.txt tidak ditemukan, skip Python audit."
          fi

      # ====================
      # BAGIAN 3: AUTO-FIX
      # ====================
      - name: 🛠️ Run Auto-Fixer
        run: |
          if [ -f dapur/cleanup.ts ]; then
            echo "Menjalankan Cleanup Auto v2.0..."
            bun run dapur/cleanup.ts
          else
            echo "ℹ️ Tidak ada script cleanup, skip."
          fi

      # ====================
      # COMMIT RESULT
      # ====================
      - name: 💾 Save Audit Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add . 
          
          if git diff --staged --quiet; then
            echo "ℹ️ Tidak ada perubahan."
          else
            git commit -m "chore(audit): full inspector & internal detective report $(date +'%Y-%m-%d')"
            git pull origin main --rebase --autostash
            git push
          fi
