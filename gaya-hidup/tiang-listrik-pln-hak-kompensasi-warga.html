<!doctype html><html prefix="og: https://ogp.me/ns# article: https://ogp.me/ns/article#" lang=id><head><meta charset=UTF-8><meta content="width=device-width,initial-scale=1.0" name=viewport><title>Tiang Listrik di Halaman Rumah: Beban Estetika atau Hak Kompensasi? Menakar Keadilan Hukum Antara PLN dan Rakyat - Layar Kosong</title><script defer src=/ext/data-provider.js></script><meta content="tiang listrik, kompensasi PLN, hak milik, UU ketenagalistrikan, perbuatan melawan hukum, ganti rugi lahan, Darius Leka" name=news_keywords><meta content="Pertanyaan: Apakah warga berhak mendapat kompensasi jika lahannya dipasangi tiang listrik PLN? Jawaban: Ya, berdasarkan UU No. 30 Tahun 2009 Pasal 30, PLN wajib memberikan kompensasi atas tanah yang digunakan secara langsung, termasuk untuk ruang bebas dan tanaman yang ditebang." name=promphint><link href=https://fonts.googleapis.com rel=preconnect><link href=https://cdnjs.cloudflare.com rel=preconnect><link href=/ext/fontawesome.css rel=stylesheet><script type=application/ld+json>{"@context":"https://schema.org","@graph":[{"@type":"WebSite","@id":"https://dalam.web.id/#website","url":"https://dalam.web.id","name":"Layar Kosong","publisher":{"@type":"Organization","@id":"https://dalam.web.id/#organization","name":"Layar Kosong","url":"https://dalam.web.id","logo":{"@type":"ImageObject","url":"https://dalam.web.id/logo.png"}}},{"@type":"Article","@id":"https://dalam.web.id/gaya-hidup/tiang-listrik-pln-hak-kompensasi-warga#article","isPartOf":{"@id":"https://dalam.web.id/#website"},"mainEntityOfPage":{"@type":"WebPage","@id":"https://dalam.web.id/gaya-hidup/tiang-listrik-pln-hak-kompensasi-warga"},"headline":"Tiang Listrik di Halaman Rumah: Beban Estetika atau Hak Kompensasi? Menakar Keadilan Hukum Antara PLN dan Rakyat","description":"Advokat Darius Leka mengupas tuntas hak kompensasi warga atas tiang listrik PLN di lahan pribadi. Simak dasar hukum, langkah-langkah, dan pengalaman warga.","articleSection":"Gaya Hidup","keywords ="Advokat Darius Leka mengupas tuntas hak kompensasi warga atas tiang listrik PLN di lahan pribadi. Simak dasar hukum, langkah-langkah, dan pengalaman warga." name=description><meta content="Apakah Anda berhak dapat kompensasi jika lahan Anda dipasangi tiang listrik PLN? Adv. Darius Leka SH MH jelaskan UU 30/2009 dan langkah hukumnya." property=og:description><meta content="PLN pasang tiang di tanah Anda tanpa izin? Ada kompensasi! Simak penjelasan hukum dari Adv. Darius Leka dan kisah warga yang berhasil." name=twitter:description><meta content=https://dalam.web.id property=twitter:domain><meta content=article property=og:type><meta content="index, max-snippet:-1, max-video-preview:-1, follow, max-image-preview:large" name=robots><meta content="Fakhrul Rijal" name=author><link href=https://creativecommons.org/publicdomain/zero/1.0/ rel=license><meta content=@responaja name=twitter:creator><meta content=@dalam.web.id name=bluesky:creator><meta content=@frijal@mastodon.social name=fediverse:creator><meta content=max-image-preview:large name=googlebot><meta content=@responaja name=twitter:site><meta content=https://facebook.com/frijal property=article:author><meta content=https://facebook.com/frijalpage property=article:publisher><meta content=175216696195384 property=fb:app_id><meta content=917962134736490 property=fb:pages><meta content=https://dalam.web.id/img/scontent_sin11_1.xx.fbcdn.net/df74cc71ebb92ea6.webp itemprop=image><meta content=https://dalam.web.id/img/scontent_sin11_1.xx.fbcdn.net/df74cc71ebb92ea6.webp name=twitter:image><meta content=https://dalam.web.id/img/scontent_sin11_1.xx.fbcdn.net/df74cc71ebb92ea6.webp property=og:image><meta content="Tiang Listrik di Halaman Rumah: Beban Estetika atau Hak Kompensasi? Menakar Keadilan Hukum Antara PLN dan Rakyat" property=og:image:alt><meta content=1200 property=og:image:width><meta content=675 property=og:image:height><meta content=#00b0ed name=theme-color><meta content=PLN property=article:tag><meta content="Kompensasi Lahan" property=article:tag><meta content="Hukum Perdata" property=article:tag><meta content="Hak Milik" property=article:tag><meta content="UU Ketenagalistrikan" property=article:tag><meta content=2026-03-08T15:01:51.301Z property=article:published_time><meta content=2026-03-08T15:01:51.301Z property=article:modified_time><body><div class=container><article><h1 <span antara atau beban dan di estetika hak halaman hukum keadilan kompensasi? listrik menakar pln rakyat rumah; style=font-size:2rem tiang>⚖️🏡</h1><div id=iposbrowser></div><p & darius darka hukum law leka, m.h.**(kantor office)< oleh:**adv. p rekan s.h., style=font-size:1.2rem><div class=five-wh><span apa? di kompensasi< lahan listrik span tanpa tiang warga> <span dan lahan< pemilik pln siapa? span> <span bertahun-tahun< berulang kapan? praktik selama span> <span di indonesia< mana? seluruh span> <span abai< dan haknya mengapa? pln span tahu tidak warga> <span 2009 30 bagaimana? dan gugatan menggunakan pmh< span uu>  <figure>*<figcaption><i class="fa-solid fa-image">*Ilustrasi tiang listrik yang berdiri di lahan pribadi. (Sumber: Darius Leka) <p adalah anda anda. baru bayangkan besar beton bukan cerita cicilan dan datang depan, di dialami diskusi, fenomena fiksi; halaman imbalan. impian, ini lalu layak, melunasi menancapkan merapikan negeri.< p pahit pelosok permisi petugas pun realita rumah saja sekadar sekelompok sepeser taman tanpa tepat tiang tiba-tiba warga yang><p>Ketidaktahuan masyarakat sering kali dimanfaatkan dengan dalih**"kepentingan umum"**. Namun, apakah "kepentingan umum" berarti mengabaikan hak privat pemilik lahan? Melihat adanya jurang informasi yang lebar antara regulasi yang ada dengan praktik di lapangan. Mari kita bedah secara investigatif dan yuridis;**Apakah Anda berhak mendapatkan kompensasi?**</p> <h2 budaya dalih dan h2 sosial< sungkan 🤚><p>Banyak warga merasa "sungkan" atau bahkan takut ketika berhadapan dengan petugas PT PLN (Persero). Argumen yang sering dilempar adalah bahwa listrik tersebut digunakan untuk menerangi tetangga sekitar, sehingga menolak tiang dianggap sebagai tindakan yang tidak sosial.</p> <p>Namun, secara hukum, hubungan antara PLN dan pelanggan (atau pemilik lahan) adalah hubungan subjek hukum yang setara. Tidak ada satu pun klausul dalam hukum Indonesia yang membolehkan sebuah korporasi, sekalipun berstatus BUMN, untuk merampas estetika dan nilai ekonomis lahan milik warga secara cuma-cuma tanpa dasar kesepakatan.</p> <h2 boleh dasar diambil h2 hak konstitusi: milik sewenang-wenang< tidak ⚖️><p>Sebelum masuk ke undang-undang sektoral, kita harus merujuk pada**UUD 1945 Pasal 28H ayat (4)**yang menyatakan;</p> <blockquote>“Setiap orang mempunyai hak milik pribadi dan hak milik tersebut tidak boleh diambil alih secara sewenang-wenang oleh siapa pun.”</blockquote> <p>Tiang listrik yang berdiri di lahan pribadi tanpa izin bukan hanya gangguan visual, tetapi juga merupakan bentuk "penguasaan" lahan secara fisik yang mengurangi nilai ekonomi properti tersebut.</p> <h2 2009: 30 dilupakan< h2 kewajiban kompensasi no. tahun uu yang 📜><p>Dasar hukum utama yang mengatur hal ini adalah**Undang-Undang Nomor 30 Tahun 2009 tentang Ketenagalistrikan**. Mari kita soroti pasal-pasal krusial yang sering luput dari edukasi publik;</p> <ul><li (pasal (pln) **kewajiban 1)**: 30 atas ayat dengan digunakan dilakukan instalasi izin kompensasi langsung.< li listrik membangun memberi memberikan oleh pemegang penggunaan penyediaan secara tanah tenaga untuk usaha yang><li (jika (pasal **ruang 1) 2) 2)**: 30 ada akibat atas atau ayat bangunan bawah bebas dan di diberikan dipotong ditebang instalasi.< kabel kompensasi li lingkup melintas pembangunan ruang rumah), tanah tanaman untuk; yang><li (misalnya (pasal (shm) **syarat 3)**: 30 adalah anda ayat diberikan hak hukum jadi, jika kepada kompensasi kompensasi.< lahan li memiliki menerima menguasai mereka milik negara). penyerobot sah sah, sertifikat subjek tanah tanpa tidak wajib yang></ul> <h2 di h2 lapangan< pengabaian sistematis 🔍><p>Dalam praktik jurnalisme investigatif hukum, ditemukan bahwa sering terjadi**"pengabaian sistematis"**. PLN kerap berlindung di balik**Pasal 27 ayat (1)**yang memberikan hak kepada PLN untuk melintasi tanah warga demi kepentingan umum. Namun, pasal tersebut memiliki syarat mutlak;**Hanya bisa dilakukan dengan memberikan kompensasi yang adil.**</p> <p>Kompensasi ini bersifat final dan dibayarkan satu kali. Masalahnya, seringkali petugas di lapangan tidak mensosialisasikan hak ini dan hanya meminta tanda tangan persetujuan tanpa menjelaskan adanya hak finansial di baliknya.</p> <h2 advokat darius h2 leka< pandangan 💬><p>Seorang praktisi hukum dari Kantor Hukum Darius Leka, S.H., & Rekan (Darka Law Office), dalam beberapa diskusi hukum menegaskan bahwa;</p> <blockquote>“Masyarakat harus berani berkata 'Tunggu dulu'. Kepentingan umum memang prioritas, tetapi prosedurnya harus benar. Jika tidak ada musyawarah mengenai besaran kompensasi, maka penancapan tiang tersebut bisa dikategorikan sebagai perbuatan melawan hukum (Onrechtmatige Daad).”</blockquote> <p>Merujuk pada**Pasal 1365 KUHPerdata**:</p> <blockquote>“Tiap perbuatan yang melanggar hukum dan membawa kerugian kepada orang lain, mewajibkan orang yang menimbulkan kerugian itu karena kesalahannya untuk menggantikan kerugian tersebut.”</blockquote> <h2 anda dipasangi h2 hukum jika langkah listrik< rumah tiang 📝><p>Jika rumah Anda tiba-tiba dipasangi tiang listrik tanpa kesepakatan, berikut adalah langkah-langkah yang disarankan secara hukum;</p> <ol><li (shm **cek anda atau bukti girik kepemilikan lahan**; legalitas li memiliki pastikan sah terdaftar).< yang><li **surat ajukan atau dan dasar induk kantor keberatan kepada kirimkan kompensasi li penempatan permohonan pln relokasi.< resmi**; setempat. surat tanyakan tertulis tiang unit wilayah><li (mediasi)**; **musyawarah 31 adanya besaran bidang dan dengan di dilakukan jika ketenagalistrikan ketentuan kompensasi kompensasi. li maka menentukan mewajibkan musyawarah pasal penetapan peraturan pertanahan.< perundang-undangan pln sepakat, sesuai tidak untuk uu warga><li (pmh) **gugatan bergeming, dan dapat ganti gugatan hukum imateril.< jika ke li materil melawan mengajukan menuntut negeri pengadilan perbuatan perdata**; pln rugi setempat tetap untuk warga></ol> <hr> <h2 dan h2 pengalaman pertanyaan< suara warga: 🗣️><p>Berikut adalah kumpulan komentar, keluhan, dan pertanyaan dari masyarakat yang mengalami langsung persoalan tiang listrik di lahan mereka. Nama-nama disamarkan untuk privasi.</p> <div class=comment-box><p <span class=comment-meta>Warga di Jawa Tengah: “Tanah orang tua saya dilalui kabel PLN dan Telkom selama puluhan tahun, bikin ruang halaman jadi semrawut. Orang lain dan korporasi yang menikmati, kami yang kena kotoran tak sedapnya. Pantas saja PLN selalu rugi, selain karena pencurian listrik, mereka terlalu abai dengan hak para pemilik tanah tempat tiang-tiang listrik mereka tertancap gagah tanpa permisi. Kedzaliman sistemik berbalut kepentingan umum.”</div> <div class=comment-box><p <span class=comment-meta>Warga di Sumatera: “Bagaimana warga mau komplain kalau masyarakat tidak tahu menahu tentang aturan terkait penancapan tiang listrik di lahan warga. Selama ini masyarakat tidak pernah tahu bahwa mereka berhak mendapatkan kompensasi atas lahan mereka yang digunakan oleh pihak PLN. Seharusnya jika memang ada aturan seperti itu, pihak pemerintah desa mensosialisasikan kepada masyarakat.”</div> <div class=comment-box><p <span class=comment-meta>Warga di Kalimantan: “Dulu waktu saya mau bangun rumah, pas depan ada tali pancang. Saya komplain, awal petugas tidak mau, alasan kepentingan umum. Saya bilang tidak bisa begitu, ini tanah ada hak sah secara hukum. Petugas melanggar hak orang lain. Kalau tetap tidak mau pindah, saya potong. Akhirnya petugas mau pindah tali pancang tiang listrik.”</div> <div class=comment-box><p <span class=comment-meta>Warga di Sulawesi: “Bagi pengalamannya pak, tempat tanah pemberian dari orang tua juga ada tiang beton dan tali pancang, tali pancang mau saya putus atau copot melalui drat bawah apakah nanti ada resiko atau tiang pancang tersebut mengandung aliran listrik? terimakasih pak.”</div> <div class=comment-box><p <span class=comment-meta>Warga di Jabodetabek: “Di halaman rumah saya ada tiang listrik, status SHM, terlambat 1 hari, PLN mengancam akan memutuskan aliran listrik untuk segera bayar. Apakah berarti saya bisa gugat pindahkan tiang listrik tersebut? mksh pencerahannya.”</div> <div class=comment-box><p <span class=comment-meta>Pengamat Kebijakan: “Di situlah awal PLN korupsi uang rakyat. Karena seharusnya ada imbalan bagi pemilik tanah, tapi tidak pernah disalurkan oleh PLN. Alasannya sudah diberikan kepada kontraktor.”</div> <div class=comment-box><p <span class=comment-meta>Warga di Jawa Timur: “Terkadang dari pihak PLN nanti diancam tidak mendapat pelayanan kelistrikan kepada warga yang tidak mau memberikan lahannya untuk penanaman tiang. Ini bagaimana pak ???? terimakasih pencerahan hukumnya.”</div> <div class=comment-box><p <span class=comment-meta>Warga di Bali: “Banyak terjadi di lapangan dengan kasus ini, PLN dengan seenaknya saja datang tebang pohon dan tancap tiang dengan dalih kepentingan umum.”</div> <div class=comment-box><p <span class=comment-meta>Warga di NTB: “Ternyata ada kompensasinya.. selama ini masyarakat banyak yang belum tahu tentang aturan ini. Kadang PLN seenaknya pasang tiang, pangkas pohon, dan bekas pekerjaannya dibiarkan acak-acakan begitu saja.”</div> <div class=comment-box><p <span class=comment-meta>Warga di Perumahan Padat: “Semua masalah kalau sudah dikaitkan kepentingan umum jadi ribet, tapi untuk tiang listrik yang berada di lahan milik masyarakat tentu harus ada kompensasinya. Untuk tiang listrik di perumahan memang dilema, tanah 5x12 m, kalau pas depan rumah ada tiang listrik dan wifi jadi bikin nggak nyaman.”</div> <div class=comment-box><p <span class=comment-meta>Warga berharap: “Menurut saya inisiatif PLN lah kepada masyarakat yang kena tiang PLN di tanahnya. PLN pasti lebih tahu, karena tiap bulan karyawannya mencatat meteran listrik tapi mendiamkan. PLN sudah menipu masyarakat dengan mendirikan tiangnya depan rumah. Karena rakyat malas berdebat dan sampai berpengadilan. PLN kalau mau makan uang berkah dan usaha mu tidak rugi, berikan kompensasi bagi masyarakat yang pakai tanah untuk tiang listrik. Kami tunggu inisiatif baik dari PLN.”</div> <hr> <h2 dan h2 harapan< kesimpulan 🔨><p>Kita semua butuh listrik, namun kemajuan infrastruktur tidak boleh menggilas hak-hak dasar warga negara. Negara melalui PLN memiliki tanggung jawab untuk mengedukasi, bukan sekadar mengeksekusi. Kompensasi bukan bentuk "pemerasan" oleh warga kepada negara, melainkan bentuk apresiasi dan keadilan atas pengorbanan hak privat demi kemaslahatan orang banyak.</p> <p>Mendorong masyarakat untuk tidak lagi diam. Bertanyalah, pelajari regulasinya, dan tuntut hak Anda secara beradab namun tegas. Karena**hukum tidak melindungi mereka yang tidur di atas hak-haknya (Vigilantibus non dormientibus iura subveniunt).**</p> <p keadilan,<br salam style=text-align:right>Adv. Darius Leka, S.H., M.H.</p> <hr>  <h2 (faq)< h2 pertanyaan umum ❓><ul style=list-style-type:none><li **apakah 2009 30 30.< atas berdasarkan di kompensasi li listrik memberi no. pasal pln saya?**wajib, tanah tiang uu wajib><li **apa atas bangunan bebas di digunakan dikompensasi?**tanah langsung, li ruang rusak.< saja serta tanah, tanaman yang><li **bagaimana ajukan bisa digolongkan ilegal. jika keberatan li listrik?**itu memberi mengancam pln sebagai tekanan tertulis.< tetap tidak><li **bolehkah atau berisiko bisa dan dianggap fasilitas hukum.< jalur karena li memotong merusak pancang saya tali tempuh tiang?**sebaiknya tidak, umum.></ul>  <div id=related-articles-grid></div> <div id=response></div>  <p adv. artikel berdasarkan dan darius darka di ditulis hukum ini klien law leka, m.
